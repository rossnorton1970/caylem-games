<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Planet Hunters - Mothership</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        body { font-family: Arial, sans-serif; background: #0a0e27; color: #e0e0e0; }
        
        #mainMenu { display: flex; flex-direction: column; justify-content: center; align-items: center; height: 100vh; background: linear-gradient(135deg, #0a0e27 0%, #1a1f3a 100%); }
        .menu-title { font-size: 64px; color: #00ff88; margin-bottom: 20px; text-shadow: 0 0 20px #00ff88; }
        .menu-subtitle { font-size: 20px; color: #ffaa00; margin-bottom: 40px; }
        .menu-buttons { display: flex; gap: 15px; flex-direction: column; width: 300px; }
        .menu-btn { background: #00ff88; color: #0a0e27; padding: 15px; font-size: 18px; font-weight: bold; border: none; border-radius: 10px; cursor: pointer; }
        .menu-btn:hover { background: #00dd77; }
        .menu-btn.secondary { background: #4444ff; color: white; }
        .menu-btn.secondary:hover { background: #3333dd; }
        .menu-btn.settings { background: #ffaa00; color: #0a0e27; }
        .menu-btn.settings:hover { background: #ff9900; }
        
        #shipCanvas { display: none; width: 100%; height: 100%; background: #0a0e27; cursor: crosshair; }
        
        #header { background: #1a1f3a; padding: 15px 30px; border-bottom: 2px solid #00ff88; display: none; }
        .header-content { display: flex; justify-content: space-between; align-items: center; }
        .header-stat { margin: 0 20px; }
        .stat-label { font-size: 12px; color: #888; }
        .stat-value { font-size: 24px; color: #00ff88; font-weight: bold; }
        
        #missionModal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 101; align-items: center; justify-content: center; }
        #missionModal.show { display: flex; }
        .missionBox { background: rgba(10, 14, 39, 0.98); padding: 40px; border: 2px solid #00ff88; border-radius: 10px; min-width: 400px; max-height: 80vh; overflow-y: auto; }
        .missionBox h2 { color: #00ff88; margin-bottom: 20px; font-size: 32px; }
        .planet-card { background: #1a1f3a; border: 2px solid #444; padding: 20px; margin: 15px 0; border-radius: 5px; cursor: pointer; transition: all 0.3s; }
        .planet-card:hover { border-color: #00ff88; background: #2a2f4a; }
        .planet-name { color: #00ff88; font-weight: bold; font-size: 18px; margin-bottom: 10px; }
        .planet-info { font-size: 12px; color: #aaa; margin: 5px 0; }
        .difficulty { font-weight: bold; margin: 10px 0; }
        .difficulty.easy { color: #00ff88; }
        .difficulty.medium { color: #ffaa00; }
        .difficulty.hard { color: #ff4444; }
        .planet-btn { background: #00ff88; color: #0a0e27; padding: 10px; margin-top: 10px; border: none; cursor: pointer; font-weight: bold; border-radius: 3px; width: 100%; }
        .planet-btn:hover { background: #00dd77; }
        .close-modal { position: absolute; top: 20px; right: 20px; background: #ff4444; color: white; border: none; width: 40px; height: 40px; font-size: 24px; cursor: pointer; border-radius: 5px; }
    </style>
</head>
<body>
    <div id="mainMenu">
        <h1 class="menu-title">⭐ PLANET HUNTERS ⭐</h1>
        <p class="menu-subtitle">Explore. Fight. Survive.</p>
        <div class="menu-buttons">
            <button class="menu-btn" onclick="startGame()">START GAME</button>
            <button class="menu-btn secondary" onclick="openPartyModal()">👥 PARTY</button>
            <button class="menu-btn settings" onclick="openSettings()">⚙️ SETTINGS</button>
        </div>
    </div>

    <div id="header">
        <div class="header-content">
            <div class="header-stat"><div class="stat-label">CREDITS</div><div class="stat-value" id="credits">500</div></div>
            <button onclick="exitToMenu()" style="background: #ff4444; color: white; padding: 10px 20px; border: none; cursor: pointer; border-radius: 5px; font-weight: bold;">← MENU</button>
        </div>
    </div>

    <canvas id="shipCanvas"></canvas>

    <div id="missionModal">
        <button class="close-modal" onclick="closeMissionModal()">✕</button>
        <div class="missionBox">
            <h2>🚀 SELECT MISSION</h2>
            <div id="planetsList"></div>
        </div>
    </div>

    <script>
        const game = {
            credits: 500,
            missions: 0,
            cleared: [],
            planets: [
                { id: 1, name: 'Kepler-452b', desc: 'Desert world', diff: 'easy', aliens: 5, reward: 100 },
                { id: 2, name: 'Proxima-3', desc: 'Ice planet', diff: 'medium', aliens: 8, reward: 200 },
                { id: 3, name: 'TRAPPIST-1e', desc: 'Volcanic hellscape', diff: 'hard', aliens: 12, reward: 400 },
                { id: 4, name: 'Gliese-667', desc: 'Toxic atmosphere', diff: 'medium', aliens: 10, reward: 250 },
                { id: 5, name: 'Wolf-1061c', desc: 'Dense jungle', diff: 'hard', aliens: 15, reward: 500 }
            ]
        };

        const canvas = document.getElementById('shipCanvas');
        const ctx = canvas.getContext('2d');
        let cw = 0, ch = 0;

        // Ship state
        const ship = {
            player: { x: 400, y: 400, w: 15, h: 15, speed: 4 },
            keys: {},
            // FRONT (Control Room)
            controlRoom: { x: 200, y: 50, w: 400, h: 120, name: 'CONTROL ROOM', icon: '🖥️', color: '#4444ff' },
            // CENTER (Mission Table)
            missionTable: { x: 150, y: 220, w: 500, h: 150, name: 'MISSION TABLE', icon: '🗺️', color: '#00ff88' },
            // BACK (Other Rooms)
            armory: { x: 50, y: 420, w: 150, h: 100, name: 'ARMORY', icon: '⚔️', color: '#ff6600' },
            engineering: { x: 250, y: 420, w: 150, h: 100, name: 'ENGINEERING', icon: '⚡', color: '#ff4444' },
            cargo: { x: 450, y: 420, w: 150, h: 100, name: 'CARGO BAY', icon: '📦', color: '#ffaa00' },
            comm: { x: 650, y: 420, w: 150, h: 100, name: 'COMMUNICATIONS', icon: '📡', color: '#00aaff' }
        };

        function startGame() {
            document.getElementById('mainMenu').style.display = 'none';
            document.getElementById('header').style.display = 'block';
            document.getElementById('shipCanvas').style.display = 'block';
            cw = canvas.clientWidth;
            ch = canvas.clientHeight;
            canvas.width = cw;
            canvas.height = ch;
            
            // Start player at center
            ship.player.x = cw / 2 - ship.player.w / 2;
            ship.player.y = ch / 2;
            
            gameLoop();
        }

        function exitToMenu() {
            document.getElementById('mainMenu').style.display = 'flex';
            document.getElementById('header').style.display = 'none';
            document.getElementById('shipCanvas').style.display = 'none';
        }

        function gameLoop() {
            update();
            draw();
            if (document.getElementById('shipCanvas').style.display !== 'none') {
                requestAnimationFrame(gameLoop);
            }
        }

        function update() {
            // Player movement
            if (ship.keys['ArrowUp'] || ship.keys['w'] || ship.keys['W']) ship.player.y -= ship.player.speed;
            if (ship.keys['ArrowDown'] || ship.keys['s'] || ship.keys['S']) ship.player.y += ship.player.speed;
            if (ship.keys['ArrowLeft'] || ship.keys['a'] || ship.keys['A']) ship.player.x -= ship.player.speed;
            if (ship.keys['ArrowRight'] || ship.keys['d'] || ship.keys['D']) ship.player.x += ship.player.speed;

            // Boundary check
            ship.player.x = Math.max(0, Math.min(cw - ship.player.w, ship.player.x));
            ship.player.y = Math.max(0, Math.min(ch - ship.player.h, ship.player.y));
        }

        function draw() {
            // Background with gradient
            const gradient = ctx.createLinearGradient(0, 0, 0, ch);
            gradient.addColorStop(0, '#0a0e27');
            gradient.addColorStop(1, '#1a1f3a');
            ctx.fillStyle = gradient;
            ctx.fillRect(0, 0, cw, ch);

            // Draw rooms
            drawRoom(ship.controlRoom);
            drawRoom(ship.missionTable);
            drawRoom(ship.armory);
            drawRoom(ship.engineering);
            drawRoom(ship.cargo);
            drawRoom(ship.comm);

            // Draw player
            ctx.fillStyle = '#00ff88';
            ctx.beginPath();
            ctx.arc(ship.player.x + ship.player.w / 2, ship.player.y + ship.player.h / 2, ship.player.w, 0, Math.PI * 2);
            ctx.fill();
            ctx.strokeStyle = '#00ff88';
            ctx.lineWidth = 2;
            ctx.stroke();

            // Draw HUD
            ctx.fillStyle = '#00ff88';
            ctx.font = '14px Arial';
            ctx.textAlign = 'left';
            ctx.fillText('WASD or ARROW KEYS to move | E or CLICK to interact', 20, 30);

            // Check if player is in a room
            let inRoom = null;
            const rooms = [ship.controlRoom, ship.missionTable, ship.armory, ship.engineering, ship.cargo, ship.comm];
            rooms.forEach(room => {
                if (ship.player.x + ship.player.w > room.x &&
                    ship.player.x < room.x + room.w &&
                    ship.player.y + ship.player.h > room.y &&
                    ship.player.y < room.y + room.h) {
                    inRoom = room;
                }
            });

            if (inRoom) {
                ctx.fillStyle = '#ffaa00';
                ctx.font = 'bold 16px Arial';
                ctx.textAlign = 'center';
                ctx.fillText(`Press E or Click to enter ${inRoom.name}`, cw / 2, ch - 40);
            }
        }

        function drawRoom(room) {
            // Room background
            ctx.fillStyle = room.color;
            ctx.globalAlpha = 0.15;
            ctx.fillRect(room.x, room.y, room.w, room.h);
            ctx.globalAlpha = 1.0;

            // Room border
            ctx.strokeStyle = room.color;
            ctx.lineWidth = 3;
            ctx.strokeRect(room.x, room.y, room.w, room.h);

            // Room icon
            ctx.fillStyle = room.color;
            ctx.font = 'bold 32px Arial';
            ctx.textAlign = 'center';
            ctx.fillText(room.icon, room.x + room.w / 2, room.y + room.h / 2 - 5);

            // Room name
            ctx.fillStyle = room.color;
            ctx.font = 'bold 14px Arial';
            ctx.textAlign = 'center';
            ctx.fillText(room.name, room.x + room.w / 2, room.y + room.h / 2 + 25);
        }

        document.addEventListener('keydown', (e) => {
            ship.keys[e.key] = true;
            if (e.key === 'e' || e.key === 'E') {
                const rooms = [ship.controlRoom, ship.missionTable, ship.armory, ship.engineering, ship.cargo, ship.comm];
                rooms.forEach(room => {
                    if (ship.player.x + ship.player.w > room.x &&
                        ship.player.x < room.x + room.w &&
                        ship.player.y + ship.player.h > room.y &&
                        ship.player.y < room.y + room.h) {
                        roomClicked(room);
                    }
                });
            }
        });

        document.addEventListener('keyup', (e) => {
            ship.keys[e.key] = false;
        });

        canvas.addEventListener('click', (e) => {
            const rect = canvas.getBoundingClientRect();
            const x = e.clientX - rect.left;
            const y = e.clientY - rect.top;

            const rooms = [ship.controlRoom, ship.missionTable, ship.armory, ship.engineering, ship.cargo, ship.comm];
            rooms.forEach(room => {
                if (x > room.x && x < room.x + room.w && y > room.y && y < room.y + room.h) {
                    roomClicked(room);
                }
            });
        });

        function roomClicked(room) {
            if (room === ship.missionTable) {
                openMissionModal();
            } else {
                alert(`🚧 ${room.name} coming soon!`);
            }
        }

        function openMissionModal() {
            const list = document.getElementById('planetsList');
            list.innerHTML = '';
            game.planets.forEach(p => {
                const cleared = game.cleared.includes(p.id);
                list.innerHTML += `
                    <div class="planet-card" onclick="selectMission(${p.id})">
                        <div class="planet-name">🪐 ${p.name}</div>
                        <div class="planet-info">${p.desc}</div>
                        <div class="difficulty ${p.diff}">${p.diff.toUpperCase()}</div>
                        <div class="planet-info">👽 ${p.aliens} aliens | 💰 ${p.reward} credits</div>
                        <button class="planet-btn" ${cleared ? 'disabled' : ''}>${cleared ? 'CLEARED' : 'LAUNCH MISSION'}</button>
                    </div>
                `;
            });
            document.getElementById('missionModal').classList.add('show');
        }

        function closeMissionModal() {
            document.getElementById('missionModal').classList.remove('show');
        }

        function selectMission(planetId) {
            alert(`🚀 Launching mission to planet ${planetId}!\n(Gameplay coming soon!)`);
            closeMissionModal();
        }

        function openPartyModal() {
            alert('👥 Party system coming soon!');
        }

        function openSettings() {
            alert('⚙️ Settings coming soon!');
        }
    </script>
</body>
</html>
