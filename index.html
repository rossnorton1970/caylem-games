<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Planet Hunters</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Arial', sans-serif;
            background: #0a0e27;
            color: #e0e0e0;
            overflow: hidden;
        }

        #gameContainer {
            width: 100vw;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        #header {
            background: #1a1f3a;
            padding: 15px 20px;
            border-bottom: 2px solid #00ff88;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .header-section {
            display: flex;
            gap: 30px;
        }

        .stat {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        .stat-label {
            font-size: 12px;
            color: #888;
            text-transform: uppercase;
        }

        .stat-value {
            font-size: 24px;
            font-weight: bold;
            color: #00ff88;
        }

        #main {
            flex: 1;
            display: flex;
            overflow: hidden;
        }

        #screen {
            flex: 1;
            background: #0a0e27;
            position: relative;
            overflow: hidden;
        }

        /* MOTHERSHIP SCREEN */
        #mothership {
            display: none;
            flex-direction: column;
            padding: 40px;
            overflow-y: auto;
        }

        #mothership.active {
            display: flex;
        }

        .section {
            margin-bottom: 40px;
        }

        .section-title {
            font-size: 24px;
            font-weight: bold;
            color: #00ff88;
            margin-bottom: 20px;
            text-transform: uppercase;
            border-bottom: 1px solid #00ff88;
            padding-bottom: 10px;
        }

        .planets-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .planet-card {
            background: #1a1f3a;
            border: 2px solid #444;
            padding: 20px;
            cursor: pointer;
            transition: all 0.3s;
            border-radius: 5px;
        }

        .planet-card:hover {
            border-color: #00ff88;
            background: #2a2f4a;
        }

        .planet-card.cleared {
            opacity: 0.6;
            border-color: #00aa44;
        }

        .planet-name {
            font-size: 18px;
            font-weight: bold;
            margin-bottom: 10px;
        }

        .planet-info {
            font-size: 12px;
            color: #aaa;
            margin-bottom: 10px;
        }

        .planet-difficulty {
            font-size: 14px;
            margin-bottom: 15px;
        }

        .difficulty-easy { color: #00ff88; }
        .difficulty-medium { color: #ffaa00; }
        .difficulty-hard { color: #ff4444; }

        .mission-btn {
            background: #00ff88;
            color: #0a0e27;
            border: none;
            padding: 10px 20px;
            font-weight: bold;
            cursor: pointer;
            border-radius: 3px;
            transition: all 0.3s;
            width: 100%;
        }

        .mission-btn:hover:not(:disabled) {
            background: #00dd77;
        }

        .mission-btn:disabled {
            background: #666;
            cursor: not-allowed;
            opacity: 0.6;
        }

        /* SHOP */
        .shop-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin-bottom: 30px;
        }

        .shop-item {
            background: #1a1f3a;
            border: 1px solid #444;
            padding: 15px;
            border-radius: 3px;
            text-align: center;
        }

        .item-name {
            font-weight: bold;
            margin-bottom: 5px;
        }

        .item-price {
            color: #ffaa00;
            font-size: 14px;
            margin-bottom: 10px;
        }

        .buy-btn {
            background: #4444ff;
            color: white;
            border: none;
            padding: 8px 15px;
            cursor: pointer;
            width: 100%;
            border-radius: 3px;
            font-weight: bold;
            transition: all 0.3s;
        }

        .buy-btn:hover:not(:disabled) {
            background: #3333dd;
        }

        .buy-btn:disabled {
            background: #666;
            cursor: not-allowed;
            opacity: 0.6;
        }

        /* COMBAT SCREEN */
        #combat {
            display: none;
        }

        #combat.active {
            display: flex;
            flex-direction: column;
        }

        #gameCanvas {
            flex: 1;
            background: linear-gradient(135deg, #1a1f3a 0%, #2a2f4a 100%);
            cursor: crosshair;
        }

        #combatUI {
            background: #1a1f3a;
            padding: 15px 20px;
            border-top: 2px solid #00ff88;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .player-stats {
            display: flex;
            gap: 30px;
        }

        .health-bar-container {
            width: 200px;
        }

        .bar-label {
            font-size: 12px;
            color: #888;
            margin-bottom: 5px;
        }

        .bar {
            width: 100%;
            height: 20px;
            background: #333;
            border: 1px solid #666;
            position: relative;
            overflow: hidden;
            border-radius: 3px;
        }

        .bar-fill {
            height: 100%;
            transition: width 0.3s;
            position: absolute;
            top: 0;
            left: 0;
        }

        .shield-fill {
            background: linear-gradient(90deg, #4444ff, #0088ff);
        }

        .health-fill {
            background: linear-gradient(90deg, #ff4444, #ff0000);
        }

        .timer {
            text-align: center;
            font-size: 32px;
            font-weight: bold;
            color: #ffaa00;
            min-width: 100px;
        }

        .timer.warning {
            color: #ff4444;
            animation: pulse 0.5s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.7; }
        }

        .tactical-tools {
            display: flex;
            gap: 10px;
        }

        .tool-btn {
            background: #ff6600;
            color: white;
            border: none;
            padding: 10px 15px;
            cursor: pointer;
            border-radius: 3px;
            font-weight: bold;
            transition: all 0.3s;
        }

        .tool-btn:hover:not(:disabled) {
            background: #ff5500;
        }

        .tool-btn:disabled {
            background: #666;
            cursor: not-allowed;
            opacity: 0.6;
        }

        #missionResult {
            display: none;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(10, 14, 39, 0.95);
            padding: 40px;
            border: 2px solid #00ff88;
            text-align: center;
            z-index: 100;
            border-radius: 10px;
            min-width: 300px;
        }

        #missionResult h2 {
            font-size: 32px;
            margin-bottom: 20px;
        }

        #missionResult.success {
            border-color: #00ff88;
        }

        #missionResult.success h2 {
            color: #00ff88;
        }

        #missionResult.failure {
            border-color: #ff4444;
        }

        #missionResult.failure h2 {
            color: #ff4444;
        }

        .mission-reward {
            font-size: 18px;
            color: #ffaa00;
            margin: 20px 0;
        }

        .return-btn {
            background: #00ff88;
            color: #0a0e27;
            border: none;
            padding: 12px 30px;
            font-weight: bold;
            cursor: pointer;
            border-radius: 3px;
            font-size: 16px;
            margin-top: 20px;
            transition: all 0.3s;
        }

        .return-btn:hover {
            background: #00dd77;
        }

        .alien-count {
            font-size: 18px;
            color: #ffaa00;
        }
    </style>
</head>
<body>
    <div id="gameContainer">
        <div id="header">
            <div class="header-section">
                <div class="stat">
                    <span class="stat-label">CREDITS</span>
                    <span class="stat-value" id="creditsDisplay">500</span>
                </div>
                <div class="stat">
                    <span class="stat-label">WEAPON</span>
                    <span class="stat-value" id="weaponDisplay">Basic Laser</span>
                </div>
            </div>
            <div class="header-section">
                <div class="stat">
                    <span class="stat-label">MISSIONS COMPLETED</span>
                    <span class="stat-value" id="missionsDisplay">0</span>
                </div>
            </div>
        </div>

        <div id="main">
            <div id="screen">
                <!-- MOTHERSHIP SCREEN -->
                <div id="mothership" class="active">
                    <div class="section">
                        <div class="section-title">🚀 Available Missions</div>
                        <div id="planetsList" class="planets-grid"></div>
                    </div>

                    <div class="section">
                        <div class="section-title">⚔️ Weapon Shop</div>
                        <div id="shopList" class="shop-grid"></div>
                    </div>
                </div>

                <!-- COMBAT SCREEN -->
                <div id="combat">
                    <canvas id="gameCanvas"></canvas>
                    <div id="missionResult">
                        <h2 id="resultTitle">Mission Complete!</h2>
                        <div class="mission-reward" id="rewardText"></div>
                        <button class="return-btn" onclick="returnToMothership()">Return to Mothership</button>
                    </div>
                    <div id="combatUI">
                        <div class="player-stats">
                            <div class="health-bar-container">
                                <div class="bar-label">SHIELD</div>
                                <div class="bar">
                                    <div class="bar-fill shield-fill" id="shieldBar" style="width: 100%"></div>
                                </div>
                            </div>
                            <div class="health-bar-container">
                                <div class="bar-label">HEALTH</div>
                                <div class="bar">
                                    <div class="bar-fill health-fill" id="healthBar" style="width: 100%"></div>
                                </div>
                            </div>
                        </div>
                        <div class="alien-count">
                            <span id="alienCount">0</span> ALIENS REMAINING
                        </div>
                        <div class="timer" id="timer">25:00</div>
                        <div class="tactical-tools">
                            <button class="tool-btn" id="orbitalBtn" onclick="useTacticalTool('orbital')">
                                ORBITAL<br><span id="orbitalCount">0</span>
                            </button>
                            <button class="tool-btn" id="bombBtn" onclick="useTacticalTool('bomb')">
                                BOMB<br><span id="bombCount">0</span>
                            </button>
                            <button class="tool-btn" id="laserBtn" onclick="useTacticalTool('laser')">
                                LASER<br><span id="laserCount">0</span>
                            </button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // GAME STATE
        const gameState = {
            credits: 500,
            currentWeapon: 'basic',
            missionsCompleted: 0,
            clearedPlanets: [],
            inventory: {
                orbital: 5,
                bomb: 5,
                laser: 5
            },
            weapons: {
                basic: { name: 'Basic Laser', damage: 10, price: 0 },
                plasma: { name: 'Plasma Rifle', damage: 20, price: 150 },
                pulse: { name: 'Pulse Cannon', damage: 35, price: 350 },
                nova: { name: 'Nova Blaster', damage: 50, price: 700 }
            },
            planets: [
                { id: 1, name: 'Kepler-452b', description: 'Desert world', difficulty: 'easy', alienCount: 5, reward: 100 },
                { id: 2, name: 'Proxima-3', description: 'Ice planet', difficulty: 'medium', alienCount: 8, reward: 200 },
                { id: 3, name: 'TRAPPIST-1e', description: 'Volcanic hellscape', difficulty: 'hard', alienCount: 12, reward: 400 },
                { id: 4, name: 'Gliese-667', description: 'Toxic atmosphere', difficulty: 'medium', alienCount: 10, reward: 250 },
                { id: 5, name: 'Wolf-1061c', description: 'Dense jungle', difficulty: 'hard', alienCount: 15, reward: 500 }
            ]
        };

        // COMBAT STATE
        let combatState = {
            currentPlanet: null,
            missionTime: 25 * 60, // 25 minutes in seconds
            isRunning: false,
            player: {
                x: 400,
                y: 500,
                width: 30,
                height: 30,
                shield: 100,
                maxShield: 100,
                health: 100,
                maxHealth: 100,
                shieldRegenRate: 0.5,
                lastDamageTime: 0,
                damage: 10
            },
            aliens: [],
            bullets: [],
            explosions: [],
            toolEffects: [],
            missionComplete: false,
            missionSuccess: false
        };

        // CANVAS & DRAWING
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas ? canvas.getContext('2d') : null;

        function resizeCanvas() {
            if (canvas) {
                canvas.width = canvas.parentElement.clientWidth;
                canvas.height = canvas.parentElement.clientHeight;
            }
        }

        // LOAD GAME STATE
        function loadGameState() {
            const saved = localStorage.getItem('planetHuntersState');
            if (saved) {
                const loaded = JSON.parse(saved);
                gameState.credits = loaded.credits;
                gameState.currentWeapon = loaded.currentWeapon;
                gameState.missionsCompleted = loaded.missionsCompleted;
                gameState.clearedPlanets = loaded.clearedPlanets;
                gameState.inventory = loaded.inventory;
            }
            updateUI();
        }

        function saveGameState() {
            localStorage.setItem('planetHuntersState', JSON.stringify({
                credits: gameState.credits,
                currentWeapon: gameState.currentWeapon,
                missionsCompleted: gameState.missionsCompleted,
                clearedPlanets: gameState.clearedPlanets,
                inventory: gameState.inventory
            }));
        }

        // UI UPDATES
        function updateUI() {
            document.getElementById('creditsDisplay').textContent = gameState.credits;
            document.getElementById('weaponDisplay').textContent = gameState.weapons[gameState.currentWeapon].name;
            document.getElementById('missionsDisplay').textContent = gameState.missionsCompleted;
            renderPlanets();
            renderShop();
        }

        function renderPlanets() {
            const planetsList = document.getElementById('planetsList');
            planetsList.innerHTML = '';
            gameState.planets.forEach(planet => {
                const cleared = gameState.clearedPlanets.includes(planet.id);
                const card = document.createElement('div');
                card.className = `planet-card ${cleared ? 'cleared' : ''}`;
                card.innerHTML = `
                    <div class="planet-name">🪐 ${planet.name}</div>
                    <div class="planet-info">${planet.description}</div>
                    <div class="planet-difficulty difficulty-${planet.difficulty}">${planet.difficulty.toUpperCase()}</div>
                    <div class="planet-info">${planet.alienCount} aliens | Reward: ${planet.reward} credits</div>
                    <button class="mission-btn" ${cleared ? 'disabled' : ''} onclick="startMission(${planet.id})">
                        ${cleared ? 'CLEARED' : 'START MISSION'}
                    </button>
                `;
                planetsList.appendChild(card);
            });
        }

        function renderShop() {
            const shopList = document.getElementById('shopList');
            shopList.innerHTML = '';
            Object.entries(gameState.weapons).forEach(([key, weapon]) => {
                const isOwned = gameState.currentWeapon === key;
                const canAfford = gameState.credits >= weapon.price;
                const item = document.createElement('div');
                item.className = 'shop-item';
                item.innerHTML = `
                    <div class="item-name">⚔️ ${weapon.name}</div>
                    <div class="item-price">${weapon.price === 0 ? 'STARTER' : weapon.price + ' CREDITS'}</div>
                    <button class="buy-btn" ${isOwned || !canAfford ? 'disabled' : ''} onclick="buyWeapon('${key}')">
                        ${isOwned ? 'EQUIPPED' : canAfford ? 'BUY' : 'CANT AFFORD'}
                    </button>
                `;
                shopList.appendChild(item);
            });
        }

        function buyWeapon(weaponKey) {
            const weapon = gameState.weapons[weaponKey];
            if (gameState.credits >= weapon.price) {
                gameState.credits -= weapon.price;
                gameState.currentWeapon = weaponKey;
                combatState.player.damage = weapon.damage;
                saveGameState();
                updateUI();
            }
        }

        // MISSION START
        function startMission(planetId) {
            const planet = gameState.planets.find(p => p.id === planetId);
            if (!planet) return;

            combatState.currentPlanet = planet;
            combatState.missionTime = 25 * 60;
            combatState.missionComplete = false;
            combatState.missionSuccess = false;
            combatState.isRunning = true;
            combatState.player.shield = combatState.player.maxShield;
            combatState.player.health = combatState.player.maxHealth;
            combatState.player.damage = gameState.weapons[gameState.currentWeapon].damage;
            combatState.aliens = [];
            combatState.bullets = [];
            combatState.explosions = [];
            combatState.toolEffects = [];

            // Spawn aliens
            for (let i = 0; i < planet.alienCount; i++) {
                spawnAlien();
            }

            // Switch screens
            document.getElementById('mothership').classList.remove('active');
            document.getElementById('combat').classList.add('active');

            resizeCanvas();
            gameLoop();
        }

        function spawnAlien() {
            const sizes = ['small', 'medium', 'large'];
            const size = sizes[Math.floor(Math.random() * sizes.length)];
            let width, height, health, damage, speed;

            if (size === 'small') {
                width = 15; height = 15; health = 20; damage = 5; speed = 2;
            } else if (size === 'medium') {
                width = 25; height = 25; health = 40; damage = 10; speed = 1.5;
            } else {
                width = 40; height = 40; health = 80; damage = 20; speed = 1;
            }

            const alien = {
                x: Math.random() * (canvas.width - width),
                y: Math.random() * (canvas.height * 0.6),
                width, height, health, maxHealth: health, damage, speed, size,
                angle: Math.random() * Math.PI * 2,
                shootTimer: Math.random() * 60 + 30
            };
            combatState.aliens.push(alien);
        }

        // GAME LOOP
        function gameLoop() {
            update();
            draw();
            if (combatState.isRunning && !combatState.missionComplete) {
                requestAnimationFrame(gameLoop);
            }
        }

        function update() {
            // Timer
            combatState.missionTime--;
            if (combatState.missionTime <= 0) {
                endMission(false, 'TIME OUT!');
            }

            // Shield regen
            if (combatState.player.lastDamageTime + 120 < Date.now() / 16.67) {
                combatState.player.shield = Math.min(
                    combatState.player.maxShield,
                    combatState.player.shield + combatState.player.shieldRegenRate
                );
            }

            // Update aliens
            combatState.aliens = combatState.aliens.filter(alien => alien.health > 0);

            for (let alien of combatState.aliens) {
                // Move toward player
                const dx = combatState.player.x - alien.x;
                const dy = combatState.player.y - alien.y;
                const distance = Math.sqrt(dx * dx + dy * dy);
                if (distance > 0) {
                    alien.x += (dx / distance) * alien.speed;
                    alien.y += (dy / distance) * alien.speed;
                    alien.angle = Math.atan2(dy, dx);
                }

                // Shoot
                alien.shootTimer--;
                if (alien.shootTimer <= 0) {
                    const bullet = {
                        x: alien.x + Math.cos(alien.angle) * alien.width / 2,
                        y: alien.y + Math.sin(alien.angle) * alien.height / 2,
                        vx: Math.cos(alien.angle) * 3,
                        vy: Math.sin(alien.angle) * 3,
                        damage: alien.damage
                    };
                    combatState.bullets.push(bullet);
                    alien.shootTimer = Math.random() * 60 + 30;
                }
            }

            // Update bullets
            combatState.bullets = combatState.bullets.filter(b => {
                b.x += b.vx;
                b.y += b.vy;

                // Check collision with player
                if (b.x > combatState.player.x && b.x < combatState.player.x + combatState.player.width &&
                    b.y > combatState.player.y && b.y < combatState.player.y + combatState.player.height) {
                    hitPlayer(b.damage);
                    return false;
                }

                return b.x > 0 && b.x < canvas.width && b.y > 0 && b.y < canvas.height;
            });

            // Update explosions
            combatState.explosions = combatState.explosions.filter(e => {
                e.life--;
                return e.life > 0;
            });

            // Update tool effects
            combatState.toolEffects = combatState.toolEffects.filter(e => {
                e.life--;
                return e.life > 0;
            });

            // Check win condition
            if (combatState.aliens.length === 0 && !combatState.missionComplete) {
                endMission(true, 'MISSION COMPLETE!');
            }
        }

        function hitPlayer(damage) {
            combatState.player.lastDamageTime = Date.now() / 16.67;
            if (combatState.player.shield > 0) {
                combatState.player.shield = Math.max(0, combatState.player.shield - damage);
                if (combatState.player.shield === 0 && damage > 0) {
                    damage -= combatState.player.shield;
                }
            }
            if (combatState.player.shield <= 0 && damage > 0) {
                combatState.player.health = Math.max(0, combatState.player.health - damage);
            }
            if (combatState.player.health <= 0) {
                endMission(false, 'YOU DIED!');
            }
        }

        function draw() {
            ctx.fillStyle = '#0a0e27';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Draw aliens
            for (let alien of combatState.aliens) {
                ctx.save();
                ctx.translate(alien.x, alien.y);
                ctx.rotate(alien.angle);

                // Color by size
                if (alien.size === 'small') ctx.fillStyle = '#00ff88';
                else if (alien.size === 'medium') ctx.fillStyle = '#ffaa00';
                else ctx.fillStyle = '#ff4444';

                ctx.fillRect(-alien.width / 2, -alien.height / 2, alien.width, alien.height);
                ctx.restore();

                // Health bar
                const barWidth = alien.width;
                const barX = alien.x - barWidth / 2;
                const barY = alien.y - alien.height / 2 - 10;
                ctx.fillStyle = '#333';
                ctx.fillRect(barX, barY, barWidth, 5);
                ctx.fillStyle = '#00ff88';
                ctx.fillRect(barX, barY, (alien.health / alien.maxHealth) * barWidth, 5);
            }

            // Draw player
            ctx.fillStyle = '#4444ff';
            ctx.fillRect(combatState.player.x - combatState.player.width / 2, combatState.player.y - combatState.player.height / 2, combatState.player.width, combatState.player.height);

            // Draw bullets
            ctx.fillStyle = '#ffff00';
            for (let bullet of combatState.bullets) {
                ctx.fillRect(bullet.x - 2, bullet.y - 2, 4, 4);
            }

            // Draw explosions
            for (let explosion of combatState.explosions) {
                ctx.fillStyle = `rgba(255, 100, 0, ${explosion.life / explosion.maxLife})`;
                ctx.beginPath();
                ctx.arc(explosion.x, explosion.y, explosion.radius * (1 - explosion.life / explosion.maxLife), 0, Math.PI * 2);
                ctx.fill();
            }

            // Draw tool effects
            for (let effect of combatState.toolEffects) {
                ctx.strokeStyle = `rgba(255, 100, 0, ${effect.life / effect.maxLife})`;
                ctx.lineWidth = 2;
                ctx.beginPath();
                ctx.arc(effect.x, effect.y, effect.radius, 0, Math.PI * 2);
                ctx.stroke();
            }

            // Update UI
            updateCombatUI();
        }

        function updateCombatUI() {
            const shieldPercent = (combatState.player.shield / combatState.player.maxShield) * 100;
            const healthPercent = (combatState.player.health / combatState.player.maxHealth) * 100;

            document.getElementById('shieldBar').style.width = shieldPercent + '%';
            document.getElementById('healthBar').style.width = healthPercent + '%';
            document.getElementById('alienCount').textContent = combatState.aliens.length;

            const minutes = Math.floor(combatState.missionTime / 60);
            const seconds = combatState.missionTime % 60;
            const timeStr = `${minutes}:${seconds.toString().padStart(2, '0')}`;
            const timerEl = document.getElementById('timer');
            timerEl.textContent = timeStr;

            if (combatState.missionTime < 300) { // 5 minutes
                timerEl.classList.add('warning');
            } else {
                timerEl.classList.remove('warning');
            }

            document.getElementById('orbitalCount').textContent = gameState.inventory.orbital;
            document.getElementById('bombCount').textContent = gameState.inventory.bomb;
            document.getElementById('laserCount').textContent = gameState.inventory.laser;

            document.getElementById('orbitalBtn').disabled = gameState.inventory.orbital === 0;
            document.getElementById('bombBtn').disabled = gameState.inventory.bomb === 0;
            document.getElementById('laserBtn').disabled = gameState.inventory.laser === 0;
        }

        // COMBAT INPUT
        if (canvas) {
            canvas.addEventListener('click', (e) => {
                const rect = canvas.getBoundingClientRect();
                const x = e.clientX - rect.left;
                const y = e.clientY - rect.top;

                // Fire bullet
                for (let alien of combatState.aliens) {
                    const dx = x - alien.x;
                    const dy = y - alien.y;
                    const distance = Math.sqrt(dx * dx + dy * dy);

                    if (distance < 50) { // Hit radius
                        alien.health -= combatState.player.damage;
                        if (alien.health <= 0) {
                            combatState.explosions.push({
                                x: alien.x,
                                y: alien.y,
                                radius: alien.width * 2,
                                life: 30,
                                maxLife: 30
                            });
                        }
                        break;
                    }
                }
            });
        }

        function useTacticalTool(tool) {
            if (gameState.inventory[tool] <= 0) return;

            gameState.inventory[tool]--;
            const effect = {
                x: Math.random() * (canvas.width - 100) + 50,
                y: Math.random() * (canvas.height * 0.6) + 50,
                radius: 100,
                life: 60,
                maxLife: 60,
                type: tool
            };

            combatState.toolEffects.push(effect);

            // Damage aliens in radius
            for (let alien of combatState.aliens) {
                const dx = alien.x - effect.x;
                const dy = alien.y - effect.y;
                const distance = Math.sqrt(dx * dx + dy * dy);

                if (distance < effect.radius) {
                    let damage = 0;
                    if (tool === 'orbital') damage = 50;
                    else if (tool === 'bomb') damage = 40;
                    else if (tool === 'laser') damage = 30;

                    alien.health -= damage;
                    if (alien.health <= 0) {
                        combatState.explosions.push({
                            x: alien.x,
                            y: alien.y,
                            radius: alien.width * 2,
                            life: 30,
                            maxLife: 30
                        });
                    }
                }
            }
        }

        function endMission(success, message) {
            combatState.missionComplete = true;
            combatState.isRunning = false;
            combatState.missionSuccess = success;

            const resultEl = document.getElementById('missionResult');
            const resultTitle = document.getElementById('resultTitle');
            const rewardText = document.getElementById('rewardText');

            if (success) {
                resultEl.classList.remove('failure');
                resultEl.classList.add('success');
                resultTitle.textContent = message;
                const reward = combatState.currentPlanet.reward;
                gameState.credits += reward;
                gameState.missionsCompleted++;
                gameState.clearedPlanets.push(combatState.currentPlanet.id);
                rewardText.textContent = `+${reward} CREDITS`;
            } else {
                resultEl.classList.remove('success');
                resultEl.classList.add('failure');
                resultTitle.textContent = message;
                rewardText.textContent = 'Mission Failed';
            }

            saveGameState();
            resultEl.style.display = 'block';
        }

        function returnToMothership() {
            document.getElementById('missionResult').style.display = 'none';
            document.getElementById('combat').classList.remove('active');
            document.getElementById('mothership').classList.add('active');
            updateUI();
        }

        // INIT
        loadGameState();
    </script>
</body>
</html>
