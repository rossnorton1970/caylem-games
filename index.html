<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Planet Hunters</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        body { font-family: Arial, sans-serif; background: #0a0e27; color: #e0e0e0; }
        
        #mainMenu { display: flex; flex-direction: column; justify-content: center; align-items: center; height: 100vh; background: linear-gradient(135deg, #0a0e27 0%, #1a1f3a 100%); }
        .menu-title { font-size: 64px; color: #00ff88; margin-bottom: 20px; text-shadow: 0 0 20px #00ff88; }
        .menu-subtitle { font-size: 20px; color: #ffaa00; margin-bottom: 40px; }
        .menu-buttons { display: flex; gap: 15px; flex-direction: column; width: 300px; }
        .menu-btn { background: #00ff88; color: #0a0e27; padding: 15px; font-size: 18px; font-weight: bold; border: none; border-radius: 10px; cursor: pointer; }
        .menu-btn:hover { background: #00dd77; }
        .menu-btn.secondary { background: #4444ff; color: white; }
        .menu-btn.secondary:hover { background: #3333dd; }
        .menu-btn.settings { background: #ffaa00; color: #0a0e27; }
        .menu-btn.settings:hover { background: #ff9900; }
        
        #shipCanvas { display: none; width: 100%; height: 100%; background: #0a0e27; cursor: move; }
        
        #header { background: #1a1f3a; padding: 15px 30px; border-bottom: 2px solid #00ff88; display: none; }
        .header-content { display: flex; justify-content: space-between; align-items: center; }
        .header-stat { margin: 0 20px; }
        .stat-label { font-size: 12px; color: #888; }
        .stat-value { font-size: 24px; color: #00ff88; font-weight: bold; }
        
        #partyModal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 101; align-items: center; justify-content: center; }
        #partyModal.show { display: flex; }
        .partyBox { background: rgba(10, 14, 39, 0.98); padding: 40px; border: 2px solid #00ff88; border-radius: 10px; min-width: 500px; max-height: 80vh; overflow-y: auto; }
        .partyBox h2 { color: #00ff88; margin-bottom: 20px; font-size: 28px; }
        .party-options { display: flex; gap: 10px; margin-bottom: 20px; }
        .party-option-btn { flex: 1; padding: 10px; background: #1a1f3a; border: 2px solid #444; color: #e0e0e0; cursor: pointer; font-weight: bold; }
        .party-option-btn.active { background: #00ff88; color: #0a0e27; border-color: #00ff88; }
        .party-form { display: none; }
        .party-form.show { display: block; }
        .party-form input, .party-form select { width: 100%; padding: 10px; margin: 10px 0; background: #1a1f3a; border: 1px solid #444; color: #e0e0e0; }
        .party-form input::placeholder { color: #666; }
        .party-form button { width: 100%; padding: 12px; background: #00ff88; color: #0a0e27; font-weight: bold; border: none; cursor: pointer; margin-top: 10px; border-radius: 5px; }
        .party-form button:hover { background: #00dd77; }
        .party-list { margin-top: 20px; }
        .party-item { background: #1a1f3a; padding: 15px; margin: 10px 0; border: 1px solid #444; border-radius: 5px; }
        .party-item-name { color: #00ff88; font-weight: bold; margin-bottom: 5px; }
        .party-item-info { font-size: 12px; color: #aaa; margin: 5px 0; }
        .party-item-btn { background: #4444ff; color: white; padding: 8px; width: 100%; margin-top: 10px; border: none; cursor: pointer; border-radius: 3px; }
        .party-item-btn:hover { background: #3333dd; }
        .close-modal { position: absolute; top: 20px; right: 20px; background: #ff4444; color: white; border: none; width: 40px; height: 40px; font-size: 24px; cursor: pointer; border-radius: 5px; }
    </style>
</head>
<body>
    <div id="mainMenu">
        <h1 class="menu-title">⭐ PLANET HUNTERS ⭐</h1>
        <p class="menu-subtitle">Explore. Fight. Survive.</p>
        <div class="menu-buttons">
            <button class="menu-btn" onclick="startGame()">START GAME</button>
            <button class="menu-btn secondary" onclick="openPartyModal()">👥 PARTY</button>
            <button class="menu-btn settings" onclick="openSettings()">⚙️ SETTINGS</button>
        </div>
    </div>

    <div id="header">
        <div class="header-content">
            <div class="header-stat"><div class="stat-label">CREDITS</div><div class="stat-value" id="credits">500</div></div>
            <button onclick="exitToMenu()" style="background: #ff4444; color: white; padding: 10px 20px; border: none; cursor: pointer; border-radius: 5px; font-weight: bold;">← MENU</button>
        </div>
    </div>

    <canvas id="shipCanvas"></canvas>

    <div id="partyModal">
        <button class="close-modal" onclick="closePartyModal()">✕</button>
        <div class="partyBox">
            <h2>👥 PARTY SYSTEM</h2>
            <div class="party-options">
                <button class="party-option-btn active" onclick="switchPartyTab(event, 'join')">Join Party</button>
                <button class="party-option-btn" onclick="switchPartyTab(event, 'create')">Create Party</button>
            </div>

            <div id="joinForm" class="party-form show">
                <h3 style="color: #ffaa00; margin-bottom: 15px;">PUBLIC PARTIES</h3>
                <div id="publicPartiesList" class="party-list"></div>
                
                <h3 style="color: #ffaa00; margin-bottom: 15px; margin-top: 20px;">PRIVATE PARTY (NEED CODE)</h3>
                <input type="text" id="privateCode" placeholder="Enter party code" maxlength="6">
                <button onclick="joinPrivateParty()">Join Private Party</button>
            </div>

            <div id="createForm" class="party-form">
                <label style="color: #ffaa00;">Party Type:</label>
                <select id="partyType">
                    <option value="public">🌍 PUBLIC (anyone can join)</option>
                    <option value="private">🔒 PRIVATE (need code)</option>
                </select>
                
                <input type="text" id="partyName" placeholder="Party name (e.g. Cool Hunters)" maxlength="20">
                <input type="text" id="playerName" placeholder="Your name" maxlength="20">
                
                <button onclick="createParty()">Create Party</button>
            </div>
        </div>
    </div>

    <script>
        const game = {
            credits: 500,
            planets: [
                { id: 1, name: 'Kepler-452b', desc: 'Desert world', diff: 'easy', aliens: 5, reward: 100 },
                { id: 2, name: 'Proxima-3', desc: 'Ice planet', diff: 'medium', aliens: 8, reward: 200 },
                { id: 3, name: 'TRAPPIST-1e', desc: 'Volcanic hellscape', diff: 'hard', aliens: 12, reward: 400 },
                { id: 4, name: 'Gliese-667', desc: 'Toxic atmosphere', diff: 'medium', aliens: 10, reward: 250 },
                { id: 5, name: 'Wolf-1061c', desc: 'Dense jungle', diff: 'hard', aliens: 15, reward: 500 }
            ]
        };

        const canvas = document.getElementById('shipCanvas');
        const ctx = canvas.getContext('2d');
        let cw = 0, ch = 0;

        // Ship interior state
        const ship = {
            player: { x: 400, y: 500, w: 20, h: 20, speed: 5 },
            rooms: [
                { name: 'BRIDGE', x: 150, y: 100, w: 150, h: 120, icon: '🖥️', color: '#4444ff' },
                { name: 'ARMORY', x: 450, y: 100, w: 150, h: 120, icon: '⚔️', color: '#ff6600' },
                { name: 'MISSIONS', x: 750, y: 100, w: 150, h: 120, icon: '🚀', color: '#00ff88' },
                { name: 'CARGO', x: 150, y: 280, w: 150, h: 120, icon: '📦', color: '#ffaa00' },
                { name: 'ENGINE', x: 450, y: 280, w: 150, h: 120, icon: '⚡', color: '#ff4444' },
                { name: 'COMM', x: 750, y: 280, w: 150, h: 120, icon: '📡', color: '#00aaff' }
            ],
            keys: {}
        };

        function startGame() {
            document.getElementById('mainMenu').style.display = 'none';
            document.getElementById('header').style.display = 'block';
            document.getElementById('shipCanvas').style.display = 'block';
            cw = canvas.clientWidth;
            ch = canvas.clientHeight;
            canvas.width = cw;
            canvas.height = ch;
            gameLoop();
        }

        function exitToMenu() {
            document.getElementById('mainMenu').style.display = 'flex';
            document.getElementById('header').style.display = 'none';
            document.getElementById('shipCanvas').style.display = 'none';
        }

        function gameLoop() {
            update();
            draw();
            if (document.getElementById('shipCanvas').style.display !== 'none') {
                requestAnimationFrame(gameLoop);
            }
        }

        function update() {
            // Player movement
            if (ship.keys['ArrowUp'] || ship.keys['w']) ship.player.y -= ship.player.speed;
            if (ship.keys['ArrowDown'] || ship.keys['s']) ship.player.y += ship.player.speed;
            if (ship.keys['ArrowLeft'] || ship.keys['a']) ship.player.x -= ship.player.speed;
            if (ship.keys['ArrowRight'] || ship.keys['d']) ship.player.x += ship.player.speed;

            // Boundary check
            ship.player.x = Math.max(0, Math.min(cw - ship.player.w, ship.player.x));
            ship.player.y = Math.max(0, Math.min(ch - ship.player.h, ship.player.y));
        }

        function draw() {
            // Background
            ctx.fillStyle = '#0a0e27';
            ctx.fillRect(0, 0, cw, ch);

            // Draw grid
            ctx.strokeStyle = '#1a1f3a';
            ctx.lineWidth = 1;
            for (let i = 0; i < cw; i += 50) {
                ctx.beginPath();
                ctx.moveTo(i, 0);
                ctx.lineTo(i, ch);
                ctx.stroke();
            }
            for (let i = 0; i < ch; i += 50) {
                ctx.beginPath();
                ctx.moveTo(0, i);
                ctx.lineTo(cw, i);
                ctx.stroke();
            }

            // Draw rooms
            ship.rooms.forEach(room => {
                ctx.fillStyle = room.color;
                ctx.globalAlpha = 0.15;
                ctx.fillRect(room.x, room.y, room.w, room.h);
                ctx.globalAlpha = 1.0;

                // Room border
                ctx.strokeStyle = room.color;
                ctx.lineWidth = 2;
                ctx.strokeRect(room.x, room.y, room.w, room.h);

                // Room label
                ctx.fillStyle = room.color;
                ctx.font = 'bold 14px Arial';
                ctx.textAlign = 'center';
                ctx.fillText(room.icon, room.x + room.w / 2, room.y + room.h / 2 - 10);
                ctx.fillText(room.name, room.x + room.w / 2, room.y + room.h / 2 + 15);
            });

            // Draw player
            ctx.fillStyle = '#00ff88';
            ctx.beginPath();
            ctx.arc(ship.player.x + ship.player.w / 2, ship.player.y + ship.player.h / 2, ship.player.w, 0, Math.PI * 2);
            ctx.fill();

            // Draw HUD
            ctx.fillStyle = '#00ff88';
            ctx.font = '14px Arial';
            ctx.textAlign = 'left';
            ctx.fillText('Use ARROW KEYS or WASD to move', 20, 30);
            ctx.fillText('Click on a room to enter', 20, 50);

            // Check if player is in a room
            let inRoom = null;
            ship.rooms.forEach(room => {
                if (ship.player.x + ship.player.w > room.x &&
                    ship.player.x < room.x + room.w &&
                    ship.player.y + ship.player.h > room.y &&
                    ship.player.y < room.y + room.h) {
                    inRoom = room;
                }
            });

            if (inRoom) {
                ctx.fillStyle = '#ffaa00';
                ctx.font = 'bold 16px Arial';
                ctx.textAlign = 'center';
                ctx.fillText(`Click or Press E to enter ${inRoom.name}`, cw / 2, ch - 40);
            }
        }

        document.addEventListener('keydown', (e) => {
            ship.keys[e.key] = true;
            if (e.key === 'e' || e.key === 'E') {
                ship.rooms.forEach(room => {
                    if (ship.player.x + ship.player.w > room.x &&
                        ship.player.x < room.x + room.w &&
                        ship.player.y + ship.player.h > room.y &&
                        ship.player.y < room.y + room.h) {
                        roomClicked(room.name);
                    }
                });
            }
        });

        document.addEventListener('keyup', (e) => {
            ship.keys[e.key] = false;
        });

        canvas.addEventListener('click', (e) => {
            const rect = canvas.getBoundingClientRect();
            const x = e.clientX - rect.left;
            const y = e.clientY - rect.top;

            ship.rooms.forEach(room => {
                if (x > room.x && x < room.x + room.w && y > room.y && y < room.y + room.h) {
                    roomClicked(room.name);
                }
            });
        });

        function roomClicked(roomName) {
            alert(`🚧 ${roomName} coming soon!`);
        }

        function openPartyModal() {
            document.getElementById('partyModal').classList.add('show');
            loadPublicParties();
        }

        function closePartyModal() {
            document.getElementById('partyModal').classList.remove('show');
        }

        function switchPartyTab(e, tab) {
            document.querySelectorAll('.party-option-btn').forEach(b => b.classList.remove('active'));
            e.target.classList.add('active');
            document.getElementById('joinForm').classList.toggle('show', tab === 'join');
            document.getElementById('createForm').classList.toggle('show', tab === 'create');
            if (tab === 'join') loadPublicParties();
        }

        function loadPublicParties() {
            const list = document.getElementById('publicPartiesList');
            const parties = JSON.parse(localStorage.getItem('publicParties') || '[]');
            list.innerHTML = '';
            if (parties.length === 0) {
                list.innerHTML = '<p style="color: #888; text-align: center;">No public parties yet. Create one!</p>';
            } else {
                parties.forEach(p => {
                    list.innerHTML += `<div class="party-item"><div class="party-item-name">🚀 ${p.name}</div><div class="party-item-info">👤 ${p.players}/${p.maxPlayers} players</div><button class="party-item-btn" onclick="alert('Joining party: ' + '${p.id}')">Join Party</button></div>`;
                });
            }
        }

        function createParty() {
            const type = document.getElementById('partyType').value;
            const name = document.getElementById('partyName').value;
            const pName = document.getElementById('playerName').value;
            
            if (!name || !pName) { alert('Fill in all fields!'); return; }
            
            const partyId = Math.random().toString(36).substr(2, 6).toUpperCase();
            const party = { 
                id: partyId, 
                name, 
                type, 
                players: 1, 
                maxPlayers: 4
            };
            
            if (type === 'public') {
                const parties = JSON.parse(localStorage.getItem('publicParties') || '[]');
                parties.push(party);
                localStorage.setItem('publicParties', JSON.stringify(parties));
            }
            
            alert(`Party created! Code: ${partyId}`);
            closePartyModal();
        }

        function joinPrivateParty() {
            const code = document.getElementById('privateCode').value;
            if (!code) { alert('Enter a party code!'); return; }
            alert('Joining private party with code: ' + code);
        }

        function openSettings() {
            alert('⚙️ Settings coming soon!');
        }
    </script>
</body>
</html>
