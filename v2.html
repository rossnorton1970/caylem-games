<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Planetfall: Extraction</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        body { font-family: 'Arial', sans-serif; background: #000; color: #e0e0e0; }
        
        /* MAIN MENU */
        #mainMenu {
            position: relative;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background: #000;
            overflow: hidden;
        }

        .menu-bg-glow {
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, rgba(0,0,0,1) 0%, rgba(10,10,20,0.8) 50%, rgba(0,0,0,1) 100%);
            z-index: 1;
        }

        .menu-content {
            position: relative;
            z-index: 10;
            text-align: center;
            animation: fadeInDown 0.8s ease-out;
        }

        @keyframes fadeInDown {
            from {
                opacity: 0;
                transform: translateY(-30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .menu-logo {
            margin-bottom: 12px;
        }

        .menu-title {
            font-size: clamp(48px, 10vw, 96px);
            font-weight: 900;
            letter-spacing: 0.25em;
            color: #fff;
            margin: 0;
            text-shadow: 0 0 30px rgba(59, 130, 246, 0.3), 0 0 60px rgba(59, 130, 246, 0.1);
        }

        .menu-subtitle {
            font-size: clamp(18px, 3vw, 32px);
            letter-spacing: 0.5em;
            color: #3b82f6;
            font-weight: 300;
            margin: 8px 0 0 0;
            text-shadow: 0 0 20px rgba(59, 130, 246, 0.2);
        }

        .menu-tagline {
            font-size: clamp(12px, 1.5vw, 16px);
            letter-spacing: 0.4em;
            color: #888;
            font-weight: 400;
            margin-top: 16px;
            text-transform: uppercase;
        }

        .menu-buttons {
            display: flex;
            flex-direction: column;
            gap: 12px;
            width: 100%;
            max-width: 420px;
            margin-top: 48px;
        }

        .menu-btn {
            position: relative;
            overflow: hidden;
            padding: 14px 24px;
            font-size: 16px;
            font-weight: 600;
            letter-spacing: 0.15em;
            text-align: left;
            border: 2px solid;
            border-radius: 16px;
            cursor: pointer;
            transition: all 0.3s ease;
            background: transparent;
            text-transform: uppercase;
        }

        .menu-btn.primary {
            border-color: #f97316;
            color: #fff;
            background: rgba(249, 115, 22, 0.15);
        }

        .menu-btn.primary:hover {
            border-color: #fb923c;
            background: rgba(249, 115, 22, 0.25);
            box-shadow: 0 0 20px rgba(249, 115, 22, 0.3);
            transform: translateX(4px);
        }

        .menu-btn.secondary {
            border-color: #52525b;
            color: #e4e4e7;
            background: rgba(82, 82, 89, 0.1);
        }

        .menu-btn.secondary:hover {
            border-color: #3b82f6;
            color: #fff;
            background: rgba(59, 130, 246, 0.1);
            box-shadow: 0 0 15px rgba(59, 130, 246, 0.2);
            transform: translateX(4px);
        }

        .menu-footer {
            position: absolute;
            bottom: 20px;
            left: 0;
            right: 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 30px;
            font-size: 11px;
            letter-spacing: 0.2em;
            color: #666;
            z-index: 10;
        }

        /* SHIP HUB */
        #shipHubContainer {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #0a0e1f;
            z-index: 100;
        }

        #shipHubCanvas {
            display: block;
            width: 100%;
            height: 100%;
            cursor: crosshair;
        }

        /* SHIP HUB UI */
        .ship-ui-layer {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 101;
        }

        .ship-header {
            position: fixed;
            top: 20px;
            left: 20px;
            color: #00d4ff;
            font-size: 18px;
            font-weight: bold;
            pointer-events: auto;
            z-index: 102;
            text-shadow: 0 0 10px rgba(0, 212, 255, 0.3);
        }

        .ship-hint {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            color: #888;
            font-size: 13px;
            text-align: center;
            pointer-events: auto;
            z-index: 102;
        }

        .ship-hint-highlight {
            color: #00d4ff;
            font-weight: bold;
        }

        .ship-exit-btn {
            position: fixed;
            top: 20px;
            right: 20px;
            background: #f97316;
            color: white;
            padding: 10px 20px;
            border: none;
            cursor: pointer;
            border-radius: 5px;
            font-weight: bold;
            pointer-events: auto;
            z-index: 103;
            transition: all 0.2s;
        }

        .ship-exit-btn:hover {
            background: #fb923c;
            box-shadow: 0 0 15px rgba(249, 115, 22, 0.4);
        }

        /* INTERACTION MODAL */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            z-index: 104;
            pointer-events: auto;
        }

        .modal-overlay.show {
            display: block;
        }

        .interaction-modal {
            display: none;
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(10, 14, 39, 0.98);
            border: 2px solid #00d4ff;
            border-radius: 10px;
            padding: 40px;
            min-width: 500px;
            max-height: 80vh;
            overflow-y: auto;
            z-index: 105;
            box-shadow: 0 0 40px rgba(0, 212, 255, 0.2);
            pointer-events: auto;
        }

        .interaction-modal.show {
            display: block;
        }

        .interaction-modal-header {
            color: #00d4ff;
            font-size: 28px;
            font-weight: bold;
            margin-bottom: 20px;
            border-bottom: 2px solid #00d4ff;
            padding-bottom: 15px;
            text-shadow: 0 0 10px rgba(0, 212, 255, 0.3);
        }

        .interaction-modal-content {
            color: #aaa;
            font-size: 14px;
            line-height: 1.6;
        }

        .close-modal-btn {
            position: absolute;
            top: 15px;
            right: 15px;
            background: #ff4444;
            color: white;
            border: none;
            width: 40px;
            height: 40px;
            cursor: pointer;
            border-radius: 5px;
            font-size: 24px;
            pointer-events: auto;
        }

        .close-modal-btn:hover {
            background: #ff6666;
        }

        /* PLANET SELECTION */
        .planet-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-top: 20px;
        }

        .planet-card {
            background: #1a1f3a;
            border: 2px solid #444;
            padding: 20px;
            border-radius: 5px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .planet-card:hover {
            border-color: #00d4ff;
            background: #2a2f4a;
            box-shadow: 0 0 15px rgba(0, 212, 255, 0.2);
        }

        .planet-name {
            color: #00d4ff;
            font-weight: bold;
            font-size: 18px;
            margin-bottom: 10px;
        }

        .planet-info {
            font-size: 12px;
            color: #aaa;
            margin: 5px 0;
        }

        .difficulty {
            font-weight: bold;
            margin: 10px 0;
        }

        .difficulty.easy { color: #00ff88; }
        .difficulty.medium { color: #ffaa00; }
        .difficulty.hard { color: #ff4444; }

        .planet-btn {
            background: #f97316;
            color: #0a0e27;
            padding: 10px 16px;
            margin-top: 12px;
            border: none;
            cursor: pointer;
            font-weight: bold;
            border-radius: 5px;
            width: 100%;
            transition: all 0.2s ease;
            font-size: 14px;
            letter-spacing: 0.1em;
        }

        .planet-btn:hover {
            background: #fb923c;
            box-shadow: 0 0 15px rgba(249, 115, 22, 0.4);
            transform: translateY(-2px);
        }
    </style>
</head>
<body>
    <!-- MAIN MENU -->
    <div id="mainMenu">
        <div class="menu-bg-glow"></div>

        <div class="menu-content">
            <div class="menu-logo">
                <h1 class="menu-title">PLANETFALL</h1>
                <h2 class="menu-subtitle">EXTRACTION</h2>
                <p class="menu-tagline">Land. Fight. Extract.</p>
            </div>

            <div class="menu-buttons">
                <button class="menu-btn primary" onclick="startGame()">▶ PLAY</button>
                <button class="menu-btn secondary" onclick="alert('Settings coming soon!')">⚙ SETTINGS</button>
                <button class="menu-btn secondary" onclick="exitGame()">❌ EXIT</button>
            </div>
        </div>

        <div class="menu-footer">
            <span>Version 0.2 Alpha</span>
            <span>Helios Directive Network</span>
        </div>
    </div>

    <!-- SHIP HUB -->
    <div id="shipHubContainer">
        <canvas id="shipHubCanvas"></canvas>
        <div class="ship-ui-layer">
            <div class="ship-header">🚀 MOTHERSHIP HUB</div>
            <div class="ship-hint">Move with <span class="ship-hint-highlight">WASD</span> | Interact with <span class="ship-hint-highlight">E</span></div>
            <button class="ship-exit-btn" onclick="exitToMenu()">← MENU</button>
        </div>
    </div>

    <!-- INTERACTION MODAL -->
    <div class="modal-overlay" id="modalOverlay"></div>
    <div class="interaction-modal" id="interactionModal">
        <button class="close-modal-btn" onclick="closeInteractionModal()">✕</button>
        <div id="modalContent"></div>
    </div>

    <script>
        // Game state
        const gameState = {
            currentLocation: 'menu',
            playerX: 0,
            playerY: 0,
            playerSpeed: 3,
            playerSize: 12,
            credits: 500,
            materials: 2,
            lastMissionReward: null,
            ship: {
                hull: 100,
                maxHull: 100,
                shield: 100,
                maxShield: 100,
                weaponLevel: 1,
                shieldLevel: 1,
                researches: {}
            }
        };

        // Define rooms with layout
        const rooms = {
            centralHub: {
                name: 'CENTRAL HUB',
                x: 350,
                y: 300,
                width: 200,
                height: 180,
                color: '#1a3a52',
                borderColor: '#00d4ff',
                icon: '●',
                interactionKey: 'centralHub'
            },
            armory: {
                name: 'ARMORY',
                x: 600,
                y: 200,
                width: 150,
                height: 140,
                color: '#4d2a1a',
                borderColor: '#ff8800',
                icon: '⚔',
                interactionKey: 'armory'
            },
            engineering: {
                name: 'ENGINEERING',
                x: 100,
                y: 200,
                width: 150,
                height: 140,
                color: '#3a3a1a',
                borderColor: '#ff8800',
                icon: '⚙',
                interactionKey: 'engineering'
            },
            researchLab: {
                name: 'RESEARCH LAB',
                x: 100,
                y: 50,
                width: 150,
                height: 100,
                color: '#2a1a3a',
                borderColor: '#bb00ff',
                icon: '🔬',
                interactionKey: 'researchLab'
            },
            controlRoom: {
                name: 'CONTROL ROOM',
                x: 350,
                y: 550,
                width: 200,
                height: 140,
                color: '#1a3a1a',
                borderColor: '#00ff88',
                icon: '🖥',
                interactionKey: 'controlRoom'
            },
            dropship: {
                name: 'DROPSHIP',
                x: 600,
                y: 450,
                width: 150,
                height: 120,
                color: '#3a2a1a',
                borderColor: '#ff8800',
                icon: '🚀',
                interactionKey: 'dropship'
            },
            cargoBay: {
                name: 'CARGO BAY',
                x: 100,
                y: 450,
                width: 150,
                height: 120,
                color: '#3a3a1a',
                borderColor: '#ffcc00',
                icon: '📦',
                interactionKey: 'cargoBay'
            }
        };

        // Planets with preset mission types
        const planets = [
            {
                name: 'Kepler-442b',
                missionType: 'ELIMINATION',
                threatLevel: 35,
                terrainType: 'Desert Wasteland',
                enemyType: 'Scavenger Drones',
                enemyCount: 12,
                rewardMin: 400,
                rewardMax: 650
            },
            {
                name: 'TRAPPIST-1d',
                missionType: 'SURVIVAL',
                threatLevel: 52,
                terrainType: 'Ice World',
                enemyType: 'Frost Stalkers',
                enemyCount: 8,
                rewardMin: 500,
                rewardMax: 800
            },
            {
                name: 'Proxima-b',
                missionType: 'DEFENSE',
                threatLevel: 68,
                terrainType: 'Volcanic Expanse',
                enemyType: 'Lava Elementals',
                enemyCount: 15,
                rewardMin: 700,
                rewardMax: 1100
            },
            {
                name: 'LHS 475 b',
                missionType: 'SURVIVAL',
                threatLevel: 45,
                terrainType: 'Urban Ruins',
                enemyType: 'Synthetic Remnants',
                enemyCount: 10,
                rewardMin: 450,
                rewardMax: 750
            }
        ];

        // Key tracking
        const keys = {};
        let lastInteractionTime = 0;

        window.addEventListener('keydown', (e) => {
            keys[e.key.toLowerCase()] = true;
            if (e.key.toLowerCase() === 'e') {
                if (Date.now() - lastInteractionTime > 200) {
                    handleInteraction();
                    lastInteractionTime = Date.now();
                }
            }
        });
        
        window.addEventListener('keyup', (e) => {
            keys[e.key.toLowerCase()] = false;
        });

        // Initialize starfield
        // Start game
        function startGame() {
            document.getElementById('mainMenu').style.display = 'none';
            document.getElementById('shipHubContainer').style.display = 'block';
            gameState.currentLocation = 'ship';
            gameState.playerX = 450;
            gameState.playerY = 390;
            initShipHub();
        }

        // Initialize ship hub
        let shipCanvas, shipCtx;
        function initShipHub() {
            shipCanvas = document.getElementById('shipHubCanvas');
            shipCtx = shipCanvas.getContext('2d');
            shipCanvas.width = window.innerWidth;
            shipCanvas.height = window.innerHeight;
            
            // Set up canvas coordinate system for isometric-like view
            shipCtx.imageSmoothingEnabled = true;
            
            renderShipHub();
        }

        // Render ship hub
        function renderShipHub() {
            // Clear canvas with dark background
            shipCtx.fillStyle = '#0a0e1f';
            shipCtx.fillRect(0, 0, shipCanvas.width, shipCanvas.height);

            // Draw subtle grid
            shipCtx.strokeStyle = 'rgba(0, 212, 255, 0.05)';
            shipCtx.lineWidth = 1;
            for (let x = 0; x < shipCanvas.width; x += 50) {
                shipCtx.beginPath();
                shipCtx.moveTo(x, 0);
                shipCtx.lineTo(x, shipCanvas.height);
                shipCtx.stroke();
            }
            for (let y = 0; y < shipCanvas.height; y += 50) {
                shipCtx.beginPath();
                shipCtx.moveTo(0, y);
                shipCtx.lineTo(shipCanvas.width, y);
                shipCtx.stroke();
            }

            // Draw all rooms
            Object.values(rooms).forEach(room => {
                drawRoom(room);
            });

            // Update player movement
            updatePlayerMovement();

            // Draw player
            drawPlayer();

            // Continue animation
            requestAnimationFrame(renderShipHub);
        }

        // Draw a room
        function drawRoom(room) {
            // Room background
            shipCtx.fillStyle = room.color;
            shipCtx.fillRect(room.x, room.y, room.width, room.height);

            // Room border
            shipCtx.strokeStyle = room.borderColor;
            shipCtx.lineWidth = 2;
            shipCtx.strokeRect(room.x, room.y, room.width, room.height);

            // Room glow effect
            shipCtx.shadowColor = room.borderColor;
            shipCtx.shadowBlur = 15;
            shipCtx.shadowOffsetX = 0;
            shipCtx.shadowOffsetY = 0;
            shipCtx.strokeStyle = room.borderColor;
            shipCtx.lineWidth = 1;
            shipCtx.globalAlpha = 0.3;
            shipCtx.strokeRect(room.x - 5, room.y - 5, room.width + 10, room.height + 10);
            shipCtx.globalAlpha = 1.0;
            shipCtx.shadowColor = 'transparent';

            // Room label
            shipCtx.fillStyle = room.borderColor;
            shipCtx.font = 'bold 14px Arial';
            shipCtx.textAlign = 'center';
            shipCtx.textBaseline = 'middle';
            shipCtx.fillText(room.name, room.x + room.width / 2, room.y + room.height / 2 - 15);
            
            shipCtx.font = '20px Arial';
            shipCtx.fillText(room.icon, room.x + room.width / 2, room.y + room.height / 2 + 15);
        }

        // Update player movement
        function updatePlayerMovement() {
            let newX = gameState.playerX;
            let newY = gameState.playerY;

            if (keys['w'] || keys['arrowup']) newY -= gameState.playerSpeed;
            if (keys['s'] || keys['arrowdown']) newY += gameState.playerSpeed;
            if (keys['a'] || keys['arrowleft']) newX -= gameState.playerSpeed;
            if (keys['d'] || keys['arrowright']) newX += gameState.playerSpeed;

            // Simple collision detection
            if (!checkCollision(newX, newY)) {
                gameState.playerX = newX;
                gameState.playerY = newY;
            }

            // Boundary check
            gameState.playerX = Math.max(gameState.playerSize, Math.min(shipCanvas.width - gameState.playerSize, gameState.playerX));
            gameState.playerY = Math.max(gameState.playerSize, Math.min(shipCanvas.height - gameState.playerSize, gameState.playerY));
        }

        // Check collision with rooms
        function checkCollision(x, y) {
            for (const room of Object.values(rooms)) {
                if (x > room.x && x < room.x + room.width &&
                    y > room.y && y < room.y + room.height) {
                    return false; // Can move into rooms
                }
            }
            return false; // Can move anywhere for now
        }

        // Draw player
        function drawPlayer() {
            // Player body
            shipCtx.fillStyle = '#ff6b00';
            shipCtx.beginPath();
            shipCtx.arc(gameState.playerX, gameState.playerY, gameState.playerSize, 0, Math.PI * 2);
            shipCtx.fill();

            // Player glow
            shipCtx.strokeStyle = '#ffaa00';
            shipCtx.lineWidth = 2;
            shipCtx.beginPath();
            shipCtx.arc(gameState.playerX, gameState.playerY, gameState.playerSize, 0, Math.PI * 2);
            shipCtx.stroke();

            // Player direction indicator
            shipCtx.fillStyle = '#ffaa00';
            shipCtx.fillRect(gameState.playerX - 2, gameState.playerY - gameState.playerSize - 5, 4, 5);
        }

        // Handle interaction
        function handleInteraction() {
            // Check which room player is in
            for (const [key, room] of Object.entries(rooms)) {
                if (isPlayerInRoom(room)) {
                    showRoomUI(key, room);
                    return;
                }
            }
        }

        // Check if player is in room
        function isPlayerInRoom(room) {
            return gameState.playerX > room.x &&
                   gameState.playerX < room.x + room.width &&
                   gameState.playerY > room.y &&
                   gameState.playerY < room.y + room.height;
        }

        // Show room UI
        function showRoomUI(roomKey, room) {
            const modalContent = document.getElementById('modalContent');
            
            switch(roomKey) {
                case 'armory':
                    modalContent.innerHTML = `
                        <div class="interaction-modal-header">⚔ ARMORY</div>
                        <div class="interaction-modal-content">
                            <p>Weapon loadouts and upgrades coming soon!</p>
                            <p style="margin-top: 15px; font-size: 12px; color: #666;">Tactical weapons storage | Armor configurations</p>
                        </div>
                    `;
                    break;
                case 'engineering':
                    modalContent.innerHTML = `
                        <div class="interaction-modal-header">⚙ ENGINEERING</div>
                        <div class="interaction-modal-content">
                            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 20px;">
                                <div style="background: rgba(255, 136, 0, 0.1); border-left: 4px solid #ff8800; padding: 12px; border-radius: 5px;">
                                    <div style="color: #ff8800; font-weight: bold; margin-bottom: 5px;">HULL INTEGRITY</div>
                                    <div style="font-size: 18px; color: #fff; margin-bottom: 5px;">${Math.round(gameState.ship.hull)}%</div>
                                    <div style="background: #333; width: 100%; height: 8px; border-radius: 2px; overflow: hidden;">
                                        <div style="background: #ff8800; width: ${gameState.ship.hull}%; height: 100%;"></div>
                                    </div>
                                </div>
                                <div style="background: rgba(0, 212, 255, 0.1); border-left: 4px solid #00d4ff; padding: 12px; border-radius: 5px;">
                                    <div style="color: #00d4ff; font-weight: bold; margin-bottom: 5px;">SHIELD STRENGTH</div>
                                    <div style="font-size: 18px; color: #fff; margin-bottom: 5px;">${Math.round(gameState.ship.shield)}%</div>
                                    <div style="background: #333; width: 100%; height: 8px; border-radius: 2px; overflow: hidden;">
                                        <div style="background: #00d4ff; width: ${gameState.ship.shield}%; height: 100%;"></div>
                                    </div>
                                </div>
                            </div>
                            
                            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 20px;">
                                <div style="background: #1a1f3a; border: 1px solid #444; padding: 12px; border-radius: 5px;">
                                    <div style="color: #ffaa00; font-weight: bold; margin-bottom: 5px;">WEAPON POWER</div>
                                    <div style="font-size: 14px; color: #aaa; margin-bottom: 10px;">Level ${gameState.ship.weaponLevel}/5</div>
                                    <div style="background: #333; width: 100%; height: 6px; border-radius: 2px; overflow: hidden;">
                                        <div style="background: #ffaa00; width: ${(gameState.ship.weaponLevel / 5) * 100}%; height: 100%;"></div>
                                    </div>
                                    <div style="margin-top: 10px; font-size: 12px; color: #888;">
                                        Damage: +${gameState.ship.weaponLevel * 15}%
                                    </div>
                                </div>
                                <div style="background: #1a1f3a; border: 1px solid #444; padding: 12px; border-radius: 5px;">
                                    <div style="color: #00d4ff; font-weight: bold; margin-bottom: 5px;">SHIELD RATING</div>
                                    <div style="font-size: 14px; color: #aaa; margin-bottom: 10px;">Level ${gameState.ship.shieldLevel}/5</div>
                                    <div style="background: #333; width: 100%; height: 6px; border-radius: 2px; overflow: hidden;">
                                        <div style="background: #00d4ff; width: ${(gameState.ship.shieldLevel / 5) * 100}%; height: 100%;"></div>
                                    </div>
                                    <div style="margin-top: 10px; font-size: 12px; color: #888;">
                                        Absorption: ${gameState.ship.shieldLevel * 20}%
                                    </div>
                                </div>
                            </div>
                            
                            <div style="margin-bottom: 15px;">
                                <div style="color: #00d4ff; font-weight: bold; margin-bottom: 10px; font-size: 13px;">UPGRADE SYSTEMS</div>
                                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 10px;">
                                    <button class="planet-btn" style="background: ${gameState.ship.weaponLevel >= 5 ? '#333' : '#ff8800'}; color: ${gameState.ship.weaponLevel >= 5 ? '#666' : '#000'}; cursor: ${gameState.ship.weaponLevel >= 5 ? 'not-allowed' : 'pointer'};" onclick="upgradeWeapon()" ${gameState.ship.weaponLevel >= 5 ? 'disabled' : ''}>
                                        ⚡ UPGRADE WEAPON (${getWeaponUpgradeCost()} credits)
                                    </button>
                                    <button class="planet-btn" style="background: ${gameState.ship.shieldLevel >= 5 ? '#333' : '#00d4ff'}; color: ${gameState.ship.shieldLevel >= 5 ? '#666' : '#000'}; cursor: ${gameState.ship.shieldLevel >= 5 ? 'not-allowed' : 'pointer'};" onclick="upgradeShield()" ${gameState.ship.shieldLevel >= 5 ? 'disabled' : ''}>
                                        🛡 UPGRADE SHIELD (${getShieldUpgradeCost()} credits)
                                    </button>
                                </div>
                            </div>
                            
                            <div style="background: rgba(255, 100, 0, 0.1); border-left: 4px solid #ff6400; padding: 12px; border-radius: 5px; margin-bottom: 15px;">
                                <div style="color: #ff6400; font-weight: bold; margin-bottom: 8px; font-size: 13px;">HULL REPAIR</div>
                                <div style="color: #aaa; font-size: 12px; margin-bottom: 10px;">Current Damage: ${Math.round(100 - gameState.ship.hull)}% | Cost: ${getRepairCost(100)} credits/1%</div>
                                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 8px;">
                                    <button class="planet-btn" style="background: #ff6400; font-size: 12px; padding: 8px;" onclick="repairHull(25)">Repair 25% (${getRepairCost(25)})</button>
                                    <button class="planet-btn" style="background: #ff6400; font-size: 12px; padding: 8px;" onclick="repairHull(50)">Repair 50% (${getRepairCost(50)})</button>
                                    <button class="planet-btn" style="background: #ff6400; font-size: 12px; padding: 8px;" onclick="repairHull(75)">Repair 75% (${getRepairCost(75)})</button>
                                    <button class="planet-btn" style="background: #ff6400; font-size: 12px; padding: 8px;" onclick="repairHull(100)">Full Repair (${getRepairCost(100)})</button>
                                </div>
                            </div>
                        </div>
                    `;
                    break;
                case 'researchLab':
                    const techs = [
                        { id: 'advWeapons', name: 'Advanced Weapons', cost: 5, desc: 'Unlocks weapon upgrades' },
                        { id: 'shieldTech', name: 'Shield Technology', cost: 3, desc: 'Unlocks shield upgrades' },
                        { id: 'hullReinforcement', name: 'Hull Reinforcement', cost: 4, desc: 'Reduces repair costs by 20%' },
                        { id: 'energyEfficiency', name: 'Energy Efficiency', cost: 6, desc: 'Increases max shield strength' },
                        { id: 'armorPlating', name: 'Advanced Armor', cost: 8, desc: 'Increases max hull integrity' },
                        { id: 'weaponOptimization', name: 'Weapon Optimization', cost: 7, desc: 'Increases weapon damage further' }
                    ];
                    
                    modalContent.innerHTML = `
                        <div class="interaction-modal-header">🔬 RESEARCH LAB</div>
                        <div class="interaction-modal-content" style="font-size: 13px;">
                            <div style="background: rgba(187, 0, 255, 0.1); border-left: 4px solid #bb00ff; padding: 12px; border-radius: 5px; margin-bottom: 15px;">
                                <div style="color: #bb00ff; font-weight: bold; margin-bottom: 5px;">RESEARCH MATERIALS</div>
                                <div style="color: #ffcc00; font-weight: bold; font-size: 16px;">${gameState.materials} units available</div>
                            </div>
                            
                            <div style="display: grid; grid-template-columns: 1fr; gap: 10px;">
                                ${techs.map((tech, idx) => {
                                    const isResearched = gameState.ship.researches[tech.id];
                                    return `
                                        <div style="background: ${isResearched ? 'rgba(0, 255, 136, 0.1)' : 'rgba(100, 100, 100, 0.1)'}; border-left: 4px solid ${isResearched ? '#00ff88' : '#666'}; padding: 12px; border-radius: 5px;">
                                            <div style="display: flex; justify-content: space-between; align-items: start; margin-bottom: 5px;">
                                                <div style="flex: 1;">
                                                    <div style="color: ${isResearched ? '#00ff88' : '#aaa'}; font-weight: bold;">${isResearched ? '✓ ' : ''}${tech.name}</div>
                                                    <div style="color: #666; font-size: 12px; margin-top: 3px;">${tech.desc}</div>
                                                </div>
                                                <div style="margin-left: 15px; text-align: right;">
                                                    ${isResearched ? `<div style="color: #00ff88; font-weight: bold; font-size: 12px;">RESEARCHED</div>` : `<div style="color: #bb00ff; font-weight: bold;">${tech.cost} 📊</div>`}
                                                </div>
                                            </div>
                                            ${!isResearched ? `<button class="planet-btn" style="background: ${gameState.materials >= tech.cost ? '#bb00ff' : '#333'}; color: ${gameState.materials >= tech.cost ? '#fff' : '#666'}; font-size: 11px; padding: 6px; cursor: ${gameState.materials >= tech.cost ? 'pointer' : 'not-allowed'};" onclick="researchTech('${tech.id}', ${tech.cost})" ${gameState.materials >= tech.cost ? '' : 'disabled'}>RESEARCH</button>` : ''}
                                        </div>
                                    `;
                                }).join('')}
                            </div>
                        </div>
                    `;
                    break;
                case 'controlRoom':
                    modalContent.innerHTML = `
                        <div class="interaction-modal-header">🖥 CONTROL ROOM — AVAILABLE OPERATIONS</div>
                        <div class="interaction-modal-content">
                            <p style="margin-bottom: 20px; color: #888;">Select an operation to deploy:</p>
                            <div class="planet-grid">
                                ${planets.map((planet, idx) => `
                                    <div class="planet-card">
                                        <div class="planet-name">${planet.name}</div>
                                        <div class="planet-mission-type" style="color: ${getMissionTypeColor(planet.missionType)}; font-weight: bold; margin: 8px 0;">${planet.missionType}</div>
                                        <div class="planet-info" style="margin-top: 10px;">Terrain: ${planet.terrainType}</div>
                                        <div class="planet-info">Enemies: ${planet.enemyType}</div>
                                        <div class="planet-info">Count: ${planet.enemyCount}</div>
                                        <div class="planet-threat" style="margin-top: 10px; color: ${getThreatColor(planet.threatLevel)}; font-weight: bold;">THREAT: ${planet.threatLevel}%</div>
                                        <div class="planet-reward" style="color: #ffcc00; margin-top: 5px;">Reward: ${planet.rewardMin}–${planet.rewardMax} ⚡</div>
                                        <button class="planet-btn" onclick="showPreMissionScreen(${idx})">VIEW OPERATION</button>
                                    </div>
                                `).join('')}
                            </div>
                        </div>
                    `;
                    break;
                case 'dropship':
                    modalContent.innerHTML = `
                        <div class="interaction-modal-header">🚀 DROPSHIP</div>
                        <div class="interaction-modal-content">
                            <p>Deployment platform ready for launch!</p>
                            <p style="margin-top: 15px; font-size: 12px; color: #666;">Select a mission from the Control Room to launch.</p>
                        </div>
                    `;
                    break;
                case 'cargoBay':
                    modalContent.innerHTML = `
                        <div class="interaction-modal-header">📦 CARGO BAY — REWARD STORAGE</div>
                        <div class="interaction-modal-content" style="font-size: 14px;">
                            <div style="background: rgba(255, 204, 0, 0.1); border-left: 4px solid #ffcc00; padding: 15px; border-radius: 5px; margin-bottom: 20px;">
                                <div style="color: #ffcc00; font-weight: bold; margin-bottom: 10px;">💾 STORED INVENTORY</div>
                                <div style="color: #aaa; font-size: 13px; line-height: 1.8;">
                                    <div><strong style="color: #fff;">CREDITS:</strong> <span style="color: #ffcc00; font-weight: bold;">${gameState.credits.toLocaleString()} ⚡</span></div>
                                    <div><strong style="color: #fff;">MATERIALS:</strong> <span style="color: #ff8800; font-weight: bold;">${gameState.materials} units</span></div>
                                </div>
                            </div>

                            ${gameState.lastMissionReward ? `
                            <div style="background: rgba(0, 255, 136, 0.1); border-left: 4px solid #00ff88; padding: 15px; border-radius: 5px; margin-bottom: 20px;">
                                <div style="color: #00ff88; font-weight: bold; margin-bottom: 10px;">✓ LAST MISSION REWARDS</div>
                                <div style="color: #aaa; font-size: 13px; line-height: 1.8;">
                                    <div><strong style="color: #fff;">CREDITS EARNED:</strong> <span style="color: #ffcc00;">+${gameState.lastMissionReward.credits}</span></div>
                                    <div><strong style="color: #fff;">MATERIALS GAINED:</strong> <span style="color: #ff8800;">+${gameState.lastMissionReward.materials}</span></div>
                                    <div style="margin-top: 8px; color: #888; font-size: 12px;">Stored in cargo hold. Ready for upgrades.</div>
                                </div>
                            </div>
                            ` : `
                            <div style="background: rgba(100, 100, 100, 0.2); border-left: 4px solid #666; padding: 15px; border-radius: 5px; margin-bottom: 20px;">
                                <div style="color: #888; font-weight: bold; margin-bottom: 5px;">⚠ NO RECENT MISSIONS</div>
                                <div style="color: #666; font-size: 12px;">Complete a mission to earn rewards.</div>
                            </div>
                            `}

                            <div style="background: rgba(100, 100, 100, 0.15); padding: 15px; border-radius: 5px; margin-top: 20px;">
                                <div style="color: #888; font-size: 12px; line-height: 1.6;">
                                    💡 <strong>Cargo Bay Status:</strong> Industrial storage active. Rewards secure. Equipment ready for upgrades in Engineering.
                                </div>
                            </div>
                        </div>
                    `;
                    break;
                case 'centralHub':
                default:
                    modalContent.innerHTML = `
                        <div class="interaction-modal-header">● CENTRAL HUB</div>
                        <div class="interaction-modal-content">
                            <p>Welcome to the Mothership! Navigate to different areas:</p>
                            <ul style="margin-top: 15px; margin-left: 20px;">
                                <li>⚔ <strong>ARMORY</strong> — Weapons & loadouts</li>
                                <li>⚙ <strong>ENGINEERING</strong> — Ship upgrades</li>
                                <li>🔬 <strong>RESEARCH LAB</strong> — Tech research</li>
                                <li>🖥 <strong>CONTROL ROOM</strong> — Select missions</li>
                                <li>🚀 <strong>DROPSHIP</strong> — Launch pad</li>
                                <li>📦 <strong>CARGO BAY</strong> — Storage</li>
                            </ul>
                        </div>
                    `;
                    break;
            }

            document.getElementById('modalOverlay').classList.add('show');
            document.getElementById('interactionModal').classList.add('show');
        }

        function closeInteractionModal() {
            document.getElementById('modalOverlay').classList.remove('show');
            document.getElementById('interactionModal').classList.remove('show');
        }

        // Get mission type color
        function getMissionTypeColor(missionType) {
            switch(missionType) {
                case 'ELIMINATION': return '#ff4444';
                case 'SURVIVAL': return '#44ff44';
                case 'DEFENSE': return '#4444ff';
                default: return '#ffaa00';
            }
        }

        // Get threat level color
        function getThreatColor(level) {
            if (level < 40) return '#44ff44';
            if (level < 60) return '#ffaa00';
            return '#ff4444';
        }

        // Show pre-mission screen
        function showPreMissionScreen(idx) {
            const planet = planets[idx];
            const modalContent = document.getElementById('modalContent');
            
            const missionObjective = getMissionObjective(planet.missionType);
            
            modalContent.innerHTML = `
                <div class="interaction-modal-header">⚠ OPERATION BRIEFING</div>
                <div class="interaction-modal-content">
                    <div style="background: rgba(0, 212, 255, 0.1); border-left: 4px solid ${getMissionTypeColor(planet.missionType)}; padding: 15px; border-radius: 5px; margin-bottom: 20px;">
                        <div style="color: #00d4ff; font-weight: bold; margin-bottom: 10px;">📍 ${planet.name}</div>
                        <div style="color: #aaa; font-size: 13px; line-height: 1.5;">
                            <div><strong style="color: #fff;">MISSION TYPE:</strong> ${planet.missionType}</div>
                            <div><strong style="color: #fff;">OBJECTIVE:</strong> ${missionObjective}</div>
                            <div style="margin-top: 10px;"><strong style="color: ${getThreatColor(planet.threatLevel)};">THREAT LEVEL: ${planet.threatLevel}%</strong></div>
                            <div><strong style="color: #fff;">TERRAIN:</strong> ${planet.terrainType}</div>
                            <div><strong style="color: #fff;">HOSTILES:</strong> ${planet.enemyType} (${planet.enemyCount})</div>
                            <div style="margin-top: 10px;"><strong style="color: #ffcc00;">ESTIMATED REWARD: ${planet.rewardMin}–${planet.rewardMax} Credits</strong></div>
                        </div>
                    </div>
                    <button class="planet-btn" style="background: #f97316; margin-top: 10px;" onclick="deployToMission(${idx})">DESCEND TO OPERATION</button>
                    <button class="planet-btn" style="background: #444; color: #aaa; margin-top: 10px;" onclick="closePreMissionScreen()">CANCEL</button>
                </div>
            `;
        }

        // Get mission objective description
        function getMissionObjective(missionType) {
            switch(missionType) {
                case 'ELIMINATION':
                    return 'Clear all hostile lifeforms in the AO.';
                case 'SURVIVAL':
                    return 'Survive until extraction arrives. Defend your position.';
                case 'DEFENSE':
                    return 'Protect critical equipment until secure pickup.';
                default:
                    return 'Unknown mission type.';
            }
        }

        // Close pre-mission screen
        function closePreMissionScreen() {
            showRoomUI('controlRoom', rooms.controlRoom);
        }

        // Deploy to mission
        function deployToMission(idx) {
            const planet = planets[idx];
            
            // Simulate mission completion with random reward
            const reward = {
                credits: Math.floor(Math.random() * (planet.rewardMax - planet.rewardMin + 1)) + planet.rewardMin,
                materials: Math.floor(Math.random() * 4) + 1
            };
            
            // Update game state
            gameState.lastMissionReward = reward;
            gameState.credits += reward.credits;
            gameState.materials += reward.materials;
            
            closeInteractionModal();
            
            // Show mission complete screen briefly
            alert(`MISSION COMPLETE: ${planet.name}\n\nREWARDS EARNED:\n+${reward.credits} Credits\n+${reward.materials} Materials\n\nReturning to ship...`);
        }

        function exitToMenu() {
            document.getElementById('shipHubContainer').style.display = 'none';
            document.getElementById('mainMenu').style.display = 'flex';
            closeInteractionModal();
        }

        function exitGame() {
            alert('Thanks for playing Planetfall!');
        }

        // Upgrade functions
        function getWeaponUpgradeCost() {
            const baseCost = 100;
            return baseCost * gameState.ship.weaponLevel;
        }

        function getShieldUpgradeCost() {
            const baseCost = 80;
            return baseCost * gameState.ship.shieldLevel;
        }

        function getRepairCost(amount) {
            // Base cost 10 credits per 1% hull repair
            let baseCost = 10;
            // Hull Reinforcement research reduces cost by 20%
            if (gameState.ship.researches['hullReinforcement']) {
                baseCost *= 0.8;
            }
            return Math.floor((amount / 100) * gameState.ship.maxHull * baseCost);
        }

        function upgradeWeapon() {
            if (gameState.ship.weaponLevel >= 5) {
                alert('Weapons at maximum level!');
                return;
            }
            const cost = getWeaponUpgradeCost();
            if (gameState.credits >= cost) {
                gameState.credits -= cost;
                gameState.ship.weaponLevel += 1;
                showRoomUI('engineering', rooms.engineering);
                showNotification(`Weapon upgraded to Level ${gameState.ship.weaponLevel}!`);
            } else {
                alert(`Insufficient credits! Need ${cost}, have ${gameState.credits}`);
            }
        }

        function upgradeShield() {
            if (gameState.ship.shieldLevel >= 5) {
                alert('Shields at maximum level!');
                return;
            }
            const cost = getShieldUpgradeCost();
            if (gameState.credits >= cost) {
                gameState.credits -= cost;
                gameState.ship.shieldLevel += 1;
                gameState.ship.maxShield = 100 + (gameState.ship.shieldLevel - 1) * 20;
                gameState.ship.shield = gameState.ship.maxShield;
                showRoomUI('engineering', rooms.engineering);
                showNotification(`Shields upgraded to Level ${gameState.ship.shieldLevel}!`);
            } else {
                alert(`Insufficient credits! Need ${cost}, have ${gameState.credits}`);
            }
        }

        function repairHull(percentage) {
            const amount = Math.min(percentage, 100 - gameState.ship.hull);
            if (amount <= 0) {
                alert('Hull already at full integrity!');
                return;
            }
            const cost = getRepairCost(amount);
            if (gameState.credits >= cost) {
                gameState.credits -= cost;
                gameState.ship.hull = Math.min(100, gameState.ship.hull + amount);
                showRoomUI('engineering', rooms.engineering);
                showNotification(`Hull repaired +${Math.round(amount)}%!`);
            } else {
                alert(`Insufficient credits! Need ${cost}, have ${gameState.credits}`);
            }
        }

        function researchTech(techId, cost) {
            if (gameState.materials >= cost) {
                gameState.materials -= cost;
                gameState.ship.researches[techId] = true;
                showRoomUI('researchLab', rooms.researchLab);
                showNotification(`Research complete! Tech unlocked.`);
            } else {
                alert(`Insufficient materials! Need ${cost}, have ${gameState.materials}`);
            }
        }

        function showNotification(text) {
            // Simple notification - could be enhanced with toast/overlay
            console.log('Notification:', text);
        }

        // Initialize on load
        window.addEventListener('load', () => {
            // Menu ready
        });

        // Handle window resize
        window.addEventListener('resize', () => {
            if (gameState.currentLocation === 'ship' && shipCanvas) {
                shipCanvas.width = window.innerWidth;
                shipCanvas.height = window.innerHeight;
            }
        });
    </script>
</body>
</html>
