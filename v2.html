<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Planetfall: Extraction</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        body { font-family: 'Arial', sans-serif; background: #000; color: #e0e0e0; }
        
        /* MAIN MENU */
        #mainMenu {
            position: relative;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background: #000;
            overflow: hidden;
        }

        .menu-bg-glow {
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, rgba(0,0,0,1) 0%, rgba(10,10,20,0.8) 50%, rgba(0,0,0,1) 100%);
            z-index: 1;
        }

        .menu-content {
            position: relative;
            z-index: 10;
            text-align: center;
            animation: fadeInDown 0.8s ease-out;
        }

        @keyframes fadeInDown {
            from {
                opacity: 0;
                transform: translateY(-30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .menu-logo {
            margin-bottom: 12px;
        }

        .menu-title {
            font-size: clamp(48px, 10vw, 96px);
            font-weight: 900;
            letter-spacing: 0.25em;
            color: #fff;
            margin: 0;
            text-shadow: 0 0 30px rgba(59, 130, 246, 0.3), 0 0 60px rgba(59, 130, 246, 0.1);
        }

        .menu-subtitle {
            font-size: clamp(18px, 3vw, 32px);
            letter-spacing: 0.5em;
            color: #3b82f6;
            font-weight: 300;
            margin: 8px 0 0 0;
            text-shadow: 0 0 20px rgba(59, 130, 246, 0.2);
        }

        .menu-tagline {
            font-size: clamp(12px, 1.5vw, 16px);
            letter-spacing: 0.4em;
            color: #888;
            font-weight: 400;
            margin-top: 16px;
            text-transform: uppercase;
        }

        .menu-buttons {
            display: flex;
            flex-direction: column;
            gap: 12px;
            width: 100%;
            max-width: 420px;
            margin-top: 48px;
        }

        .menu-btn {
            position: relative;
            overflow: hidden;
            padding: 14px 24px;
            font-size: 16px;
            font-weight: 600;
            letter-spacing: 0.15em;
            text-align: left;
            border: 2px solid;
            border-radius: 16px;
            cursor: pointer;
            transition: all 0.3s ease;
            background: transparent;
            text-transform: uppercase;
        }

        .menu-btn.primary {
            border-color: #f97316;
            color: #fff;
            background: rgba(249, 115, 22, 0.15);
        }

        .menu-btn.primary:hover {
            border-color: #fb923c;
            background: rgba(249, 115, 22, 0.25);
            box-shadow: 0 0 20px rgba(249, 115, 22, 0.3);
            transform: translateX(4px);
        }

        .menu-btn.secondary {
            border-color: #52525b;
            color: #e4e4e7;
            background: rgba(82, 82, 89, 0.1);
        }

        .menu-btn.secondary:hover {
            border-color: #3b82f6;
            color: #fff;
            background: rgba(59, 130, 246, 0.1);
            box-shadow: 0 0 15px rgba(59, 130, 246, 0.2);
            transform: translateX(4px);
        }

        .menu-footer {
            position: absolute;
            bottom: 20px;
            left: 0;
            right: 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 30px;
            font-size: 11px;
            letter-spacing: 0.2em;
            color: #666;
            z-index: 10;
        }

        /* SHIP HUB */
        #shipHubContainer {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #0a0e1f;
            z-index: 100;
        }

        #shipHubCanvas {
            display: block;
            width: 100%;
            height: 100%;
            cursor: crosshair;
        }

        /* SHIP HUB UI */
        .ship-ui-layer {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 101;
        }

        .ship-header {
            position: fixed;
            top: 20px;
            left: 20px;
            color: #00d4ff;
            font-size: 18px;
            font-weight: bold;
            pointer-events: auto;
            z-index: 102;
            text-shadow: 0 0 10px rgba(0, 212, 255, 0.3);
        }

        .ship-hint {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            color: #888;
            font-size: 13px;
            text-align: center;
            pointer-events: auto;
            z-index: 102;
        }

        .ship-hint-highlight {
            color: #00d4ff;
            font-weight: bold;
        }

        .ship-exit-btn {
            position: fixed;
            top: 20px;
            right: 20px;
            background: #f97316;
            color: white;
            padding: 10px 20px;
            border: none;
            cursor: pointer;
            border-radius: 5px;
            font-weight: bold;
            pointer-events: auto;
            z-index: 103;
            transition: all 0.2s;
        }

        .ship-exit-btn:hover {
            background: #fb923c;
            box-shadow: 0 0 15px rgba(249, 115, 22, 0.4);
        }

        /* INTERACTION MODAL */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            z-index: 104;
            pointer-events: auto;
        }

        .modal-overlay.show {
            display: block;
        }

        .interaction-modal {
            display: none;
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(10, 14, 39, 0.98);
            border: 2px solid #00d4ff;
            border-radius: 10px;
            padding: 40px;
            min-width: 500px;
            max-height: 80vh;
            overflow-y: auto;
            z-index: 105;
            box-shadow: 0 0 40px rgba(0, 212, 255, 0.2);
            pointer-events: auto;
        }

        .interaction-modal.show {
            display: block;
        }

        .interaction-modal-header {
            color: #00d4ff;
            font-size: 28px;
            font-weight: bold;
            margin-bottom: 20px;
            border-bottom: 2px solid #00d4ff;
            padding-bottom: 15px;
            text-shadow: 0 0 10px rgba(0, 212, 255, 0.3);
        }

        .interaction-modal-content {
            color: #aaa;
            font-size: 14px;
            line-height: 1.6;
        }

        .close-modal-btn {
            position: absolute;
            top: 15px;
            right: 15px;
            background: #ff4444;
            color: white;
            border: none;
            width: 40px;
            height: 40px;
            cursor: pointer;
            border-radius: 5px;
            font-size: 24px;
            pointer-events: auto;
        }

        .close-modal-btn:hover {
            background: #ff6666;
        }

        /* PLANET SELECTION */
        .planet-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-top: 20px;
        }

        .planet-card {
            background: #1a1f3a;
            border: 2px solid #444;
            padding: 20px;
            border-radius: 5px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .planet-card:hover {
            border-color: #00d4ff;
            background: #2a2f4a;
            box-shadow: 0 0 15px rgba(0, 212, 255, 0.2);
        }

        .planet-name {
            color: #00d4ff;
            font-weight: bold;
            font-size: 18px;
            margin-bottom: 10px;
        }

        .planet-info {
            font-size: 12px;
            color: #aaa;
            margin: 5px 0;
        }

        .difficulty {
            font-weight: bold;
            margin: 10px 0;
        }

        .difficulty.easy { color: #00ff88; }
        .difficulty.medium { color: #ffaa00; }
        .difficulty.hard { color: #ff4444; }

        .planet-btn {
            background: #f97316;
            color: #0a0e27;
            padding: 10px 16px;
            margin-top: 12px;
            border: none;
            cursor: pointer;
            font-weight: bold;
            border-radius: 5px;
            width: 100%;
            transition: all 0.2s ease;
            font-size: 14px;
            letter-spacing: 0.1em;
        }

        .planet-btn:hover {
            background: #fb923c;
            box-shadow: 0 0 15px rgba(249, 115, 22, 0.4);
            transform: translateY(-2px);
        }

        /* ARTIFACT PREVIEW CARD */
        .artifact-preview-card {
            background: rgba(20, 20, 50, 0.95);
            border: 2px solid #bb00ff;
            border-radius: 10px;
            padding: 25px;
            margin-bottom: 20px;
            box-shadow: 0 0 30px rgba(187, 0, 255, 0.2);
        }

        .artifact-preview-header {
            font-size: 24px;
            color: #bb00ff;
            font-weight: bold;
            margin-bottom: 15px;
            border-bottom: 2px solid #bb00ff;
            padding-bottom: 10px;
        }

        .artifact-rarity-badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 12px;
            font-size: 11px;
            font-weight: bold;
            letter-spacing: 0.1em;
            margin-bottom: 12px;
        }

        .artifact-type-badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 12px;
            font-size: 11px;
            font-weight: bold;
            margin-left: 8px;
        }

        .artifact-benefit {
            background: rgba(0, 255, 136, 0.1);
            border-left: 4px solid #00ff88;
            padding: 12px;
            border-radius: 5px;
            margin-bottom: 12px;
        }

        .artifact-benefit-label {
            color: #00ff88;
            font-weight: bold;
            font-size: 12px;
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 0.1em;
        }

        .artifact-benefit-text {
            color: #00ff88;
            font-size: 14px;
            font-weight: bold;
        }

        .artifact-penalty {
            background: rgba(255, 68, 68, 0.1);
            border-left: 4px solid #ff4444;
            padding: 12px;
            border-radius: 5px;
            margin-bottom: 12px;
        }

        .artifact-penalty-label {
            color: #ff4444;
            font-weight: bold;
            font-size: 12px;
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 0.1em;
        }

        .artifact-penalty-text {
            color: #ff4444;
            font-size: 14px;
            font-weight: bold;
        }

        .artifact-lore {
            background: rgba(100, 100, 100, 0.15);
            padding: 12px;
            border-radius: 5px;
            color: #aaa;
            font-size: 12px;
            font-style: italic;
            margin-bottom: 15px;
        }

        .artifact-action-buttons {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }

        .artifact-accept-btn {
            background: #00ff88;
            color: #000;
            padding: 10px;
            border: none;
            border-radius: 5px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s;
        }

        .artifact-accept-btn:hover {
            background: #00dd77;
            box-shadow: 0 0 15px rgba(0, 255, 136, 0.4);
        }

        .artifact-reject-btn {
            background: #444;
            color: #aaa;
            padding: 10px;
            border: 1px solid #666;
            border-radius: 5px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s;
        }

        .artifact-reject-btn:hover {
            background: #555;
            color: #fff;
            border-color: #888;
        }

        /* MISSION SELECTION STYLES */
        .mission-option-container {
            background: rgba(30, 30, 60, 0.8);
            border: 2px solid #00d4ff;
            border-radius: 8px;
            padding: 15px;
            margin-bottom: 15px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .mission-option-container:hover {
            background: rgba(40, 40, 80, 0.8);
            border-color: #00ff88;
            box-shadow: 0 0 20px rgba(0, 255, 136, 0.2);
        }

        .mission-option-container.artifact-hunt {
            border-color: #ff8800;
        }

        .mission-option-container.artifact-hunt:hover {
            border-color: #ffaa00;
            box-shadow: 0 0 20px rgba(255, 170, 0, 0.2);
        }

        .mission-option-title {
            font-size: 16px;
            font-weight: bold;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .mission-option-desc {
            font-size: 12px;
            color: #aaa;
            margin-bottom: 10px;
            line-height: 1.4;
        }

        .mission-option-details {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            font-size: 12px;
            margin-bottom: 12px;
        }

        .mission-detail-item {
            background: rgba(255, 255, 255, 0.05);
            padding: 8px;
            border-radius: 4px;
        }

        .mission-detail-label {
            color: #888;
            font-size: 10px;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            margin-bottom: 4px;
        }

        .mission-detail-value {
            color: #fff;
            font-weight: bold;
        }

        /* ARMORY LOADOUT SYSTEM */
        .armory-container {
            display: grid;
            grid-template-columns: 250px 1fr 280px;
            gap: 30px;
            height: 100%;
        }

        .armory-column {
            display: flex;
            flex-direction: column;
        }

        .armory-section-title {
            color: #ff8800;
            font-weight: bold;
            font-size: 13px;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            margin-bottom: 12px;
            border-bottom: 2px solid #ff8800;
            padding-bottom: 8px;
        }

        .armory-item-list {
            display: flex;
            flex-direction: column;
            gap: 8px;
            margin-bottom: 20px;
        }

        .armory-item-btn {
            background: rgba(255, 136, 0, 0.1);
            border: 1px solid #ff8800;
            color: #fff;
            padding: 10px 12px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 12px;
            transition: all 0.2s;
            text-align: left;
            font-weight: 500;
        }

        .armory-item-btn:hover {
            background: rgba(255, 136, 0, 0.2);
            border-color: #ffaa00;
            box-shadow: 0 0 10px rgba(255, 136, 0, 0.3);
        }

        .armory-item-btn.selected {
            background: rgba(255, 136, 0, 0.3);
            border-color: #ffaa00;
            box-shadow: 0 0 15px rgba(255, 136, 0, 0.4);
        }

        .armory-preview-box {
            background: rgba(20, 20, 50, 0.95);
            border: 2px solid #00d4ff;
            border-radius: 8px;
            padding: 20px;
            text-align: center;
            margin-bottom: 20px;
        }

        .armory-preview-title {
            color: #00d4ff;
            font-weight: bold;
            font-size: 13px;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            margin-bottom: 15px;
        }

        .armory-preview-item {
            font-size: 36px;
            margin: 15px 0;
            height: 50px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .armory-preview-name {
            color: #fff;
            font-weight: bold;
            font-size: 13px;
            margin: 10px 0;
        }

        .armory-stat-bar {
            display: flex;
            align-items: center;
            margin-bottom: 12px;
        }

        .armory-stat-label {
            color: #888;
            font-size: 11px;
            text-transform: uppercase;
            font-weight: bold;
            min-width: 70px;
            letter-spacing: 0.05em;
        }

        .armory-stat-bar-container {
            flex: 1;
            background: #333;
            height: 8px;
            border-radius: 2px;
            overflow: hidden;
            margin: 0 10px;
        }

        .armory-stat-bar-fill {
            height: 100%;
            background: linear-gradient(90deg, #ff8800, #ffaa00);
            transition: width 0.3s;
        }

        .armory-stat-value {
            color: #fff;
            font-size: 11px;
            font-weight: bold;
            min-width: 40px;
            text-align: right;
        }

        .armory-current-loadout {
            background: rgba(0, 255, 136, 0.1);
            border-left: 4px solid #00ff88;
            padding: 12px;
            border-radius: 4px;
            margin-bottom: 20px;
        }

        .armory-current-loadout-title {
            color: #00ff88;
            font-size: 11px;
            font-weight: bold;
            text-transform: uppercase;
            margin-bottom: 10px;
            letter-spacing: 0.1em;
        }

        .armory-loadout-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 6px 0;
            border-bottom: 1px solid rgba(0, 255, 136, 0.2);
            font-size: 11px;
            color: #aaa;
        }

        .armory-loadout-item:last-child {
            border-bottom: none;
        }

        .armory-loadout-value {
            color: #00ff88;
            font-weight: bold;
        }

        .armory-save-btn {
            background: linear-gradient(135deg, #00ff88, #00d4ff);
            color: #000;
            padding: 12px 20px;
            border: none;
            border-radius: 4px;
            font-weight: bold;
            font-size: 13px;
            cursor: pointer;
            transition: all 0.2s;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            width: 100%;
        }

        .armory-save-btn:hover {
            box-shadow: 0 0 20px rgba(0, 255, 136, 0.4);
            transform: translateY(-2px);
        }

    </style>
</head>
<body>
    <!-- MAIN MENU -->
    <div id="mainMenu">
        <div class="menu-bg-glow"></div>

        <div class="menu-content">
            <div class="menu-logo">
                <h1 class="menu-title">PLANETFALL</h1>
                <h2 class="menu-subtitle">EXTRACTION</h2>
                <p class="menu-tagline">Land. Fight. Extract.</p>
            </div>

            <div class="menu-buttons">
                <button class="menu-btn primary" onclick="startGame()">▶ PLAY</button>
                <button class="menu-btn secondary" onclick="alert('Settings coming soon!')">⚙ SETTINGS</button>
                <button class="menu-btn secondary" onclick="exitGame()">❌ EXIT</button>
            </div>
        </div>

        <div class="menu-footer">
            <span>Version 0.2 Alpha</span>
            <span>Helios Directive Network</span>
        </div>
    </div>

    <!-- SHIP HUB -->
    <div id="shipHubContainer">
        <canvas id="shipHubCanvas"></canvas>
        <div class="ship-ui-layer">
            <div class="ship-header">🚀 MOTHERSHIP HUB</div>
            <div class="ship-hint">Move with <span class="ship-hint-highlight">WASD</span> | Interact with <span class="ship-hint-highlight">E</span></div>
            <button class="ship-exit-btn" onclick="exitToMenu()">← MENU</button>
        </div>
    </div>

    <!-- INTERACTION MODAL -->
    <div class="modal-overlay" id="modalOverlay"></div>
    <div class="interaction-modal" id="interactionModal">
        <button class="close-modal-btn" onclick="closeInteractionModal()">✕</button>
        <div id="modalContent"></div>
    </div>

    <script>
        // Game state
        const gameState = {
            currentLocation: 'menu',
            playerX: 0,
            playerY: 0,
            playerSpeed: 3,
            playerSize: 12,
            credits: 500,
            materials: 2,
            lastMissionReward: null,
            artifacts: [],
            activeAnalysis: null,
            completedResearch: [],
            researchProgress: {},
            organizationTrust: 0,
            encounterData: {},
            ship: {
                hull: 100,
                maxHull: 100,
                shield: 100,
                maxShield: 100,
                weaponLevel: 1,
                shieldLevel: 1,
                engineLevel: 1,
                researches: {},
                appliedTechs: []
            },
            loadout: {
                primary: 'assaultRifle',
                secondary: 'combatPistol',
                armor: 'medium',
                gadget: 'medkit'
            }
        };
        
        // WEAPON DATABASE
        const weaponDatabase = {
            // PRIMARY WEAPONS
            primary: {
                assaultRifle: {
                    name: 'Assault Rifle',
                    category: 'primary',
                    damage: 75,
                    fireRate: 8,
                    accuracy: 85,
                    reloadTime: 2.0,
                    icon: '🔫',
                    color: '#ff8800',
                    description: 'Reliable all-rounder. Balanced damage and accuracy.'
                },
                smg: {
                    name: 'SMG',
                    category: 'primary',
                    damage: 55,
                    fireRate: 12,
                    accuracy: 75,
                    reloadTime: 1.5,
                    icon: '⚡',
                    color: '#ffaa00',
                    description: 'High rate of fire. Lower accuracy at distance.'
                },
                shotgun: {
                    name: 'Shotgun',
                    category: 'primary',
                    damage: 95,
                    fireRate: 3,
                    accuracy: 60,
                    reloadTime: 2.5,
                    icon: '💥',
                    color: '#ff4444',
                    description: 'Devastating close-range weapon.'
                },
                sniper: {
                    name: 'Sniper Rifle',
                    category: 'primary',
                    damage: 120,
                    fireRate: 1,
                    accuracy: 95,
                    reloadTime: 3.0,
                    icon: '🎯',
                    color: '#00d4ff',
                    description: 'Pinpoint accuracy. One shot, one kill.'
                }
            },
            // SECONDARY WEAPONS (PISTOL)
            secondary: {
                combatPistol: {
                    name: 'Combat Pistol',
                    category: 'secondary',
                    damage: 45,
                    fireRate: 6,
                    accuracy: 80,
                    reloadTime: 1.2,
                    icon: '🔰',
                    color: '#00d4ff',
                    description: 'Reliable backup weapon.'
                },
                heavyPistol: {
                    name: 'Heavy Pistol',
                    category: 'secondary',
                    damage: 65,
                    fireRate: 4,
                    accuracy: 75,
                    reloadTime: 1.5,
                    icon: '💣',
                    color: '#ff8800',
                    description: 'Powerful sidearm. Slower rate of fire.'
                }
            }
        };
        
        // ARMOR DATABASE
        const armorDatabase = {
            light: {
                name: 'Light Armor',
                type: 'light',
                health: 50,
                speed: 20,
                resistance: 15,
                icon: '⚔',
                color: '#00d4ff',
                description: 'Maximum mobility. Minimal protection.'
            },
            medium: {
                name: 'Medium Armor',
                type: 'medium',
                health: 100,
                speed: 10,
                resistance: 30,
                icon: '🛡',
                color: '#ffaa00',
                description: 'Balanced protection and mobility.'
            },
            heavy: {
                name: 'Heavy Armor',
                type: 'heavy',
                health: 150,
                speed: -10,
                resistance: 50,
                icon: '⛓',
                color: '#ff4444',
                description: 'Maximum protection. Reduced speed.'
            }
        };

            initShipHub();

        // Initialize ship hub
        let shipCanvas, shipCtx;
        function initShipHub() {
            shipCanvas = document.getElementById('shipHubCanvas');
            shipCtx = shipCanvas.getContext('2d');
            shipCanvas.width = window.innerWidth;
            shipCanvas.height = window.innerHeight;
            
            // Set up canvas coordinate system for isometric-like view
            shipCtx.imageSmoothingEnabled = true;
            
            renderShipHub();
        }

        // Render ship hub
        function renderShipHub() {
            // Clear canvas with dark background
            shipCtx.fillStyle = '#0a0e1f';
            shipCtx.fillRect(0, 0, shipCanvas.width, shipCanvas.height);

            // Draw subtle grid
            shipCtx.strokeStyle = 'rgba(0, 212, 255, 0.05)';
            shipCtx.lineWidth = 1;
            for (let x = 0; x < shipCanvas.width; x += 50) {
                shipCtx.beginPath();
                shipCtx.moveTo(x, 0);
                shipCtx.lineTo(x, shipCanvas.height);
                shipCtx.stroke();
            }
            for (let y = 0; y < shipCanvas.height; y += 50) {
                shipCtx.beginPath();
                shipCtx.moveTo(0, y);
                shipCtx.lineTo(shipCanvas.width, y);
                shipCtx.stroke();
            }

            // Draw all rooms
            Object.values(rooms).forEach(room => {
                drawRoom(room);
            });

            // Update player movement
            updatePlayerMovement();

            // Draw player
            drawPlayer();

            // Continue animation
            requestAnimationFrame(renderShipHub);
        }

        // Draw a room
        function drawRoom(room) {
            // Room background
            shipCtx.fillStyle = room.color;
            shipCtx.fillRect(room.x, room.y, room.width, room.height);

            // Room border
            shipCtx.strokeStyle = room.borderColor;
            shipCtx.lineWidth = 2;
            shipCtx.strokeRect(room.x, room.y, room.width, room.height);

            // Room glow effect
            shipCtx.shadowColor = room.borderColor;
            shipCtx.shadowBlur = 15;
            shipCtx.shadowOffsetX = 0;
            shipCtx.shadowOffsetY = 0;
            shipCtx.strokeStyle = room.borderColor;
            shipCtx.lineWidth = 1;
            shipCtx.globalAlpha = 0.3;
            shipCtx.strokeRect(room.x - 5, room.y - 5, room.width + 10, room.height + 10);
            shipCtx.globalAlpha = 1.0;
            shipCtx.shadowColor = 'transparent';

            // Room label
            shipCtx.fillStyle = room.borderColor;
            shipCtx.font = 'bold 14px Arial';
            shipCtx.textAlign = 'center';
            shipCtx.textBaseline = 'middle';
            shipCtx.fillText(room.name, room.x + room.width / 2, room.y + room.height / 2 - 15);
            
            shipCtx.font = '20px Arial';
            shipCtx.fillText(room.icon, room.x + room.width / 2, room.y + room.height / 2 + 15);
        }

        // Update player movement
        function updatePlayerMovement() {
            let newX = gameState.playerX;
            let newY = gameState.playerY;

            if (keys['w'] || keys['arrowup']) newY -= gameState.playerSpeed;
            if (keys['s'] || keys['arrowdown']) newY += gameState.playerSpeed;
            if (keys['a'] || keys['arrowleft']) newX -= gameState.playerSpeed;
            if (keys['d'] || keys['arrowright']) newX += gameState.playerSpeed;

            // Simple collision detection
            if (!checkCollision(newX, newY)) {
                gameState.playerX = newX;
                gameState.playerY = newY;
            }

            // Boundary check
            gameState.playerX = Math.max(gameState.playerSize, Math.min(shipCanvas.width - gameState.playerSize, gameState.playerX));
            gameState.playerY = Math.max(gameState.playerSize, Math.min(shipCanvas.height - gameState.playerSize, gameState.playerY));
        }

        // Check collision with rooms
        function checkCollision(x, y) {
            for (const room of Object.values(rooms)) {
                if (x > room.x && x < room.x + room.width &&
                    y > room.y && y < room.y + room.height) {
                    return false; // Can move into rooms
                }
            }
            return false; // Can move anywhere for now
        }

        // Draw player
        function drawPlayer() {
            // Player body
            shipCtx.fillStyle = '#ff6b00';
            shipCtx.beginPath();
            shipCtx.arc(gameState.playerX, gameState.playerY, gameState.playerSize, 0, Math.PI * 2);
            shipCtx.fill();

            // Player glow
            shipCtx.strokeStyle = '#ffaa00';
            shipCtx.lineWidth = 2;
            shipCtx.beginPath();
            shipCtx.arc(gameState.playerX, gameState.playerY, gameState.playerSize, 0, Math.PI * 2);
            shipCtx.stroke();

            // Player direction indicator
            shipCtx.fillStyle = '#ffaa00';
            shipCtx.fillRect(gameState.playerX - 2, gameState.playerY - gameState.playerSize - 5, 4, 5);
        }

            // Check which room player is in
            for (const [key, room] of Object.entries(rooms)) {

                    return;
                }
            }
        }

            return gameState.playerX > room.x &&

                   gameState.playerY < room.y + room.height;

                            <div style="background: rgba(255, 204, 0, 0.1); border-left: 4px solid #ffcc00; padding: 15px; border-radius: 5px; margin-bottom: 20px;">
                                <div style="color: #ffcc00; font-weight: bold; margin-bottom: 10px;">💾 STORED INVENTORY</div>
                                <div style="color: #aaa; font-size: 13px; line-height: 1.8;">
                                    <div><strong style="color: #fff;">CREDITS:</strong> <span style="color: #ffcc00; font-weight: bold;">${gameState.credits.toLocaleString()} ⚡</span></div>
                                    <div><strong style="color: #fff;">MATERIALS:</strong> <span style="color: #ff8800; font-weight: bold;">${gameState.materials} units</span></div>
                                </div>
                            </div>

                            ${gameState.lastMissionReward ? `
                            <div style="background: rgba(0, 255, 136, 0.1); border-left: 4px solid #00ff88; padding: 15px; border-radius: 5px; margin-bottom: 20px;">
                                <div style="color: #00ff88; font-weight: bold; margin-bottom: 10px;">✓ LAST MISSION REWARDS</div>
                                <div style="color: #aaa; font-size: 13px; line-height: 1.8;">
                                    <div><strong style="color: #fff;">CREDITS EARNED:</strong> <span style="color: #ffcc00;">+${gameState.lastMissionReward.credits}</span></div>
                                    <div><strong style="color: #fff;">MATERIALS GAINED:</strong> <span style="color: #ff8800;">+${gameState.lastMissionReward.materials}</span></div>
                                    <div style="margin-top: 8px; color: #888; font-size: 12px;">Stored in cargo hold. Ready for upgrades.</div>
                                </div>
                            </div>
                            ` : `
                            <div style="background: rgba(100, 100, 100, 0.2); border-left: 4px solid #666; padding: 15px; border-radius: 5px; margin-bottom: 20px;">
                                <div style="color: #888; font-weight: bold; margin-bottom: 5px;">⚠ NO RECENT MISSIONS</div>
                                <div style="color: #666; font-size: 12px;">Complete a mission to earn rewards.</div>
                            </div>
                            `}

                            <div style="background: rgba(100, 100, 100, 0.15); padding: 15px; border-radius: 5px; margin-top: 20px;">
                                <div style="color: #888; font-size: 12px; line-height: 1.6;">
                                    💡 <strong>Cargo Bay Status:</strong> Industrial storage active. Rewards secure. Equipment ready for upgrades in Engineering.
                                </div>
                            </div>
                        </div>
                    `;
                    break;
                case 'centralHub':
                default:
                    modalContent.innerHTML = `
                        <div class="interaction-modal-header">● CENTRAL HUB</div>
                        <div class="interaction-modal-content">
                            <p>Welcome to the Mothership! Navigate to different areas:</p>
                            <ul style="margin-top: 15px; margin-left: 20px;">
                                <li>⚔ <strong>ARMORY</strong> — Weapons & loadouts</li>
                                <li>⚙ <strong>ENGINEERING</strong> — Ship upgrades</li>
                                <li>🔬 <strong>RESEARCH LAB</strong> — Tech research</li>
                                <li>🖥 <strong>CONTROL ROOM</strong> — Select missions</li>
                                <li>🚀 <strong>DROPSHIP</strong> — Launch pad</li>
                                <li>📦 <strong>CARGO BAY</strong> — Storage</li>
                            </ul>
                        </div>
                    `;
                    break;
            }

            document.getElementById('modalOverlay').classList.add('show');
            document.getElementById('interactionModal').classList.add('show');
        }

        function closeInteractionModal() {
            document.getElementById('modalOverlay').classList.remove('show');
            document.getElementById('interactionModal').classList.remove('show');
        }
        
        function closePreMissionScreen() {
            closeInteractionModal();
        }
        
        function showMissionOptions(idx) {
            showPreMissionScreen(idx);
        }

        // Get mission type color
        function getMissionTypeColor(missionType) {
            switch(missionType) {
                case 'ELIMINATION': return '#ff4444';
                case 'SURVIVAL': return '#44ff44';
                case 'DEFENSE': return '#4444ff';
                default: return '#ffaa00';
            }
        }

        // Get threat level color
        function getThreatColor(level) {
            if (level < 40) return '#44ff44';
            if (level < 60) return '#ffaa00';
            return '#ff4444';
        }

        // Show pre-mission screen
        function showPreMissionScreen(idx) {
            const planet = planets[idx];
            const modalContent = document.getElementById('modalContent');
            
            const missionObjective = getMissionObjective(planet.missionType);
            
            modalContent.innerHTML = `
                <div class="interaction-modal-header">⚠ OPERATION BRIEFING</div>
                <div class="interaction-modal-content">
                    <div style="background: rgba(0, 212, 255, 0.1); border-left: 4px solid ${getMissionTypeColor(planet.missionType)}; padding: 15px; border-radius: 5px; margin-bottom: 20px;">
                        <div style="color: #00d4ff; font-weight: bold; margin-bottom: 10px;">📍 ${planet.name}</div>
                        <div style="color: #aaa; font-size: 13px; line-height: 1.5;">
                            <div><strong style="color: #fff;">MISSION TYPE:</strong> ${planet.missionType}</div>
                            <div><strong style="color: #fff;">OBJECTIVE:</strong> ${missionObjective}</div>
                            <div style="margin-top: 10px;"><strong style="color: ${getThreatColor(planet.threatLevel)};">THREAT LEVEL: ${planet.threatLevel}%</strong></div>
                            <div><strong style="color: #fff;">TERRAIN:</strong> ${planet.terrainType}</div>
                            <div><strong style="color: #fff;">HOSTILES:</strong> ${planet.enemyType} (${planet.enemyCount})</div>
                            <div style="margin-top: 10px;"><strong style="color: #ffcc00;">ESTIMATED REWARD: ${planet.rewardMin}–${planet.rewardMax} Credits</strong></div>
                        </div>
                    </div>
                    <button class="planet-btn" style="background: #f97316; margin-top: 10px;" onclick="deployToMission(${idx})">DESCEND TO OPERATION</button>
                    <button class="planet-btn" style="background: #444; color: #aaa; margin-top: 10px;" onclick="closePreMissionScreen()">CANCEL</button>
                </div>
            `;
        }

        // Get mission objective description
        function getMissionObjective(missionType) {
            switch(missionType) {
                case 'ELIMINATION':
                    return 'Clear all hostile lifeforms in the AO.';
                case 'SURVIVAL':
                    return 'Survive until extraction arrives. Defend your position.';
                case 'DEFENSE':
                    return 'Protect critical equipment until secure pickup.';
                default:
                    return 'Unknown mission type.';
            }
        }

        // Show artifact preview and acceptance dialog
        function showArtifactPreview(artifact, onAccept, onReject) {
            const modalContent = document.getElementById('modalContent');
            
            const rarityColor = artifact.rarity === 'exotic' ? '#ff00ff' : artifact.rarity === 'rare' ? '#ffaa00' : '#00d4ff';
            const typeLabel = artifact.isPositive ? 'BENEFICIAL' : 'DANGEROUS';
            const typeColor = artifact.isPositive ? '#00ff88' : '#ff4444';
            
            let artifactHTML = `
                <div class="artifact-preview-card">
                    <div class="artifact-preview-header">🔮 ${artifact.name}</div>
                    
                    <div style="margin-bottom: 15px;">
                        <span class="artifact-rarity-badge" style="background: ${rarityColor}33; color: ${rarityColor}; border: 1px solid ${rarityColor};">
                            ${artifact.rarity.toUpperCase()}
                        </span>
                        <span class="artifact-type-badge" style="background: ${typeColor}33; color: ${typeColor}; border: 1px solid ${typeColor};">
                            ${typeLabel}
                        </span>
                    </div>

                    <div class="artifact-benefit">
                        <div class="artifact-benefit-label">✓ BENEFIT</div>
                        <div class="artifact-benefit-text">${artifact.benefit}</div>
                    </div>
                    
                    ${artifact.penalty ? `
                        <div class="artifact-penalty">
                            <div class="artifact-penalty-label">⚠️ PENALTY</div>
                            <div class="artifact-penalty-text">${artifact.penalty}</div>
                        </div>
                    ` : ''}
                    
                    <div class="artifact-lore">
                        "${artifact.lore}"
                    </div>
                    
                    <div class="artifact-action-buttons">
                        <button class="artifact-accept-btn" onclick="${onAccept}">ACCEPT</button>
                        <button class="artifact-reject-btn" onclick="${onReject}">REJECT</button>
                    </div>
                </div>
            `;
            
            modalContent.innerHTML = artifactHTML;
        }

        // Generate random artifact with risk/reward
        function generateArtifact(isPositive = null) {
            // If not specified, randomly choose beneficial or dangerous
            if (isPositive === null) {
                isPositive = Math.random() > 0.4; // 60% beneficial, 40% dangerous
            }

            let spec, rarity;
            if (isPositive) {
                spec = beneficialArtifactSpecs[Math.floor(Math.random() * beneficialArtifactSpecs.length)];
                rarity = ['common', 'rare', 'exotic'][Math.floor(Math.random() * 3)];
            } else {
                spec = dangerousArtifactSpecs[Math.floor(Math.random() * dangerousArtifactSpecs.length)];
                rarity = ['rare', 'exotic'][Math.floor(Math.random() * 2)]; // Dangerous artifacts are rarer
            }
            
            const researchValue = rarity === 'exotic' ? 30 : rarity === 'rare' ? 15 : 5;
            const loreSnippets = {
                WeaponCore: ['Radiates harmonic energy patterns.', 'Faintly glows with unknown power.', 'Ancient alien weapon technology.'],
                ShieldMatrix: ['Shimmers with defensive potential.', 'Adapts to environmental forces.', 'Engineered by an advanced civilization.'],
                EnergyCell: ['Pulses with boundless energy.', 'Propels faster than physics allows.', 'Source of immense kinetic potential.'],
                DataCore: ['Contains vast computational archives.', 'Holds strategic enemy intelligence.', 'Biological patterns encoded within.']
            };
            const lore = loreSnippets[spec.type][Math.floor(Math.random() * loreSnippets[spec.type].length)];
            
            return {
                id: Date.now() + Math.random(),
                name: spec.name,
                type: spec.type,
                rarity: rarity,
                researchValue: researchValue,
                lore: lore,
                unlocksRarity: rarity === 'exotic' ? 'legendary' : rarity,
                isPositive: isPositive,
                benefit: spec.benefit,
                penalty: spec.penalty
            };
        }

        // Analyze artifact
        function analyzeArtifact(artifactId) {
            const artifact = gameState.artifacts.find(a => a.id === artifactId);
            if (!artifact) return;
            
            gameState.activeAnalysis = {
                artifact: artifact,
                startTime: Date.now(),
                duration: artifact.rarity === 'exotic' ? 10000 : artifact.rarity === 'rare' ? 6000 : 3000,
                progress: 0
            };
            
            showRoomUI('researchLab', rooms.researchLab);
        }

        // Complete artifact analysis
        function completeAnalysis() {
            if (!gameState.activeAnalysis) return;
            
            const artifact = gameState.activeAnalysis.artifact;
            const techId = artifactTypes[artifact.type].techUnlock;
            
            gameState.completedResearch.push(techId);
            gameState.organizationTrust += 10;
            gameState.activeAnalysis = null;
            
            showRoomUI('researchLab', rooms.researchLab);
            showNotification(`${artifact.name} analyzed! Tech unlocked: ${techSystem[techId].name}`);
        }

        // Apply tech to ship
        function applyTech(techId, target) {
            const tech = techSystem[techId];
            if (!gameState.completedResearch.includes(techId)) return;
            if (gameState.ship.appliedTechs.includes(techId)) {
                alert('This tech is already applied!');
                return;
            }
            
            gameState.ship.appliedTechs.push(techId);
            
            // Apply bonuses
            if (tech.bonus.weaponDamage) {
                gameState.ship.weaponLevel += Math.round(tech.bonus.weaponDamage / 10);
            }
            if (tech.bonus.shieldAbsorption) {
                gameState.ship.maxShield += tech.bonus.shieldAbsorption;
                gameState.ship.shield = gameState.ship.maxShield;
            }
            if (tech.bonus.engineSpeed) {
                gameState.ship.engineLevel += 1;
                gameState.playerSpeed += 0.5;
            }
            
            showRoomUI('engineering', rooms.engineering);
            showNotification(`Applied: ${tech.name} - bonuses active!`);
        }

        // Deploy to mission
        function deployToMission(idx, missionType = 'main') {
            const planet = planets[idx];
            const missionData = missionType === 'main' ? planet.mainMission : planet.artifactHunt;
            const enemySpecies = missionData.enemyType;
            const enemyCount = missionData.enemyCount;
            
            // TRACK ENEMY ENCOUNTERS
            if (gameState.encounterData[enemySpecies]) {
                gameState.encounterData[enemySpecies].encounters += enemyCount;
                
                // UPDATE TIER BASED ON ENCOUNTERS
                if (gameState.encounterData[enemySpecies].encounters >= 30) {
                    gameState.encounterData[enemySpecies].tier = 3;
                    gameState.encounterData[enemySpecies].studied = true;
                } else if (gameState.encounterData[enemySpecies].encounters >= 15) {
                    gameState.encounterData[enemySpecies].tier = 2;
                    gameState.encounterData[enemySpecies].studied = true;
                } else if (gameState.encounterData[enemySpecies].encounters >= 5) {
                    gameState.encounterData[enemySpecies].tier = 1;
                    gameState.encounterData[enemySpecies].studied = true;
                }
            }
            
            if (missionType === 'main') {
                // MAIN MISSION: Credits + occasional artifacts
                let baseCredits = Math.floor(Math.random() * (missionData.rewardMax - missionData.rewardMin + 1)) + missionData.rewardMin;
                let baseMaterials = Math.floor(Math.random() * 4) + 1;
                
                // Apply Advanced Analytics bonus if researched
                if (gameState.completedResearch.includes('advAnalytics')) {
                    baseCredits = Math.floor(baseCredits * 1.25);
                }
                
                const reward = {
                    credits: baseCredits,
                    materials: baseMaterials,
                    artifacts: []
                };
                
                // Generate 1-3 random artifacts
                const artifactCount = Math.floor(Math.random() * 3) + 1;
                for (let i = 0; i < artifactCount; i++) {
                    reward.artifacts.push(generateArtifact());
                }
                
                // Update game state
                gameState.lastMissionReward = reward;
                gameState.credits += reward.credits;
                gameState.materials += baseMaterials;
                gameState.artifacts.push(...reward.artifacts);
                gameState.organizationTrust = Math.min(100, gameState.organizationTrust + 5);
                
                closeInteractionModal();
                
                // Show mission complete screen with encounter data
                let artifactList = reward.artifacts.map(a => `• ${a.name} (${a.rarity})`).join('\n');
                let encounterMsg = `${enemyCount}x ${enemySpecies} defeated!\nTotal encounters: ${gameState.encounterData[enemySpecies].encounters}`;
                alert(`MISSION COMPLETE: ${planet.name}\n\nCOMBAT DATA:\n${encounterMsg}\n\nREWARDS EARNED:\n+${reward.credits} Credits\n+${reward.materials} Materials\n\nARTIFACTS RECOVERED:\n${artifactList}\n\nVisit Research Lab to analyze!`);
            } else {
                // ARTIFACT HUNT: No credits, 2-4 artifacts (mixed good/dangerous)
                const artifactCount = missionData.artifactRewards;
                const reward = {
                    credits: 0,
                    materials: 0,
                    artifacts: []
                };
                
                // Generate mix of beneficial and dangerous artifacts
                for (let i = 0; i < artifactCount; i++) {
                    // Higher chance of dangerous in artifact hunts
                    const isPositive = Math.random() > 0.6; // 40% beneficial, 60% dangerous
                    reward.artifacts.push(generateArtifact(isPositive));
                }
                
                // Update game state
                gameState.lastMissionReward = reward;
                gameState.artifacts.push(...reward.artifacts);
                gameState.organizationTrust = Math.min(100, gameState.organizationTrust + 3); // Less trust for risky hunts
                
                closeInteractionModal();
                
                // Show mission complete screen with artifact recovery details
                let artifactList = reward.artifacts.map(a => `• ${a.name} (${a.rarity}) ${a.isPositive ? '✓' : '⚠'}`).join('\n');
                let encounterMsg = `${enemyCount}x ${enemySpecies} encountered!\nTotal encounters: ${gameState.encounterData[enemySpecies].encounters}`;
                alert(`ARTIFACT HUNT COMPLETE: ${planet.name}\n\nCOMBAT DATA:\n${encounterMsg}\n\nARTIFACTS RECOVERED:\n${artifactList}\n\n⚠️ Some artifacts may have side effects!\nAnalyze in Research Lab to learn more.`);
            }
        }

        function exitToMenu() {
            document.getElementById('shipHubContainer').style.display = 'none';
            document.getElementById('mainMenu').style.display = 'flex';
            closeInteractionModal();
        }

        function exitGame() {
            alert('Thanks for playing Planetfall!');
        }

        // Upgrade functions
        function getWeaponUpgradeCost() {
            const baseCost = 100;
            return baseCost * gameState.ship.weaponLevel;
        }

        function getShieldUpgradeCost() {
            const baseCost = 80;
            return baseCost * gameState.ship.shieldLevel;
        }

        function getRepairCost(amount) {
            // Base cost 10 credits per 1% hull repair
            let baseCost = 10;
            // Hull Reinforcement research reduces cost by 20%
            if (gameState.ship.researches['hullReinforcement']) {
                baseCost *= 0.8;
            }
            return Math.floor((amount / 100) * gameState.ship.maxHull * baseCost);
        }

        function upgradeWeapon() {
            if (gameState.ship.weaponLevel >= 5) {
                alert('Weapons at maximum level!');
                return;
            }
            const cost = getWeaponUpgradeCost();
            if (gameState.credits >= cost) {
                gameState.credits -= cost;
                gameState.ship.weaponLevel += 1;
                showRoomUI('engineering', rooms.engineering);
                showNotification(`Weapon upgraded to Level ${gameState.ship.weaponLevel}!`);
            } else {
                alert(`Insufficient credits! Need ${cost}, have ${gameState.credits}`);
            }
        }

        function upgradeShield() {
            if (gameState.ship.shieldLevel >= 5) {
                alert('Shields at maximum level!');
                return;
            }
            const cost = getShieldUpgradeCost();
            if (gameState.credits >= cost) {
                gameState.credits -= cost;
                gameState.ship.shieldLevel += 1;
                gameState.ship.maxShield = 100 + (gameState.ship.shieldLevel - 1) * 20;
                gameState.ship.shield = gameState.ship.maxShield;
                showRoomUI('engineering', rooms.engineering);
                showNotification(`Shields upgraded to Level ${gameState.ship.shieldLevel}!`);
            } else {
                alert(`Insufficient credits! Need ${cost}, have ${gameState.credits}`);
            }
        }

        function repairHull(percentage) {
            const amount = Math.min(percentage, 100 - gameState.ship.hull);
            if (amount <= 0) {
                alert('Hull already at full integrity!');
                return;
            }
            const cost = getRepairCost(amount);
            if (gameState.credits >= cost) {
                gameState.credits -= cost;
                gameState.ship.hull = Math.min(100, gameState.ship.hull + amount);
                showRoomUI('engineering', rooms.engineering);
                showNotification(`Hull repaired +${Math.round(amount)}%!`);
            } else {
                alert(`Insufficient credits! Need ${cost}, have ${gameState.credits}`);
            }
        }

        function researchTech(techId, cost) {
            if (gameState.materials >= cost) {
                gameState.materials -= cost;
                gameState.ship.researches[techId] = true;
                showRoomUI('researchLab', rooms.researchLab);
                showNotification(`Research complete! Tech unlocked.`);
            } else {
                alert(`Insufficient materials! Need ${cost}, have ${gameState.materials}`);
            }
        }

        function showNotification(text) {
            // Simple notification - could be enhanced with toast/overlay
            console.log('Notification:', text);
        }

        // Initialize on load
        window.addEventListener('load', () => {
            // Menu ready
        });

        // Handle window resize
        window.addEventListener('resize', () => {
            if (gameState.currentLocation === 'ship' && shipCanvas) {
                shipCanvas.width = window.innerWidth;
                shipCanvas.height = window.innerHeight;
            }
        });
    </script>
</body>
</html>
