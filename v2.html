<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Planetfall: Extraction</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        body { font-family: 'Arial', sans-serif; background: #000; color: #e0e0e0; }
        
        /* MAIN MENU */
        #mainMenu {
            position: relative;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background: #000;
            overflow: hidden;
        }

        .menu-bg-glow {
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, rgba(0,0,0,1) 0%, rgba(10,10,20,0.8) 50%, rgba(0,0,0,1) 100%);
            z-index: 1;
        }

        .menu-content {
            position: relative;
            z-index: 10;
            text-align: center;
            animation: fadeInDown 0.8s ease-out;
        }

        @keyframes fadeInDown {
            from {
                opacity: 0;
                transform: translateY(-30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .menu-logo {
            margin-bottom: 12px;
        }

        .menu-title {
            font-size: clamp(48px, 10vw, 96px);
            font-weight: 900;
            letter-spacing: 0.25em;
            color: #fff;
            margin: 0;
            text-shadow: 0 0 30px rgba(59, 130, 246, 0.3), 0 0 60px rgba(59, 130, 246, 0.1);
        }

        .menu-subtitle {
            font-size: clamp(18px, 3vw, 32px);
            letter-spacing: 0.5em;
            color: #3b82f6;
            font-weight: 300;
            margin: 8px 0 0 0;
            text-shadow: 0 0 20px rgba(59, 130, 246, 0.2);
        }

        .menu-tagline {
            font-size: clamp(12px, 1.5vw, 16px);
            letter-spacing: 0.4em;
            color: #888;
            font-weight: 400;
            margin-top: 16px;
            text-transform: uppercase;
        }

        .menu-buttons {
            display: flex;
            flex-direction: column;
            gap: 12px;
            width: 100%;
            max-width: 420px;
            margin-top: 48px;
        }

        .menu-btn {
            position: relative;
            overflow: hidden;
            padding: 14px 24px;
            font-size: 16px;
            font-weight: 600;
            letter-spacing: 0.15em;
            text-align: left;
            border: 2px solid;
            border-radius: 16px;
            cursor: pointer;
            transition: all 0.3s ease;
            background: transparent;
            text-transform: uppercase;
        }

        .menu-btn.primary {
            border-color: #f97316;
            color: #fff;
            background: rgba(249, 115, 22, 0.15);
        }

        .menu-btn.primary:hover {
            border-color: #fb923c;
            background: rgba(249, 115, 22, 0.25);
            box-shadow: 0 0 20px rgba(249, 115, 22, 0.3);
            transform: translateX(4px);
        }

        .menu-btn.secondary {
            border-color: #52525b;
            color: #e4e4e7;
            background: rgba(82, 82, 89, 0.1);
        }

        .menu-btn.secondary:hover {
            border-color: #3b82f6;
            color: #fff;
            background: rgba(59, 130, 246, 0.1);
            box-shadow: 0 0 15px rgba(59, 130, 246, 0.2);
            transform: translateX(4px);
        }

        .menu-footer {
            position: absolute;
            bottom: 20px;
            left: 0;
            right: 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 30px;
            font-size: 11px;
            letter-spacing: 0.2em;
            color: #666;
            z-index: 10;
        }

        @keyframes dropshipGlow {
            0%, 100% { box-shadow: 0 0 40px rgba(255, 204, 0, 0.5); }
            50% { box-shadow: 0 0 60px rgba(255, 204, 0, 0.8); }
        }

        /* SHIP HUB */
        #shipHubContainer {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #0a0e1f;
            z-index: 100;
        }

        #shipHubCanvas {
            display: block;
            width: 100%;
            height: 100%;
            cursor: crosshair;
        }

        /* SHIP HUB UI */
        .ship-ui-layer {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 101;
        }

        .ship-header {
            position: fixed;
            top: 20px;
            left: 20px;
            color: #00d4ff;
            font-size: 18px;
            font-weight: bold;
            pointer-events: auto;
            z-index: 102;
            text-shadow: 0 0 10px rgba(0, 212, 255, 0.3);
        }

        .ship-hint {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            color: #888;
            font-size: 13px;
            text-align: center;
            pointer-events: auto;
            z-index: 102;
        }

        .ship-hint-highlight {
            color: #00d4ff;
            font-weight: bold;
        }

        .ship-exit-btn {
            position: fixed;
            top: 20px;
            right: 20px;
            background: #f97316;
            color: white;
            padding: 10px 20px;
            border: none;
            cursor: pointer;
            border-radius: 5px;
            font-weight: bold;
            pointer-events: auto;
            z-index: 103;
            transition: all 0.2s;
        }

        .ship-exit-btn:hover {
            background: #fb923c;
            box-shadow: 0 0 15px rgba(249, 115, 22, 0.4);
        }

        /* INTERACTION MODAL */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            z-index: 104;
            pointer-events: auto;
        }

        .modal-overlay.show {
            display: block;
        }

        .interaction-modal {
            display: none;
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(10, 14, 39, 0.98);
            border: 2px solid #00d4ff;
            border-radius: 10px;
            padding: 0;
            min-width: 500px;
            max-height: 80vh;
            z-index: 105;
            box-shadow: 0 0 40px rgba(0, 212, 255, 0.2);
            pointer-events: auto;
            flex-direction: column;
            overflow: hidden;
        }

        .interaction-modal.show {
            display: flex;
        }

        .interaction-modal-header {
            color: #00d4ff;
            font-size: 28px;
            font-weight: bold;
            border-bottom: 2px solid #00d4ff;
            padding: 20px 40px 15px 40px;
            text-shadow: 0 0 10px rgba(0, 212, 255, 0.3);
            flex-shrink: 0;
            background: rgba(10, 14, 39, 0.98);
        }

        .interaction-modal-content {
            color: #aaa;
            font-size: 14px;
            line-height: 1.6;
            padding: 20px 40px 40px 40px;
            flex: 1;
            overflow-y: auto;
            overflow-x: hidden;
            min-height: 0;
        }
        
        #modalContent {
            position: relative;
            flex: 1;
            overflow-y: auto;
            overflow-x: hidden;
            display: flex;
            flex-direction: column;
        }

        .close-modal-btn {
            position: absolute;
            top: 8px;
            right: 8px;
            background: #ff4444;
            color: white;
            border: none;
            width: 32px;
            height: 32px;
            cursor: pointer;
            border-radius: 3px;
            font-size: 20px;
            pointer-events: auto;
            z-index: 110;
        }

        .close-modal-btn:hover {
            background: #ff6666;
        }

        /* PLANET SELECTION */
        .planet-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-top: 20px;
        }

        .planet-card {
            background: #1a1f3a;
            border: 2px solid #444;
            padding: 20px;
            border-radius: 5px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .planet-card:hover {
            border-color: #00d4ff;
            background: #2a2f4a;
            box-shadow: 0 0 15px rgba(0, 212, 255, 0.2);
        }

        .planet-name {
            color: #00d4ff;
            font-weight: bold;
            font-size: 18px;
            margin-bottom: 10px;
        }

        .planet-info {
            font-size: 12px;
            color: #aaa;
            margin: 5px 0;
        }

        .difficulty {
            font-weight: bold;
            margin: 10px 0;
        }

        .difficulty.easy { color: #00ff88; }
        .difficulty.medium { color: #ffaa00; }
        .difficulty.hard { color: #ff4444; }

        .planet-btn {
            background: #f97316;
            color: #0a0e27;
            padding: 10px 16px;
            margin-top: 12px;
            border: none;
            cursor: pointer;
            font-weight: bold;
            border-radius: 5px;
            width: 100%;
            transition: all 0.2s ease;
            font-size: 14px;
            letter-spacing: 0.1em;
        }

        .planet-btn:hover {
            background: #fb923c;
            box-shadow: 0 0 15px rgba(249, 115, 22, 0.4);
            transform: translateY(-2px);
        }

        /* ARTIFACT PREVIEW CARD */
        .artifact-preview-card {
            background: rgba(20, 20, 50, 0.95);
            border: 2px solid #bb00ff;
            border-radius: 10px;
            padding: 25px;
            margin-bottom: 20px;
            box-shadow: 0 0 30px rgba(187, 0, 255, 0.2);
        }

        .artifact-preview-header {
            font-size: 24px;
            color: #bb00ff;
            font-weight: bold;
            margin-bottom: 15px;
            border-bottom: 2px solid #bb00ff;
            padding-bottom: 10px;
        }

        .artifact-rarity-badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 12px;
            font-size: 11px;
            font-weight: bold;
            letter-spacing: 0.1em;
            margin-bottom: 12px;
        }

        .artifact-type-badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 12px;
            font-size: 11px;
            font-weight: bold;
            margin-left: 8px;
        }

        .artifact-benefit {
            background: rgba(0, 255, 136, 0.1);
            border-left: 4px solid #00ff88;
            padding: 12px;
            border-radius: 5px;
            margin-bottom: 12px;
        }

        .artifact-benefit-label {
            color: #00ff88;
            font-weight: bold;
            font-size: 12px;
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 0.1em;
        }

        .artifact-benefit-text {
            color: #00ff88;
            font-size: 14px;
            font-weight: bold;
        }

        .artifact-penalty {
            background: rgba(255, 68, 68, 0.1);
            border-left: 4px solid #ff4444;
            padding: 12px;
            border-radius: 5px;
            margin-bottom: 12px;
        }

        .artifact-penalty-label {
            color: #ff4444;
            font-weight: bold;
            font-size: 12px;
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 0.1em;
        }

        .artifact-penalty-text {
            color: #ff4444;
            font-size: 14px;
            font-weight: bold;
        }

        .artifact-lore {
            background: rgba(100, 100, 100, 0.15);
            padding: 12px;
            border-radius: 5px;
            color: #aaa;
            font-size: 12px;
            font-style: italic;
            margin-bottom: 15px;
        }

        .artifact-action-buttons {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }

        .artifact-accept-btn {
            background: #00ff88;
            color: #000;
            padding: 10px;
            border: none;
            border-radius: 5px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s;
        }

        .artifact-accept-btn:hover {
            background: #00dd77;
            box-shadow: 0 0 15px rgba(0, 255, 136, 0.4);
        }

        .artifact-reject-btn {
            background: #444;
            color: #aaa;
            padding: 10px;
            border: 1px solid #666;
            border-radius: 5px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s;
        }

        .artifact-reject-btn:hover {
            background: #555;
            color: #fff;
            border-color: #888;
        }

        /* MISSION SELECTION STYLES */
        .mission-option-container {
            background: rgba(30, 30, 60, 0.8);
            border: 2px solid #00d4ff;
            border-radius: 8px;
            padding: 15px;
            margin-bottom: 15px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .mission-option-container:hover {
            background: rgba(40, 40, 80, 0.8);
            border-color: #00ff88;
            box-shadow: 0 0 20px rgba(0, 255, 136, 0.2);
        }

        .mission-option-container.artifact-hunt {
            border-color: #ff8800;
        }

        .mission-option-container.artifact-hunt:hover {
            border-color: #ffaa00;
            box-shadow: 0 0 20px rgba(255, 170, 0, 0.2);
        }

        .mission-option-title {
            font-size: 16px;
            font-weight: bold;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .mission-option-desc {
            font-size: 12px;
            color: #aaa;
            margin-bottom: 10px;
            line-height: 1.4;
        }

        .mission-option-details {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            font-size: 12px;
            margin-bottom: 12px;
        }

        .mission-detail-item {
            background: rgba(255, 255, 255, 0.05);
            padding: 8px;
            border-radius: 4px;
        }

        .mission-detail-label {
            color: #888;
            font-size: 10px;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            margin-bottom: 4px;
        }

        .mission-detail-value {
            color: #fff;
            font-weight: bold;
        }

        /* ARMORY TABBED INTERFACE */
        .armory-full-screen {
            display: none; /* Fullscreen mode disabled */
        }

        .armory-main-layout {
            display: grid;
            grid-template-columns: 140px 1fr 200px;
            gap: 0;
            width: 100%;
            height: auto;
            max-height: 60vh;
            border-bottom: 2px solid #00d4ff;
        }

        /* LEFT PANEL: TAB NAVIGATION */
        .armory-nav-panel {
            background: rgba(26, 31, 58, 0.85);
            border-right: 1px solid rgba(0, 212, 255, 0.2);
            padding: 12px 0;
            display: flex;
            flex-direction: column;
            gap: 4px;
            overflow-y: auto;
            max-height: 60vh;
        }

        .armory-nav-btn {
            background: transparent;
            border: none;
            color: #888;
            padding: 10px 12px;
            cursor: pointer;
            text-align: left;
            font-size: 10px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            transition: all 0.2s;
            border-left: 3px solid transparent;
            margin: 0 4px;
            border-radius: 0 3px 3px 0;
        }

        .armory-nav-btn:hover {
            background: rgba(0, 212, 255, 0.1);
            color: #00d4ff;
        }

        .armory-nav-btn.active {
            background: rgba(0, 212, 255, 0.15);
            color: #00d4ff;
            border-left-color: #00d4ff;
            box-shadow: inset 0 0 20px rgba(0, 212, 255, 0.1);
        }

        /* CENTER PANEL: CONTENT */
        .armory-content-panel {
            background: #0a0e1f;
            overflow-y: auto;
            padding: 12px;
            display: flex;
            flex-direction: column;
            max-height: 60vh;
        }

        .armory-tab-content {
            display: none;
        }

        .armory-tab-content.active {
            display: flex;
            flex-direction: column;
        }

        /* GRID LAYOUTS FOR ITEMS */
        .armory-item-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(100px, 1fr));
            gap: 8px;
            width: 100%;
        }

        .armory-item-card {
            background: rgba(30, 35, 70, 0.8);
            border: 2px solid #333;
            border-radius: 6px;
            padding: 12px;
            text-align: center;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 140px;
        }

        .armory-item-card:hover {
            border-color: #00d4ff;
            background: rgba(30, 35, 70, 1);
            box-shadow: 0 0 15px rgba(0, 212, 255, 0.2);
            transform: translateY(-2px);
        }

        .armory-item-card.selected {
            border-color: #00d4ff;
            background: rgba(0, 212, 255, 0.15);
            box-shadow: 0 0 20px rgba(0, 212, 255, 0.4);
        }

        .armory-item-icon {
            font-size: 48px;
            margin-bottom: 8px;
        }

        .armory-item-name {
            font-size: 12px;
            font-weight: 600;
            color: #e0e0e0;
            margin-bottom: 4px;
        }

        .armory-item-subtext {
            font-size: 10px;
            color: #888;
        }

        .armory-rarity-badge {
            display: inline-block;
            padding: 3px 8px;
            border-radius: 3px;
            font-size: 9px;
            font-weight: bold;
            text-transform: uppercase;
            margin-top: 6px;
            letter-spacing: 0.05em;
        }

        .rarity-common { background: rgba(200, 200, 200, 0.2); color: #ccc; border: 1px solid #888; }
        .rarity-rare { background: rgba(0, 212, 255, 0.2); color: #00d4ff; border: 1px solid #00d4ff; }
        .rarity-exotic { background: rgba(187, 0, 255, 0.2); color: #bb00ff; border: 1px solid #bb00ff; }

        /* ARMOR CARDS (LARGER) */
        .armory-armor-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
            gap: 10px;
            width: 100%;
        }

        .armory-armor-card {
            background: rgba(30, 35, 70, 0.8);
            border: 2px solid #333;
            border-radius: 8px;
            padding: 16px;
            cursor: pointer;
            transition: all 0.2s;
            text-align: center;
        }

        .armory-armor-card:hover {
            border-color: #ffaa00;
            background: rgba(30, 35, 70, 1);
            box-shadow: 0 0 15px rgba(255, 170, 0, 0.2);
            transform: translateY(-2px);
        }

        .armory-armor-card.selected {
            border-color: #ffaa00;
            background: rgba(255, 170, 0, 0.15);
            box-shadow: 0 0 20px rgba(255, 170, 0, 0.4);
        }

        .armory-armor-icon {
            font-size: 56px;
            margin-bottom: 12px;
        }

        .armory-armor-name {
            font-size: 14px;
            font-weight: 700;
            color: #e0e0e0;
            margin-bottom: 8px;
        }

        .armory-armor-stat {
            font-size: 11px;
            color: #aaa;
            margin: 4px 0;
        }

        /* RIGHT PANEL: DETAILS & STATS */
        .armory-details-panel {
            background: rgba(26, 31, 58, 0.85);
            border-left: 1px solid rgba(0, 212, 255, 0.2);
            padding: 12px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            max-height: 60vh;
            font-size: 11px;
        }

        .armory-detail-section {
            margin-bottom: 20px;
        }

        .armory-detail-title {
            color: #00d4ff;
            font-size: 11px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            margin-bottom: 10px;
            border-bottom: 1px solid rgba(0, 212, 255, 0.2);
            padding-bottom: 8px;
        }

        .armory-detail-name {
            color: #fff;
            font-size: 14px;
            font-weight: 700;
            margin-bottom: 8px;
        }

        .armory-detail-desc {
            font-size: 11px;
            color: #aaa;
            line-height: 1.4;
            margin-bottom: 12px;
        }

        .armory-stat-display {
            background: rgba(0, 0, 0, 0.3);
            padding: 10px;
            border-radius: 4px;
            margin-bottom: 8px;
        }

        .armory-stat-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
        }

        .armory-stat-label {
            color: #888;
            font-size: 10px;
            text-transform: uppercase;
            font-weight: 600;
            letter-spacing: 0.05em;
        }

        .armory-stat-bar {
            flex: 1;
            background: #333;
            height: 6px;
            border-radius: 2px;
            overflow: hidden;
            margin: 0 8px;
        }

        .armory-stat-fill {
            height: 100%;
            background: linear-gradient(90deg, #00d4ff, #00ff88);
            transition: width 0.3s;
        }

        .armory-stat-value {
            color: #00d4ff;
            font-size: 10px;
            font-weight: 600;
            min-width: 35px;
            text-align: right;
        }

        .armory-perk-box {
            background: rgba(187, 0, 255, 0.1);
            border-left: 3px solid #bb00ff;
            padding: 10px;
            border-radius: 4px;
            margin-bottom: 8px;
        }

        .armory-perk-icon {
            font-size: 18px;
            margin-bottom: 4px;
        }

        .armory-perk-name {
            color: #bb00ff;
            font-size: 11px;
            font-weight: 700;
            margin-bottom: 4px;
        }

        .armory-perk-desc {
            color: #aaa;
            font-size: 10px;
            line-height: 1.3;
        }

        /* ACTION BUTTONS IN DETAILS */
        .armory-action-buttons {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
            margin-top: 12px;
        }

        .armory-action-btn {
            background: rgba(0, 212, 255, 0.2);
            border: 1px solid #00d4ff;
            color: #00d4ff;
            padding: 8px 12px;
            border-radius: 4px;
            font-size: 10px;
            font-weight: 600;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            transition: all 0.2s;
        }

        .armory-action-btn:hover {
            background: rgba(0, 212, 255, 0.4);
            box-shadow: 0 0 10px rgba(0, 212, 255, 0.3);
        }

        /* BOTTOM BAR */
        .armory-bottom-bar {
            background: transparent;
            border-top: 2px solid #00d4ff;
            padding: 16px 0;
            display: grid;
            grid-template-columns: auto 1fr auto;
            gap: 20px;
            align-items: center;
            margin-top: 16px;
        }

        .armory-bottom-actions {
            display: flex;
            gap: 8px;
        }

        .armory-bottom-btn {

        function addWeaponUpgrade(weaponKey, upgradeKey, weaponCategory) {
            if (!gameState.weaponUpgrades[weaponKey]) {
                gameState.weaponUpgrades[weaponKey] = [];
            }
            
            const upgrades = gameState.weaponUpgrades[weaponKey];
            if (upgrades.length >= 3) {
                alert('Maximum 3 upgrades per weapon!');
                return;
            }
            
            if (upgrades.includes(upgradeKey)) {
                alert('This upgrade is already installed!');
                return;
            }
            
            const upgrade = weaponUpgrades[upgradeKey];
            if (gameState.credits >= upgrade.cost) {
                gameState.credits -= upgrade.cost;
                upgrades.push(upgradeKey);
                showArmoryLoadoutUI();
                showNotification(`✓ ${upgrade.name} installed! (-${upgrade.cost} credits)`);
            } else {
                alert(`Insufficient credits! Need ${upgrade.cost}, have ${gameState.credits}`);
            }
        }
        
        function removeWeaponUpgrade(weaponKey, upgradeKey, weaponCategory) {
            if (!gameState.weaponUpgrades[weaponKey]) return;
            
            const upgrades = gameState.weaponUpgrades[weaponKey];
            const idx = upgrades.indexOf(upgradeKey);
            if (idx > -1) {
                upgrades.splice(idx, 1);
                showArmoryLoadoutUI();
                const upgrade = weaponUpgrades[upgradeKey];
                showNotification(`✓ ${upgrade.name} removed!`);

        // Initialize ship hub
        let shipCanvas, shipCtx;
        function initShipHub() {
            shipCanvas = document.getElementById('shipHubCanvas');
            shipCtx = shipCanvas.getContext('2d');
            shipCanvas.width = window.innerWidth;
            shipCanvas.height = window.innerHeight;
            
            // Set up canvas coordinate system for isometric-like view
            shipCtx.imageSmoothingEnabled = true;
            
            renderShipHub();
        }

        // Render ship hub
        function renderShipHub() {
            // Clear canvas with dark background
            shipCtx.fillStyle = '#0a0e1f';
            shipCtx.fillRect(0, 0, shipCanvas.width, shipCanvas.height);

            // Draw subtle grid
            shipCtx.strokeStyle = 'rgba(0, 212, 255, 0.05)';
            shipCtx.lineWidth = 1;
            for (let x = 0; x < shipCanvas.width; x += 50) {
                shipCtx.beginPath();
                shipCtx.moveTo(x, 0);
                shipCtx.lineTo(x, shipCanvas.height);
                shipCtx.stroke();
            }
            for (let y = 0; y < shipCanvas.height; y += 50) {
                shipCtx.beginPath();
                shipCtx.moveTo(0, y);
                shipCtx.lineTo(shipCanvas.width, y);
                shipCtx.stroke();
            }

            // Draw all rooms
            Object.values(rooms).forEach(room => {
                drawRoom(room);
            });

            // Update player movement
            updatePlayerMovement();

            // Draw player
            drawPlayer();

            // Continue animation
            requestAnimationFrame(renderShipHub);
        }

        // Draw a room
        function drawRoom(room) {
            // Room background
            shipCtx.fillStyle = room.color;
            shipCtx.fillRect(room.x, room.y, room.width, room.height);

            // Room border
            shipCtx.strokeStyle = room.borderColor;
            shipCtx.lineWidth = 2;
            shipCtx.strokeRect(room.x, room.y, room.width, room.height);

            // Room glow effect
            shipCtx.shadowColor = room.borderColor;
            shipCtx.shadowBlur = 15;
            shipCtx.shadowOffsetX = 0;
            shipCtx.shadowOffsetY = 0;
            shipCtx.strokeStyle = room.borderColor;
            shipCtx.lineWidth = 1;
            shipCtx.globalAlpha = 0.3;
            shipCtx.strokeRect(room.x - 5, room.y - 5, room.width + 10, room.height + 10);
            shipCtx.globalAlpha = 1.0;
            shipCtx.shadowColor = 'transparent';

            // Room label
            shipCtx.fillStyle = room.borderColor;
            shipCtx.font = 'bold 14px Arial';
            shipCtx.textAlign = 'center';
            shipCtx.textBaseline = 'middle';
            shipCtx.fillText(room.name, room.x + room.width / 2, room.y + room.height / 2 - 15);
            
            shipCtx.font = '20px Arial';
            shipCtx.fillText(room.icon, room.x + room.width / 2, room.y + room.height / 2 + 15);
        }

        // Update player movement
        function updatePlayerMovement() {
            let newX = gameState.playerX;
            let newY = gameState.playerY;

            if (keys['w'] || keys['arrowup']) newY -= gameState.playerSpeed;
            if (keys['s'] || keys['arrowdown']) newY += gameState.playerSpeed;
            if (keys['a'] || keys['arrowleft']) newX -= gameState.playerSpeed;
            if (keys['d'] || keys['arrowright']) newX += gameState.playerSpeed;

            // Simple collision detection
            if (!checkCollision(newX, newY)) {
                gameState.playerX = newX;
                gameState.playerY = newY;
            }

            // Boundary check
            gameState.playerX = Math.max(gameState.playerSize, Math.min(shipCanvas.width - gameState.playerSize, gameState.playerX));
            gameState.playerY = Math.max(gameState.playerSize, Math.min(shipCanvas.height - gameState.playerSize, gameState.playerY));
        }

        // Check collision with rooms
        function checkCollision(x, y) {
            for (const room of Object.values(rooms)) {
                if (x > room.x && x < room.x + room.width &&
                    y > room.y && y < room.y + room.height) {
                    return false; // Can move into rooms
                }
            }
            return false; // Can move anywhere for now
        }

        // Draw player
        function drawPlayer() {
            // Player body
            shipCtx.fillStyle = '#ff6b00';
            shipCtx.beginPath();
            shipCtx.arc(gameState.playerX, gameState.playerY, gameState.playerSize, 0, Math.PI * 2);
            shipCtx.fill();

            // Player glow
            shipCtx.strokeStyle = '#ffaa00';
            shipCtx.lineWidth = 2;
            shipCtx.beginPath();
            shipCtx.arc(gameState.playerX, gameState.playerY, gameState.playerSize, 0, Math.PI * 2);
            shipCtx.stroke();

            // Player direction indicator
            shipCtx.fillStyle = '#ffaa00';
            shipCtx.fillRect(gameState.playerX - 2, gameState.playerY - gameState.playerSize - 5, 4, 5);
        }

        // Handle interaction
        function handleInteraction() {
            // Check which room player is in
            for (const [key, room] of Object.entries(rooms)) {
                if (isPlayerInRoom(room)) {
                    showRoomUI(key, room);
                    return;
                }
            }
        }

        // Check if player is in room
        function isPlayerInRoom(room) {
            return gameState.playerX > room.x &&
                   gameState.playerX < room.x + room.width &&
                   gameState.playerY > room.y &&
                   gameState.playerY < room.y + room.height;
        }

        // Generate random artifact with risk/reward
        function generateArtifact(isPositive = null) {
            // If not specified, randomly choose beneficial or dangerous
            if (isPositive === null) {
                isPositive = Math.random() > 0.4; // 60% beneficial, 40% dangerous
            }

            let spec, rarity;
            if (isPositive) {
                spec = beneficialArtifactSpecs[Math.floor(Math.random() * beneficialArtifactSpecs.length)];
                rarity = ['common', 'rare', 'exotic'][Math.floor(Math.random() * 3)];
            } else {
                spec = dangerousArtifactSpecs[Math.floor(Math.random() * dangerousArtifactSpecs.length)];
                rarity = ['rare', 'exotic'][Math.floor(Math.random() * 2)]; // Dangerous artifacts are rarer
            }
            
            const researchValue = rarity === 'exotic' ? 30 : rarity === 'rare' ? 15 : 5;
            const loreSnippets = {
                WeaponCore: ['Radiates harmonic energy patterns.', 'Faintly glows with unknown power.', 'Ancient alien weapon technology.'],
                ShieldMatrix: ['Shimmers with defensive potential.', 'Adapts to environmental forces.', 'Engineered by an advanced civilization.'],
                EnergyCell: ['Pulses with boundless energy.', 'Propels faster than physics allows.', 'Source of immense kinetic potential.'],
                DataCore: ['Contains vast computational archives.', 'Holds strategic enemy intelligence.', 'Biological patterns encoded within.']
            };
            const lore = loreSnippets[spec.type][Math.floor(Math.random() * loreSnippets[spec.type].length)];
            
            return {
                id: Date.now() + Math.random(),
                name: spec.name,
                type: spec.type,
                rarity: rarity,
                researchValue: researchValue,
                lore: lore,
                unlocksRarity: rarity === 'exotic' ? 'legendary' : rarity,
                isPositive: isPositive,
                benefit: spec.benefit,
                penalty: spec.penalty
            };
        }

        // Cinematic sequence before mission
        function playDeploymentCinematic(planet) {
            const canvas = document.getElementById('spaceCanvas');
            const ctx = canvas.getContext('2d');
            
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            canvas.style.display = 'block';
            
            let frame = 0;
            const cinematicSteps = [
                { time: 0, text: 'DROPSHIP SEPARATING FROM MOTHERSHIP...', fade: 0, y: 150 },
                { time: 15, text: 'ENTERING PLANETARY ATMOSPHERE...', fade: 0, y: 150 },
                { time: 30, text: 'HEAT SHIELDING ENGAGED', fade: 0, y: 150 },
                { time: 45, text: `DESTINATION: ${planet.name}`, fade: 0, y: 150 },
                { time: 60, text: 'SCANNING LANDING ZONE...', fade: 0, y: 150 },
                { time: 75, text: 'OPTIMAL INSERTION VECTOR LOCKED', fade: 0, y: 150 },
                { time: 90, text: 'DEPLOYING SOLDIER...', fade: 0, y: 150 },
                { time: 105, text: 'GOOD LUCK OUT THERE', fade: 0, y: 150 }
            ];
            
            function renderCinematicFrame() {
                // Black background
                ctx.fillStyle = '#000';
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                
                // Fade transition
                const fadeOut = Math.max(0, Math.min(1, (frame - 100) / 20));
                ctx.globalAlpha = 1 - fadeOut;
                
                // Find current text
                const current = cinematicSteps.find(s => s.time <= frame && frame < (cinematicSteps[cinematicSteps.indexOf(s) + 1]?.time || 999));
                if (current) {
                    ctx.fillStyle = '#00d4ff';
                    ctx.font = 'bold 32px Arial';
                    ctx.textAlign = 'center';
                    ctx.textBaseline = 'middle';
                    ctx.fillText(current.text, canvas.width / 2, current.y);
                }
                
                ctx.globalAlpha = 1;
                
                frame++;
                
                // End cinematic after 120 frames (~2 seconds at 60fps)
                if (frame < 120) {
                    requestAnimationFrame(renderCinematicFrame);
                } else {
                    // Transition to mission
                    canvas.style.display = 'none';
                    startMissionWorld(planet);
                }
            }
            
            renderCinematicFrame();
        }

            const baseCost = 80;

        function getRepairCost(amount) {
            // Base cost 10 credits per 1% hull repair
            let baseCost = 10;
            // Hull Reinforcement research reduces cost by 20%
            if (gameState.ship.researches['hullReinforcement']) {
                baseCost *= 0.8;
            }
            return Math.floor((amount / 100) * gameState.ship.maxHull * baseCost);
        }

                gameState.credits -= cost;
                gameState.ship.weaponLevel += 1;
                showRoomUI('engineering', rooms.engineering);
                showNotification(`Weapon upgraded to Level ${gameState.ship.weaponLevel}!`);
            } else {
                alert(`Insufficient credits! Need ${cost}, have ${gameState.credits}`);

            if (gameState.credits >= cost) {

            if (amount <= 0) {

            const cost = getRepairCost(amount);
            if (gameState.credits >= cost) {
                gameState.credits -= cost;
                gameState.ship.hull = Math.min(100, gameState.ship.hull + amount);
                showRoomUI('engineering', rooms.engineering);
                showNotification(`Hull repaired +${Math.round(amount)}%!`);

                        osc.frequency.value = frequencies[stepNum];
                        gain.gain.setValueAtTime(0.1, now);
                        gain.gain.exponentialRampToValueAtTime(0.01, now + 0.5);
                        
                        osc.start(now);
                        osc.stop(now + 0.5);
                    }
                } catch (e) {
                    // Silent fallback
                }
            },
            
            addParticle(x, y, vx, vy, life, color = '#fff', size = 2) {
                this.particles.push({ x, y, vx, vy, life, maxLife: life, color, size });
            },
            
            updateParticles(dt) {
                this.particles = this.particles.filter(p => p.life > 0);
                this.particles.forEach(p => {
                    p.x += p.vx * dt;
                    p.y += p.vy * dt;
                    p.life -= dt;
                });
            },
            
            drawParticles() {
                this.particles.forEach(p => {
                    const alpha = p.life / p.maxLife;
                    this.ctx.fillStyle = p.color.replace(')', `, ${alpha * 0.8})`);
                    this.ctx.beginPath();
                    this.ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
                    this.ctx.fill();
                });
            },
            
            screenShake(intensity) {
                this.shakeIntensity = Math.min(intensity, 20);
            },
            
            applyScreenEffects() {
                // Motion blur for high-speed sections
                if (this.currentStep === 2 || this.currentStep === 4) {
                    this.ctx.fillStyle = 'rgba(0, 0, 0, 0.02)';
                    this.ctx.fillRect(0, 0, this.canvas.width, this.canvas.height);
                }
                
                // Screen shake
                if (this.shakeIntensity > 0) {
                    const offsetX = (Math.random() - 0.5) * this.shakeIntensity * 2;
                    const offsetY = (Math.random() - 0.5) * this.shakeIntensity * 2;
                    this.ctx.translate(offsetX, offsetY);
                    this.shakeIntensity *= 0.92;
                }
                
                // Screen tint
                if (this.screenTint.a > 0) {
                    this.ctx.fillStyle = `rgba(${this.screenTint.r}, ${this.screenTint.g}, ${this.screenTint.b}, ${this.screenTint.a})`;
                    this.ctx.fillRect(-this.canvas.width, -this.canvas.height, this.canvas.width * 3, this.canvas.height * 3);
                }
            },
            
            drawStep1() {
                // STEP 1: ENTER DROPSHIP BAY (5-8 seconds)
                const progress = this.getStepProgress();
                
                // Dark metal hangar interior
                const gradient = this.ctx.createLinearGradient(0, 0, this.canvas.width, this.canvas.height);
                gradient.addColorStop(0, '#0a0a15');
                gradient.addColorStop(0.5, '#151525');
                gradient.addColorStop(1, '#0a0a15');
                this.ctx.fillStyle = gradient;
                this.ctx.fillRect(0, 0, this.canvas.width, this.canvas.height);
                
                // Animated floor lights forming path (cyan glow)
                this.ctx.strokeStyle = '#00d4ff';
                this.ctx.lineWidth = 3;
                this.ctx.globalAlpha = 0.5 + Math.sin(progress * Math.PI * 3) * 0.3;
                
                const pathSpacing = 60;
                for (let i = 0; i < 15; i++) {
                    const activatePoint = i / 15;
                    if (progress > activatePoint) {
                        const y = 100 + i * 40;
                        const x = this.canvas.width / 2;
                        const intensity = Math.min((progress - activatePoint) * 5, 1);
                        this.ctx.fillStyle = `rgba(0, 212, 255, ${intensity * 0.4})`;
                        this.ctx.fillRect(x - 30 * intensity, y - 10, 60 * intensity, 20);
                    }
                }
                
                // Vertical launch tubes in background
                this.ctx.globalAlpha = 0.3;
                this.ctx.fillStyle = '#1a1a2e';
                for (let i = 0; i < 6; i++) {
                    const x = 100 + i * (this.canvas.width / 6);
                    this.ctx.fillRect(x, 50, 40, 300);
                    this.ctx.strokeStyle = '#00d4ff';
                    this.ctx.lineWidth = 1;
                    this.ctx.strokeRect(x, 50, 40, 300);
                }
                
                // Camera pan effect
                const panOffset = progress * 50;
                
                // HUD: Text overlays
                this.ctx.globalAlpha = 1;
                this.ctx.fillStyle = '#00d4ff';
                this.ctx.font = 'bold 28px Arial';
                this.ctx.fillText('DROPSHIP BAY', 50, 60);
                
                this.ctx.font = '16px Arial';
                this.ctx.fillStyle = '#aaa';
                this.ctx.fillText('PROCEED TO LAUNCH POD', 50, 100);
                
                // Mechanical door sliding sound cue at end
                if (progress > 0.9 && !this.audioQueues.step1.playing) {
                    this.playSoundCue(1);
                    this.audioQueues.step1.playing = true;
                }
            },
            
            drawStep2() {
                // STEP 2: LAUNCH TUBE ENTRY (6-10 seconds)
                const progress = this.getStepProgress();
                
                // Inside tight vertical launch pod - metal walls
                const gradient = this.ctx.createLinearGradient(0, 0, this.canvas.width, this.canvas.height);
                gradient.addColorStop(0, '#0d0d1a');
                gradient.addColorStop(0.5, '#1a1a2e');
                gradient.addColorStop(1, '#0d0d1a');
                this.ctx.fillStyle = gradient;
                this.ctx.fillRect(0, 0, this.canvas.width, this.canvas.height);
                
                // Glowing orange/cyan lines on walls
                this.ctx.strokeStyle = '#ff8800';
                this.ctx.lineWidth = 4;
                for (let i = 0; i < 8; i++) {
                    const x = (i * this.canvas.width / 8);
                    this.ctx.beginPath();
                    this.ctx.moveTo(x, 0);
                    this.ctx.lineTo(x + 20 * Math.sin(progress * 10), this.canvas.height);
                    this.ctx.stroke();
                }
                
                // Pulsing red warning indicators
                this.ctx.fillStyle = progress % 0.5 < 0.25 ? '#ff4444' : '#aa0000';
                for (let i = 0; i < 4; i++) {
                    this.ctx.beginPath();
                    this.ctx.arc(100 + i * 200, 100, 15, 0, Math.PI * 2);
                    this.ctx.fill();
                }
                
                // Window showing external view
                this.ctx.strokeStyle = '#00d4ff';
                this.ctx.lineWidth = 3;
                this.ctx.strokeRect(this.canvas.width / 2 - 80, this.canvas.height / 2 - 100, 160, 200);
                
                // Countdown timer HUD
                const countdown = Math.max(0, 3 - progress * 3);
                this.ctx.fillStyle = '#00d4ff';
                this.ctx.font = 'bold 48px Arial';
                this.ctx.textAlign = 'center';
                this.ctx.fillText('LAUNCH IN...', this.canvas.width / 2, 80);
                this.ctx.font = 'bold 64px Arial';
                this.ctx.fillText(countdown.toFixed(1), this.canvas.width / 2, 200);
                this.ctx.textAlign = 'left';
                
                // Door closing animation
                if (progress > 0.7) {
                    const doorProgress = (progress - 0.7) / 0.3;
                    this.ctx.fillStyle = 'rgba(50, 50, 80, 0.8)';
                    this.ctx.fillRect(this.canvas.width / 2 - 200, 0, 400, this.canvas.height * doorProgress);
                    this.ctx.fillRect(this.canvas.width / 2 - 200, this.canvas.height * (1 - doorProgress), 400, this.canvas.height * doorProgress);
                    
                    if (doorProgress > 0.5 && !this.audioQueues.step2.playing) {
                        this.playSoundCue(2);
                        this.audioQueues.step2.playing = true;
                        this.screenShake(15);
                    }
                }
                
                // Pressure seal effects
                if (progress > 0.75) {
                    const sealProgress = (progress - 0.75) / 0.25;
                    this.ctx.strokeStyle = `rgba(0, 212, 255, ${sealProgress * 0.5})`;
                    this.ctx.lineWidth = 2;
                    this.ctx.beginPath();
                    this.ctx.arc(this.canvas.width / 2, this.canvas.height / 2, 100 + sealProgress * 100, 0, Math.PI * 2);
                    this.ctx.stroke();
                }
            },
            
            drawStep3() {
                // STEP 3: FIRING SEQUENCE (4-6 seconds)
                const progress = this.getStepProgress();
                
                // Pod interior with motion blur
                this.ctx.fillStyle = '#0a0e1f';
                this.ctx.fillRect(0, 0, this.canvas.width, this.canvas.height);
                
                // Intense motion blur (tube streaking past)
                this.ctx.strokeStyle = 'rgba(255, 150, 0, 0.3)';
                this.ctx.lineWidth = Math.random() * 4 + 2;
                for (let i = 0; i < 20; i++) {
                    const x1 = Math.random() * this.canvas.width;
                    const y1 = Math.random() * this.canvas.height;
                    const length = 100 + progress * 200;
                    this.ctx.beginPath();
                    this.ctx.moveTo(x1, y1);
                    this.ctx.lineTo(x1 - length, y1 + (Math.random() - 0.5) * 50);
                    this.ctx.stroke();
                }
                
                // Red warning lights intensifying
                this.ctx.fillStyle = `rgba(255, 68, 68, ${0.4 + progress * 0.6})`;
                this.ctx.globalAlpha = Math.sin(progress * Math.PI * 10) * 0.5 + 0.5;
                for (let i = 0; i < 8; i++) {
                    this.ctx.fillRect(Math.random() * this.canvas.width, Math.random() * this.canvas.height, 20, 20);
                }
                this.ctx.globalAlpha = 1;
                
                // Speed indicator
                const speed = Math.min(progress * 100, 100);
                this.ctx.fillStyle = '#00d4ff';
                this.ctx.font = 'bold 32px Arial';
                this.ctx.textAlign = 'right';
                this.ctx.fillText(`SPEED: ${speed.toFixed(0)} m/s`, this.canvas.width - 50, 80);

                // Explosive sound and shake
                if (progress > 0.1 && !this.audioQueues.step3.playing) {
                    this.playSoundCue(3);
                    this.audioQueues.step3.playing = true;
                }
                
                this.screenShake(20 + progress * 10);
                
                // Extreme camera shake
                this.ctx.translate(
                    (Math.random() - 0.5) * 30,
                    (Math.random() - 0.5) * 30
                );
            },
            
            drawStep4() {
                // STEP 4: SPACE TRANSITION (6-8 seconds)
                const progress = this.getStepProgress();
                
                // Black space with stars
                this.ctx.fillStyle = '#000000';
                this.ctx.fillRect(0, 0, this.canvas.width, this.canvas.height);
                
                // Star field
                this.ctx.fillStyle = '#ffffff';
                for (let i = 0; i < 200; i++) {
                    const x = (i * 731) % this.canvas.width;
                    const y = (i * 233) % this.canvas.height;
                    const size = (i % 10) / 10;
                    this.ctx.fillRect(x, y, size, size);
                }
                
                // Planet in distance (zoom out effect)
                const planetSize = Math.max(100, 400 - progress * 150);
                const planetX = this.canvas.width - 200 - progress * 100;
                const planetY = this.canvas.height / 2;
                
                // Planet gradient
                const planetGradient = this.ctx.createRadialGradient(planetX, planetY, 0, planetX, planetY, planetSize);
                planetGradient.addColorStop(0, '#ff8844');
                planetGradient.addColorStop(0.6, '#884400');
                planetGradient.addColorStop(1, '#000000');
                this.ctx.fillStyle = planetGradient;
                this.ctx.beginPath();
                this.ctx.arc(planetX, planetY, planetSize, 0, Math.PI * 2);
                this.ctx.fill();
                
                // Mothership (large structure)
                const shipX = 100 + progress * 50;
                this.ctx.fillStyle = '#333333';
                this.ctx.fillRect(shipX - 60, this.canvas.height / 2 - 100, 120, 200);
                this.ctx.fillRect(shipX - 100, this.canvas.height / 2 - 20, 200, 40);
                
                // Launching pods
                const podCount = Math.floor(progress * 6);
                for (let i = 0; i < podCount; i++) {
                    const delay = i * 0.15;
                    if (progress > delay) {
                        const podProgress = (progress - delay) / 0.5;
                        const pX = shipX + 50 + podProgress * 200;
                        const pY = this.canvas.height / 2 - 50 + i * 35;
                        this.ctx.fillStyle = '#00d4ff';
                        this.ctx.fillRect(pX, pY, 20, 15);
                    }
                }
                
                // HUD: Trajectory display
                this.ctx.strokeStyle = '#00d4ff';
                this.ctx.lineWidth = 2;
                this.ctx.beginPath();
                this.ctx.arc(this.canvas.width / 2, this.canvas.height / 2, 80, 0, Math.PI * 2);
                this.ctx.stroke();
                
                this.ctx.fillStyle = '#00d4ff';
                this.ctx.font = '16px Arial';
                this.ctx.textAlign = 'center';
                this.ctx.fillText('EXITING MOTHERSHIP', this.canvas.width / 2, 60);
                
                // Sound and effects
                if (progress > 0.2 && !this.audioQueues.step4.playing) {
                    this.playSoundCue(4);
                    this.audioQueues.step4.playing = true;
                }
            },
            
            drawStep5() {
                // STEP 5: ATMOSPHERE ENTRY (8-10 seconds)
                const progress = this.getStepProgress();
                
                // Space to atmosphere transition
                const atmosphereBlend = Math.min(progress / 0.4, 1);
                
                // Background: planet surface becoming visible
                const gradient = this.ctx.createLinearGradient(0, 0, 0, this.canvas.height);
                gradient.addColorStop(0, `rgba(0, 0, 0, ${1 - atmosphereBlend * 0.5})`);
                gradient.addColorStop(0.3, `rgba(100, 150, 200, ${atmosphereBlend * 0.3})`);
                gradient.addColorStop(1, `rgba(200, 150, 100, ${atmosphereBlend * 0.8})`);
                this.ctx.fillStyle = gradient;
                this.ctx.fillRect(0, 0, this.canvas.width, this.canvas.height);
                
                // Atmospheric glow effect (red/orange heating)
                this.ctx.fillStyle = `rgba(255, 100, 0, ${Math.min(progress * 0.5, 0.4)})`;
                this.ctx.fillRect(0, 0, this.canvas.width, this.canvas.height);
                
                // Fire trails and particle effects
                const trailCount = Math.floor(progress * 30);
                for (let i = 0; i < trailCount; i++) {
                    const angle = (i / trailCount) * Math.PI * 2;
                    const distance = 150 + i * 5;
                    const x = this.canvas.width / 2 + Math.cos(angle) * distance;
                    const y = this.canvas.height / 2 + Math.sin(angle) * distance - progress * 50;
                    
                    this.ctx.fillStyle = `rgba(255, ${150 - i * 3}, 0, ${0.6 - progress * 0.2})`;
                    this.ctx.beginPath();
                    this.ctx.arc(x, y, 3 + Math.sin(progress * 20 + i) * 2, 0, Math.PI * 2);
                    this.ctx.fill();
                }
                
                // Pod glow (increasing intensity)
                const glowIntensity = Math.min(progress, 1);
                const glowGradient = this.ctx.createRadialGradient(
                    this.canvas.width / 2, this.canvas.height / 2, 0,
                    this.canvas.width / 2, this.canvas.height / 2, 200
                );
                glowGradient.addColorStop(0, `rgba(255, 150, 0, ${glowIntensity * 0.6})`);
                glowGradient.addColorStop(1, `rgba(255, 100, 0, 0)`);
                this.ctx.fillStyle = glowGradient;
                this.ctx.fillRect(0, 0, this.canvas.width, this.canvas.height);
                
                // Turbulence camera shake
                this.screenShake(5 + progress * 10);
                
                // Atmosphere entry warning HUD
                this.ctx.fillStyle = '#ff6600';
                this.ctx.font = 'bold 24px Arial';
                this.ctx.textAlign = 'center';
                this.ctx.fillText('⚠ ENTERING ATMOSPHERE ⚠', this.canvas.width / 2, 80);
                
                // Temperature warning
                const temp = Math.min(progress * 2000, 2000);
                this.ctx.fillStyle = '#ff8800';
                this.ctx.font = '18px Arial';
                this.ctx.fillText(`TEMP: ${temp.toFixed(0)}°K`, this.canvas.width / 2, 130);
                
                // Sound
                if (progress > 0.1 && !this.audioQueues.step5.playing) {
                    this.playSoundCue(5);
                    this.audioQueues.step5.playing = true;
                }
            },
            
            drawStep6() {
                // STEP 6: FINAL DESCENT (6-8 seconds)
                const progress = this.getStepProgress();
                
                // Terrain rising to meet pod
                this.ctx.fillStyle = 'rgba(150, 120, 80, 0.8)';
                const horizonY = this.canvas.height - progress * (this.canvas.height - 200);

                // Sky gradient

                skyGradient.addColorStop(0, '#000033');
                skyGradient.addColorStop(0.5, '#665533');
                skyGradient.addColorStop(1, '#aa8855');
                this.ctx.fillStyle = skyGradient;
                this.ctx.fillRect(0, 0, this.canvas.width, horizonY);
                
                // Clouds streaking past
                this.ctx.fillStyle = `rgba(255, 255, 255, ${0.3 - progress * 0.2})`;
                for (let i = 0; i < 5; i++) {
                    const cloudY = 200 + i * 80 + progress * 100;
                    this.ctx.beginPath();
                    this.ctx.ellipse(this.canvas.width / 2, cloudY, 200, 30, 0, 0, Math.PI * 2);

                // Landing zone marker
                this.ctx.strokeStyle = '#00ff88';

                this.ctx.beginPath();
                this.ctx.arc(this.canvas.width / 2, this.canvas.height - 150, 100, 0, Math.PI * 2);
                this.ctx.stroke();
                
                // Crosshair
                this.ctx.beginPath();
                this.ctx.moveTo(this.canvas.width / 2 - 30, this.canvas.height - 150);
                this.ctx.lineTo(this.canvas.width / 2 + 30, this.canvas.height - 150);
                this.ctx.moveTo(this.canvas.width / 2, this.canvas.height - 150 - 30);
                this.ctx.lineTo(this.canvas.width / 2, this.canvas.height - 150 + 30);
                this.ctx.stroke();
                
                // Altitude counter
                const altitude = Math.max(0, 5000 - progress * 7000);
                this.ctx.fillStyle = '#00ff88';
                this.ctx.font = 'bold 28px Arial';
                this.ctx.textAlign = 'right';
                this.ctx.fillText(`ALT: ${altitude.toFixed(0)}m`, this.canvas.width - 50, 80);
                this.ctx.textAlign = 'left';
                
                this.ctx.fillStyle = '#ffaa00';
                this.ctx.font = '18px Arial';
                this.ctx.fillText('FINAL DESCENT', 50, 80);
            },
            
            drawStep7() {
                // STEP 7: LANDING IMPACT (3-4 seconds)
                const progress = this.getStepProgress();
                
                // Ground with impact
                this.ctx.fillStyle = '#663300';
                this.ctx.fillRect(0, 0, this.canvas.width, this.canvas.height);
                
                // Dust explosion outward (particles)
                const explosionSize = progress * 400;
                this.ctx.fillStyle = `rgba(200, 180, 150, ${(1 - progress) * 0.7})`;
                this.ctx.beginPath();
                this.ctx.arc(this.canvas.width / 2, this.canvas.height / 2, explosionSize, 0, Math.PI * 2);
                this.ctx.fill();
                
                // Shockwave rings
                for (let ring = 0; ring < 3; ring++) {
                    const ringProgress = progress - ring * 0.2;
                    if (ringProgress > 0 && ringProgress < 1) {
                        this.ctx.strokeStyle = `rgba(255, 200, 100, ${(1 - ringProgress) * 0.5})`;
                        this.ctx.lineWidth = 3;
                        this.ctx.beginPath();
                        this.ctx.arc(this.canvas.width / 2, this.canvas.height / 2, ringProgress * 300, 0, Math.PI * 2);
                        this.ctx.stroke();
                    }
                }
                
                // White flash
                this.ctx.fillStyle = `rgba(255, 255, 255, ${Math.max(0, 1 - progress * 3)})`;
                this.ctx.fillRect(0, 0, this.canvas.width, this.canvas.height);
                
                // Impact text
                this.ctx.fillStyle = '#ff4444';
                this.ctx.font = 'bold 64px Arial';
                this.ctx.textAlign = 'center';
                this.ctx.globalAlpha = Math.min(1, (1 - progress) * 2);
                this.ctx.fillText('IMPACT!', this.canvas.width / 2, this.canvas.height / 2);
                this.ctx.globalAlpha = 1;
                
                // Massive screen shake
                this.screenShake(30);
                
                // Sound
                if (progress > 0.05 && !this.audioQueues.step7.playing) {
                    this.playSoundCue(7);
                    this.audioQueues.step7.playing = true;
                }
            },
            
            drawStep8() {
                // STEP 8: DEPLOYMENT (4-6 seconds)
                const progress = this.getStepProgress();
                
                // Pod interior transitioning to landscape
                const transitionBlend = Math.min(progress / 0.5, 1);
                
                // Interior metal (fading)
                this.ctx.fillStyle = `rgba(30, 35, 70, ${1 - transitionBlend * 0.7})`;
                this.ctx.fillRect(0, 0, this.canvas.width, this.canvas.height);
                
                // Landscape outside (increasing)
                const groundGradient = this.ctx.createLinearGradient(0, this.canvas.height / 2, 0, this.canvas.height);
                groundGradient.addColorStop(0, `rgba(150, 120, 80, ${transitionBlend * 0.8})`);
                groundGradient.addColorStop(1, `rgba(100, 80, 60, ${transitionBlend})`);
                this.ctx.fillStyle = groundGradient;
                this.ctx.fillRect(0, this.canvas.height / 2, this.canvas.width, this.canvas.height / 2);
                
                // Sky (distant horizon)
                this.ctx.fillStyle = `rgba(50, 80, 120, ${transitionBlend * 0.6})`;
                this.ctx.fillRect(0, 0, this.canvas.width, this.canvas.height / 2);
                
                // Door hydraulic opening
                const doorOpen = Math.min(progress / 0.4, 1);
                const doorHeight = this.canvas.height * (1 - doorOpen);
                this.ctx.fillStyle = '#333333';
                this.ctx.fillRect(0, 0, this.canvas.width / 2, doorHeight);
                this.ctx.fillRect(this.canvas.width / 2, this.canvas.height - doorHeight, this.canvas.width / 2, doorHeight);
                
                // Player weapon visible (partial view - hands/gun)
                this.ctx.fillStyle = '#666666';
                this.ctx.fillRect(this.canvas.width - 100, this.canvas.height - 150, 100, 150);
                this.ctx.fillStyle = '#444444';
                this.ctx.fillRect(this.canvas.width - 90, this.canvas.height - 100, 30, 80);
                
                // HUD FADE IN
                this.ctx.globalAlpha = Math.min(progress / 0.3, 1);
                
                // Mission timer (top left)
                this.ctx.fillStyle = '#00ff88';
                this.ctx.font = 'bold 18px Arial';
                this.ctx.fillText('MISSION TIMER: 15:00', 30, 50);
                
                // Objective (top center)
                this.ctx.fillStyle = '#00d4ff';
                this.ctx.font = 'bold 16px Arial';
                this.ctx.textAlign = 'center';
                this.ctx.fillText('EXTRACT ARTIFACT - DEFEND POSITION', this.canvas.width / 2, 50);
                this.ctx.textAlign = 'left';
                
                // Health/Ammo (bottom right)
                this.ctx.fillStyle = '#00ff88';
                this.ctx.font = '14px Arial';
                this.ctx.textAlign = 'right';
                this.ctx.fillText('HEALTH: 100%', this.canvas.width - 30, this.canvas.height - 80);
                this.ctx.fillText('AMMO: 150/300', this.canvas.width - 30, this.canvas.height - 50);
                this.ctx.textAlign = 'left';
                
                // Enemy indicators (if enemies nearby)
                this.ctx.globalAlpha = 1;
                this.ctx.fillStyle = '#ff4444';
                this.ctx.font = '12px Arial';
                this.ctx.fillText('⚠ ENEMIES DETECTED', 30, 80);
                
                // Radio message
                this.ctx.globalAlpha = Math.min((progress - 0.3) / 0.3, 1);
                this.ctx.fillStyle = '#ffaa00';
                this.ctx.font = '14px Arial';
                this.ctx.textAlign = 'center';
                this.ctx.fillText('"Squad deployed. Mission begins."', this.canvas.width / 2, this.canvas.height / 2);
                this.ctx.globalAlpha = 1;
            },
            
            getStepProgress() {
                const now = Date.now() / 1000;
                const elapsed = now - this.stepStartTime;
                const stepDuration = this.stepDurations[this.currentStep];
                
                if (elapsed >= stepDuration) {
                    // Move to next step
                    if (this.currentStep < this.totalSteps - 1) {
                        this.currentStep++;
                        this.stepStartTime = now;
                        return 0;
                    } else {
                        // Sequence complete
                        this.complete();
                        return 1;
                    }
                }
                
                return elapsed / stepDuration;
            },
            
            animate() {
                if (!this.active) return;
                
                // Clear canvas
                this.ctx.fillStyle = '#000000';
                this.ctx.fillRect(0, 0, this.canvas.width, this.canvas.height);
                
                // Save canvas state for transforms
                this.ctx.save();
                
                // Draw current step
                switch (this.currentStep) {
                    case 0: this.drawStep1(); break;
                    case 1: this.drawStep2(); break;
                    case 2: this.drawStep3(); break;
                    case 3: this.drawStep4(); break;
                    case 4: this.drawStep5(); break;
                    case 5: this.drawStep6(); break;
                    case 6: this.drawStep7(); break;
                    case 7: this.drawStep8(); break;
                }
                
                // Apply screen effects
                this.applyScreenEffects();
                
                // Restore canvas state
                this.ctx.restore();
                
                // Update particles
                const dt = 1 / 60;
                this.updateParticles(dt);
                
                // Continue animation
                requestAnimationFrame(() => this.animate());
            },
            
            complete() {
                // Fade to black, then start mission
                this.active = false;
                
                // Transition to actual gameplay
                setTimeout(() => {
                    this.canvas.remove();
                    // Show mission container and start gameplay
                    document.getElementById('missionContainer').style.display = 'block';
                    startMission();
                }, 1000);
            }
        };
        
        // Function to initiate cinematic
        function startCinematicDropship() {
            cinematicDropshipSequence.init();
        }
        
        function launchFromDropship() {
            // Check if loadout is equipped
            if (!gameState.loadoutEquipped) {
                alert('⚠ Loadout not equipped! Visit the Armory first.');
                return;
            }
            
            // Close modal and start cinematic
            closeInteractionModal();
            console.log('Launching from dropship...');
            
            // Play cinematic sequence FIRST
            startCinematicDropship();
            
            // Mission world will be triggered by cinematic completion
            // or by startMission() function when cinematic ends
        }
        
        // Hook into deployment button to trigger cinematic
        function deployWithCinematic() {
            startCinematicDropship();
        }
        
        // Helper to show initializing message
        function showMissionInitializing() {
            const modal = document.getElementById('interactionModal');
            const overlay = document.getElementById('modalOverlay');
            const content = document.getElementById('modalContent');
            
            content.innerHTML = `
                <div class="interaction-modal-header">🚀 LAUNCHING MISSION...</div>
                <div class="interaction-modal-content" style="text-align: center;">
                    <div style="color: #00d4ff; font-size: 18px; margin: 40px 0;">Preparing dropship...</div>
                    <div style="color: #aaa; font-size: 13px;">Initializing mission parameters...</div>
                </div>
            `;
            
            overlay.classList.add('show');
            modal.classList.add('show');
        }
        
        // Start the actual mission after cinematic completes
        function startMission() {
            // Hide ship hub and modals
            console.log('startMission() called - hiding hub, showing mission');
            document.getElementById('shipHubContainer').style.display = 'none';
            document.getElementById('mainMenu').style.display = 'none';
            document.getElementById('missionContainer').style.display = 'block';
            console.log('missionContainer display:', document.getElementById('missionContainer').style.display);
            console.log('missionWorld element:', document.getElementById('missionWorld'));
            
            // Clean up any old enemies/projectiles
            const enemiesContainer = document.getElementById('enemiesContainer');
            const projectilesContainer = document.getElementById('projectilesContainer');
            if (enemiesContainer) enemiesContainer.innerHTML = '';
            if (projectilesContainer) projectilesContainer.innerHTML = '';
            
            // Reset artifact visual
            const artifactEl = document.getElementById('artifact');
            if (artifactEl) {
                artifactEl.style.opacity = '1';
                artifactEl.style.animation = 'artifactPulse 1.5s infinite';
            }
            
            // Initialize player position in gameState (for keyboard controls)
            gameState.playerX = window.innerWidth / 2;
            gameState.playerY = window.innerHeight * 0.85;
            gameState.playerHealth = 100;
            gameState.playerMaxHealth = 100;
            gameState.playerAmmo = 30;
            gameState.playerMaxAmmo = 180;
            
            // Reset player position in DOM
            const playerEl = document.getElementById('player');
            if (playerEl) {
                playerEl.style.left = gameState.playerX + 'px';
                playerEl.style.top = gameState.playerY + 'px';
                playerEl.style.transform = 'translate(-50%, -50%)';
            }
            
            // Initialize mission state
            gameState.currentLocation = 'mission';
            gameState.missionActive = true;
            gameState.missionObjectives = {
                explored: false,
                artifactFound: false,
                extracted: false
            };
            if (!gameState.currentMission) {
                gameState.currentMission = {};
            }
            gameState.currentMission.enemiesKilled = 0;
            gameState.currentMission.timeStarted = Date.now();
            
            // START THE GAME LOOP - This was missing!
            startGameLoop();
            
            console.log('startMission() - game loop started, WASD + E controls active');
        }
        
        // CINEMATIC DROPSHIP SEQUENCE - check if exists
        function startCinematicDropship() {
            if (typeof cinematicDropshipSequence !== 'undefined') {
                cinematicDropshipSequence.init();
            } else {
                console.log('Cinematic sequence not found');
                startMission();
            }
        }

        // MISSION ENGINE CLASS - REMOVED FOR RESET
        // To be rebuilt in Phase 4+
        window.addEventListener('load', () => {
            // Menu ready
        });

        // Handle window resize
        window.addEventListener('resize', () => {
            if (gameState.currentLocation === 'ship' && shipCanvas) {
                shipCanvas.width = window.innerWidth;
                shipCanvas.height = window.innerHeight;
            }
        });
        
        // ESC key to skip cinematic
        window.addEventListener('keydown', (e) => {
            if (e.key === 'Escape' && cinematicDropshipSequence.active) {
                cinematicDropshipSequence.complete();
            }
        });
    </script>
</body>
</html>
