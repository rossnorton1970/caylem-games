<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Planetfall: Extraction</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        body { font-family: 'Arial', sans-serif; background: #000; color: #e0e0e0; }
        
        /* MAIN MENU */
        #mainMenu {
            position: relative;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background: #000;
            overflow: hidden;
        }

        .menu-bg-glow {
            position: absolute;
            inset: 0;
            background: radial-gradient(circle at top, rgba(59, 130, 246, 0.1), transparent 45%),
                        radial-gradient(circle at bottom, rgba(249, 115, 22, 0.1), transparent 45%);
            z-index: 1;
        }

        .menu-bg-planet {
            position: absolute;
            bottom: -200px;
            left: 50%;
            transform: translateX(-50%);
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, rgba(249, 115, 22, 0.15) 0%, transparent 70%);
            border-radius: 50%;
            filter: blur(80px);
            z-index: 1;
        }

        .menu-stars {
            position: absolute;
            inset: 0;
            opacity: 0.3;
            z-index: 2;
        }

        .menu-star {
            position: absolute;
            background: white;
            border-radius: 50%;
            animation: twinkle 3s infinite;
        }

        @keyframes twinkle {
            0%, 100% { opacity: 0.3; }
            50% { opacity: 1; }
        }

        .menu-content {
            position: relative;
            z-index: 10;
            text-align: center;
            animation: fadeInDown 0.8s ease-out;
        }

        @keyframes fadeInDown {
            from {
                opacity: 0;
                transform: translateY(-30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .menu-logo {
            margin-bottom: 12px;
        }

        .menu-title {
            font-size: clamp(48px, 10vw, 96px);
            font-weight: 900;
            letter-spacing: 0.25em;
            color: #fff;
            margin: 0;
            text-shadow: 0 0 30px rgba(59, 130, 246, 0.3), 0 0 60px rgba(59, 130, 246, 0.1);
        }

        .menu-subtitle {
            font-size: clamp(18px, 3vw, 32px);
            letter-spacing: 0.5em;
            color: #3b82f6;
            font-weight: 300;
            margin: 8px 0 0 0;
            text-shadow: 0 0 20px rgba(59, 130, 246, 0.2);
        }

        .menu-tagline {
            font-size: clamp(12px, 1.5vw, 16px);
            letter-spacing: 0.4em;
            color: #888;
            font-weight: 400;
            margin-top: 16px;
            text-transform: uppercase;
        }

        .menu-buttons {
            display: flex;
            flex-direction: column;
            gap: 12px;
            width: 100%;
            max-width: 420px;
            margin-top: 48px;
        }

        .menu-btn {
            position: relative;
            overflow: hidden;
            padding: 14px 24px;
            font-size: 16px;
            font-weight: 600;
            letter-spacing: 0.15em;
            text-align: left;
            border: 2px solid;
            border-radius: 16px;
            cursor: pointer;
            transition: all 0.3s ease;
            background: transparent;
            text-transform: uppercase;
        }

        .menu-btn.primary {
            border-color: #f97316;
            color: #fff;
            background: rgba(249, 115, 22, 0.15);
        }

        .menu-btn.primary:hover {
            border-color: #fb923c;
            background: rgba(249, 115, 22, 0.25);
            box-shadow: 0 0 20px rgba(249, 115, 22, 0.3);
            transform: translateX(4px);
        }

        .menu-btn.secondary {
            border-color: #52525b;
            color: #e4e4e7;
            background: rgba(82, 82, 89, 0.1);
        }

        .menu-btn.secondary:hover {
            border-color: #3b82f6;
            color: #fff;
            background: rgba(59, 130, 246, 0.1);
            box-shadow: 0 0 15px rgba(59, 130, 246, 0.2);
            transform: translateX(4px);
        }

        .menu-footer {
            position: absolute;
            bottom: 20px;
            left: 0;
            right: 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 30px;
            font-size: 11px;
            letter-spacing: 0.2em;
            color: #666;
            z-index: 10;
        }

        /* SHIP HUB */
        #shipHubContainer {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #0a0e1f;
            z-index: 100;
        }

        #shipHubCanvas {
            display: block;
            width: 100%;
            height: 100%;
            cursor: crosshair;
        }

        /* SHIP HUB UI */
        .ship-ui-layer {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 101;
        }

        .ship-header {
            position: fixed;
            top: 20px;
            left: 20px;
            color: #00d4ff;
            font-size: 18px;
            font-weight: bold;
            pointer-events: auto;
            z-index: 102;
            text-shadow: 0 0 10px rgba(0, 212, 255, 0.3);
        }

        .ship-hint {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            color: #888;
            font-size: 13px;
            text-align: center;
            pointer-events: auto;
            z-index: 102;
        }

        .ship-hint-highlight {
            color: #00d4ff;
            font-weight: bold;
        }

        .ship-exit-btn {
            position: fixed;
            top: 20px;
            right: 20px;
            background: #f97316;
            color: white;
            padding: 10px 20px;
            border: none;
            cursor: pointer;
            border-radius: 5px;
            font-weight: bold;
            pointer-events: auto;
            z-index: 103;
            transition: all 0.2s;
        }

        .ship-exit-btn:hover {
            background: #fb923c;
            box-shadow: 0 0 15px rgba(249, 115, 22, 0.4);
        }

        /* INTERACTION MODAL */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            z-index: 104;
            pointer-events: auto;
        }

        .modal-overlay.show {
            display: block;
        }

        .interaction-modal {
            display: none;
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(10, 14, 39, 0.98);
            border: 2px solid #00d4ff;
            border-radius: 10px;
            padding: 40px;
            min-width: 500px;
            max-height: 80vh;
            overflow-y: auto;
            z-index: 105;
            box-shadow: 0 0 40px rgba(0, 212, 255, 0.2);
            pointer-events: auto;
        }

        .interaction-modal.show {
            display: block;
        }

        .interaction-modal-header {
            color: #00d4ff;
            font-size: 28px;
            font-weight: bold;
            margin-bottom: 20px;
            border-bottom: 2px solid #00d4ff;
            padding-bottom: 15px;
            text-shadow: 0 0 10px rgba(0, 212, 255, 0.3);
        }

        .interaction-modal-content {
            color: #aaa;
            font-size: 14px;
            line-height: 1.6;
        }

        .close-modal-btn {
            position: absolute;
            top: 15px;
            right: 15px;
            background: #ff4444;
            color: white;
            border: none;
            width: 40px;
            height: 40px;
            cursor: pointer;
            border-radius: 5px;
            font-size: 24px;
            pointer-events: auto;
        }

        .close-modal-btn:hover {
            background: #ff6666;
        }

        /* PLANET SELECTION */
        .planet-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-top: 20px;
        }

        .planet-card {
            background: #1a1f3a;
            border: 2px solid #444;
            padding: 20px;
            border-radius: 5px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .planet-card:hover {
            border-color: #00d4ff;
            background: #2a2f4a;
            box-shadow: 0 0 15px rgba(0, 212, 255, 0.2);
        }

        .planet-name {
            color: #00d4ff;
            font-weight: bold;
            font-size: 18px;
            margin-bottom: 10px;
        }

        .planet-info {
            font-size: 12px;
            color: #aaa;
            margin: 5px 0;
        }

        .difficulty {
            font-weight: bold;
            margin: 10px 0;
        }

        .difficulty.easy { color: #00ff88; }
        .difficulty.medium { color: #ffaa00; }
        .difficulty.hard { color: #ff4444; }

        .planet-btn {
            background: #f97316;
            color: #0a0e27;
            padding: 10px 16px;
            margin-top: 12px;
            border: none;
            cursor: pointer;
            font-weight: bold;
            border-radius: 5px;
            width: 100%;
            transition: all 0.2s ease;
            font-size: 14px;
            letter-spacing: 0.1em;
        }

        .planet-btn:hover {
            background: #fb923c;
            box-shadow: 0 0 15px rgba(249, 115, 22, 0.4);
            transform: translateY(-2px);
        }
    </style>
</head>
<body>
    <!-- MAIN MENU -->
    <div id="mainMenu">
        <div class="menu-bg-glow"></div>
        <div class="menu-bg-planet"></div>
        <div class="menu-stars" id="starsContainer"></div>

        <div class="menu-content">
            <div class="menu-logo">
                <h1 class="menu-title">PLANETFALL</h1>
                <h2 class="menu-subtitle">EXTRACTION</h2>
                <p class="menu-tagline">Land. Fight. Extract.</p>
            </div>

            <div class="menu-buttons">
                <button class="menu-btn primary" onclick="startGame()">▶ PLAY</button>
                <button class="menu-btn secondary" onclick="alert('Settings coming soon!')">⚙ SETTINGS</button>
                <button class="menu-btn secondary" onclick="exitGame()">❌ EXIT</button>
            </div>
        </div>

        <div class="menu-footer">
            <span>Version 0.2 Alpha</span>
            <span>Helios Directive Network</span>
        </div>
    </div>

    <!-- SHIP HUB -->
    <div id="shipHubContainer">
        <canvas id="shipHubCanvas"></canvas>
        <div class="ship-ui-layer">
            <div class="ship-header">🚀 MOTHERSHIP HUB</div>
            <div class="ship-hint">Move with <span class="ship-hint-highlight">WASD</span> | Interact with <span class="ship-hint-highlight">E</span></div>
            <button class="ship-exit-btn" onclick="exitToMenu()">← MENU</button>
        </div>
    </div>

    <!-- INTERACTION MODAL -->
    <div class="modal-overlay" id="modalOverlay"></div>
    <div class="interaction-modal" id="interactionModal">
        <button class="close-modal-btn" onclick="closeInteractionModal()">✕</button>
        <div id="modalContent"></div>
    </div>

    <script>
        // Game state
        const gameState = {
            currentLocation: 'menu',
            playerX: 0,
            playerY: 0,
            playerSpeed: 3,
            playerSize: 12
        };

        // Define rooms with layout
        const rooms = {
            centralHub: {
                name: 'CENTRAL HUB',
                x: 350,
                y: 300,
                width: 200,
                height: 180,
                color: '#1a3a52',
                borderColor: '#00d4ff',
                icon: '●',
                interactionKey: 'centralHub'
            },
            armory: {
                name: 'ARMORY',
                x: 600,
                y: 200,
                width: 150,
                height: 140,
                color: '#4d2a1a',
                borderColor: '#ff8800',
                icon: '⚔',
                interactionKey: 'armory'
            },
            engineering: {
                name: 'ENGINEERING',
                x: 100,
                y: 200,
                width: 150,
                height: 140,
                color: '#3a3a1a',
                borderColor: '#ff8800',
                icon: '⚙',
                interactionKey: 'engineering'
            },
            communications: {
                name: 'COMMUNICATIONS',
                x: 100,
                y: 50,
                width: 150,
                height: 100,
                color: '#1a2a3a',
                borderColor: '#00d4ff',
                icon: '📡',
                interactionKey: 'communications'
            },
            controlRoom: {
                name: 'CONTROL ROOM',
                x: 350,
                y: 550,
                width: 200,
                height: 140,
                color: '#1a3a1a',
                borderColor: '#00ff88',
                icon: '🖥',
                interactionKey: 'controlRoom'
            },
            dropship: {
                name: 'DROPSHIP',
                x: 600,
                y: 450,
                width: 150,
                height: 120,
                color: '#3a2a1a',
                borderColor: '#ff8800',
                icon: '🚀',
                interactionKey: 'dropship'
            },
            cargoBay: {
                name: 'CARGO BAY',
                x: 100,
                y: 450,
                width: 150,
                height: 120,
                color: '#3a3a1a',
                borderColor: '#ffcc00',
                icon: '📦',
                interactionKey: 'cargoBay'
            }
        };

        // Planets
        const planets = [
            { name: 'Kepler-442b', difficulty: 'easy', type: 'Desert', enemies: 8 },
            { name: 'TRAPPIST-1d', difficulty: 'medium', type: 'Ice World', enemies: 12 },
            { name: 'Proxima-b', difficulty: 'hard', type: 'Volcanic', enemies: 20 }
        ];

        // Key tracking
        const keys = {};
        let lastInteractionTime = 0;

        window.addEventListener('keydown', (e) => {
            keys[e.key.toLowerCase()] = true;
            if (e.key.toLowerCase() === 'e') {
                if (Date.now() - lastInteractionTime > 200) {
                    handleInteraction();
                    lastInteractionTime = Date.now();
                }
            }
        });
        
        window.addEventListener('keyup', (e) => {
            keys[e.key.toLowerCase()] = false;
        });

        // Initialize starfield
        function initStarfield() {
            const container = document.getElementById('starsContainer');
            for (let i = 0; i < 100; i++) {
                const star = document.createElement('div');
                star.className = 'menu-star';
                star.style.width = Math.random() * 2 + 'px';
                star.style.height = star.style.width;
                star.style.left = Math.random() * 100 + '%';
                star.style.top = Math.random() * 100 + '%';
                star.style.animationDelay = Math.random() * 3 + 's';
                container.appendChild(star);
            }
        }

        // Start game
        function startGame() {
            document.getElementById('mainMenu').style.display = 'none';
            document.getElementById('shipHubContainer').style.display = 'block';
            gameState.currentLocation = 'ship';
            gameState.playerX = 450;
            gameState.playerY = 390;
            initShipHub();
        }

        // Initialize ship hub
        let shipCanvas, shipCtx;
        function initShipHub() {
            shipCanvas = document.getElementById('shipHubCanvas');
            shipCtx = shipCanvas.getContext('2d');
            shipCanvas.width = window.innerWidth;
            shipCanvas.height = window.innerHeight;
            
            // Set up canvas coordinate system for isometric-like view
            shipCtx.imageSmoothingEnabled = true;
            
            renderShipHub();
        }

        // Render ship hub
        function renderShipHub() {
            // Clear canvas with dark background
            shipCtx.fillStyle = '#0a0e1f';
            shipCtx.fillRect(0, 0, shipCanvas.width, shipCanvas.height);

            // Draw subtle grid
            shipCtx.strokeStyle = 'rgba(0, 212, 255, 0.05)';
            shipCtx.lineWidth = 1;
            for (let x = 0; x < shipCanvas.width; x += 50) {
                shipCtx.beginPath();
                shipCtx.moveTo(x, 0);
                shipCtx.lineTo(x, shipCanvas.height);
                shipCtx.stroke();
            }
            for (let y = 0; y < shipCanvas.height; y += 50) {
                shipCtx.beginPath();
                shipCtx.moveTo(0, y);
                shipCtx.lineTo(shipCanvas.width, y);
                shipCtx.stroke();
            }

            // Draw all rooms
            Object.values(rooms).forEach(room => {
                drawRoom(room);
            });

            // Update player movement
            updatePlayerMovement();

            // Draw player
            drawPlayer();

            // Continue animation
            requestAnimationFrame(renderShipHub);
        }

        // Draw a room
        function drawRoom(room) {
            // Room background
            shipCtx.fillStyle = room.color;
            shipCtx.fillRect(room.x, room.y, room.width, room.height);

            // Room border
            shipCtx.strokeStyle = room.borderColor;
            shipCtx.lineWidth = 2;
            shipCtx.strokeRect(room.x, room.y, room.width, room.height);

            // Room glow effect
            shipCtx.shadowColor = room.borderColor;
            shipCtx.shadowBlur = 15;
            shipCtx.shadowOffsetX = 0;
            shipCtx.shadowOffsetY = 0;
            shipCtx.strokeStyle = room.borderColor;
            shipCtx.lineWidth = 1;
            shipCtx.globalAlpha = 0.3;
            shipCtx.strokeRect(room.x - 5, room.y - 5, room.width + 10, room.height + 10);
            shipCtx.globalAlpha = 1.0;
            shipCtx.shadowColor = 'transparent';

            // Room label
            shipCtx.fillStyle = room.borderColor;
            shipCtx.font = 'bold 14px Arial';
            shipCtx.textAlign = 'center';
            shipCtx.textBaseline = 'middle';
            shipCtx.fillText(room.name, room.x + room.width / 2, room.y + room.height / 2 - 15);
            
            shipCtx.font = '20px Arial';
            shipCtx.fillText(room.icon, room.x + room.width / 2, room.y + room.height / 2 + 15);
        }

        // Update player movement
        function updatePlayerMovement() {
            let newX = gameState.playerX;
            let newY = gameState.playerY;

            if (keys['w'] || keys['arrowup']) newY -= gameState.playerSpeed;
            if (keys['s'] || keys['arrowdown']) newY += gameState.playerSpeed;
            if (keys['a'] || keys['arrowleft']) newX -= gameState.playerSpeed;
            if (keys['d'] || keys['arrowright']) newX += gameState.playerSpeed;

            // Simple collision detection
            if (!checkCollision(newX, newY)) {
                gameState.playerX = newX;
                gameState.playerY = newY;
            }

            // Boundary check
            gameState.playerX = Math.max(gameState.playerSize, Math.min(shipCanvas.width - gameState.playerSize, gameState.playerX));
            gameState.playerY = Math.max(gameState.playerSize, Math.min(shipCanvas.height - gameState.playerSize, gameState.playerY));
        }

        // Check collision with rooms
        function checkCollision(x, y) {
            for (const room of Object.values(rooms)) {
                if (x > room.x && x < room.x + room.width &&
                    y > room.y && y < room.y + room.height) {
                    return false; // Can move into rooms
                }
            }
            return false; // Can move anywhere for now
        }

        // Draw player
        function drawPlayer() {
            // Player body
            shipCtx.fillStyle = '#ff6b00';
            shipCtx.beginPath();
            shipCtx.arc(gameState.playerX, gameState.playerY, gameState.playerSize, 0, Math.PI * 2);
            shipCtx.fill();

            // Player glow
            shipCtx.strokeStyle = '#ffaa00';
            shipCtx.lineWidth = 2;
            shipCtx.beginPath();
            shipCtx.arc(gameState.playerX, gameState.playerY, gameState.playerSize, 0, Math.PI * 2);
            shipCtx.stroke();

            // Player direction indicator
            shipCtx.fillStyle = '#ffaa00';
            shipCtx.fillRect(gameState.playerX - 2, gameState.playerY - gameState.playerSize - 5, 4, 5);
        }

        // Handle interaction
        function handleInteraction() {
            // Check which room player is in
            for (const [key, room] of Object.entries(rooms)) {
                if (isPlayerInRoom(room)) {
                    showRoomUI(key, room);
                    return;
                }
            }
        }

        // Check if player is in room
        function isPlayerInRoom(room) {
            return gameState.playerX > room.x &&
                   gameState.playerX < room.x + room.width &&
                   gameState.playerY > room.y &&
                   gameState.playerY < room.y + room.height;
        }

        // Show room UI
        function showRoomUI(roomKey, room) {
            const modalContent = document.getElementById('modalContent');
            
            switch(roomKey) {
                case 'armory':
                    modalContent.innerHTML = `
                        <div class="interaction-modal-header">⚔ ARMORY</div>
                        <div class="interaction-modal-content">
                            <p>Weapon loadouts and upgrades coming soon!</p>
                            <p style="margin-top: 15px; font-size: 12px; color: #666;">Tactical weapons storage | Armor configurations</p>
                        </div>
                    `;
                    break;
                case 'engineering':
                    modalContent.innerHTML = `
                        <div class="interaction-modal-header">⚙ ENGINEERING</div>
                        <div class="interaction-modal-content">
                            <p>Ship upgrades and modifications coming soon!</p>
                            <p style="margin-top: 15px; font-size: 12px; color: #666;">Engine upgrades | Shield optimization | Reactor management</p>
                        </div>
                    `;
                    break;
                case 'communications':
                    modalContent.innerHTML = `
                        <div class="interaction-modal-header">📡 COMMUNICATIONS</div>
                        <div class="interaction-modal-content">
                            <p>Mission briefings and story logs coming soon!</p>
                            <p style="margin-top: 15px; font-size: 12px; color: #666;">Incoming transmissions | Mission logs | Command briefings</p>
                        </div>
                    `;
                    break;
                case 'controlRoom':
                    modalContent.innerHTML = `
                        <div class="interaction-modal-header">🖥 CONTROL ROOM</div>
                        <div class="interaction-modal-content">
                            <p style="margin-bottom: 15px;">Select your mission:</p>
                            <div class="planet-grid">
                                ${planets.map((planet, idx) => `
                                    <div class="planet-card">
                                        <div class="planet-name">${planet.name}</div>
                                        <div class="planet-info">Type: ${planet.type}</div>
                                        <div class="planet-info">Enemies: ${planet.enemies}</div>
                                        <div class="difficulty ${planet.difficulty.toLowerCase()}">${planet.difficulty.toUpperCase()}</div>
                                        <button class="planet-btn" onclick="selectPlanet(${idx})">SELECT</button>
                                    </div>
                                `).join('')}
                            </div>
                        </div>
                    `;
                    break;
                case 'dropship':
                    modalContent.innerHTML = `
                        <div class="interaction-modal-header">🚀 DROPSHIP</div>
                        <div class="interaction-modal-content">
                            <p>Deployment platform ready for launch!</p>
                            <p style="margin-top: 15px; font-size: 12px; color: #666;">Select a mission from the Control Room to launch.</p>
                        </div>
                    `;
                    break;
                case 'cargoBay':
                    modalContent.innerHTML = `
                        <div class="interaction-modal-header">📦 CARGO BAY</div>
                        <div class="interaction-modal-content">
                            <p>Storage and loot management coming soon!</p>
                            <p style="margin-top: 15px; font-size: 12px; color: #666;">Mission rewards | Equipment storage | Inventory management</p>
                        </div>
                    `;
                    break;
                case 'centralHub':
                default:
                    modalContent.innerHTML = `
                        <div class="interaction-modal-header">● CENTRAL HUB</div>
                        <div class="interaction-modal-content">
                            <p>Welcome to the Mothership! Navigate to different areas:</p>
                            <ul style="margin-top: 15px; margin-left: 20px;">
                                <li>⚔ <strong>ARMORY</strong> — Weapons & loadouts</li>
                                <li>⚙ <strong>ENGINEERING</strong> — Ship upgrades</li>
                                <li>📡 <strong>COMMUNICATIONS</strong> — Mission briefings</li>
                                <li>🖥 <strong>CONTROL ROOM</strong> — Select missions</li>
                                <li>🚀 <strong>DROPSHIP</strong> — Launch pad</li>
                                <li>📦 <strong>CARGO BAY</strong> — Storage</li>
                            </ul>
                        </div>
                    `;
                    break;
            }

            document.getElementById('modalOverlay').classList.add('show');
            document.getElementById('interactionModal').classList.add('show');
        }

        function closeInteractionModal() {
            document.getElementById('modalOverlay').classList.remove('show');
            document.getElementById('interactionModal').classList.remove('show');
        }

        function selectPlanet(idx) {
            const planet = planets[idx];
            alert(`Mission ready: ${planet.name}\n\nDeployment coming soon!`);
            closeInteractionModal();
        }

        function exitToMenu() {
            document.getElementById('shipHubContainer').style.display = 'none';
            document.getElementById('mainMenu').style.display = 'flex';
            closeInteractionModal();
        }

        function exitGame() {
            alert('Thanks for playing Planetfall!');
        }

        // Initialize on load
        window.addEventListener('load', () => {
            initStarfield();
        });

        // Handle window resize
        window.addEventListener('resize', () => {
            if (gameState.currentLocation === 'ship' && shipCanvas) {
                shipCanvas.width = window.innerWidth;
                shipCanvas.height = window.innerHeight;
            }
        });
    </script>
</body>
</html>
