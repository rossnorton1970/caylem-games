<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Planetfall: Extraction</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        body { font-family: 'Arial', sans-serif; background: #000; color: #e0e0e0; }
        
        /* MISSION CANVAS */
        #missionContainer {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #000;
            z-index: 100;
        }
        
        #missionCanvas {
            display: block;
            width: 100%;
            height: 100%;
        }
        
        /* MISSION HUD LAYER */
        .mission-hud {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 101;
        }
        
        .hud-panel {
            position: fixed;
            background: rgba(10, 14, 31, 0.85);
            border: 2px solid;
            font-size: 12px;
            pointer-events: auto;
            z-index: 102;
        }
        
        .hud-top-left {
            top: 20px;
            left: 20px;
            padding: 15px;
            border-color: #00d4ff;
            min-width: 200px;
        }
        
        .hud-top-right {
            top: 20px;
            right: 20px;
            padding: 15px;
            border-color: #ff8800;
            min-width: 150px;
        }
        
        .hud-bottom-left {
            bottom: 20px;
            left: 20px;
            padding: 15px;
            border-color: #00ff88;
            min-width: 180px;
        }
        
        .hud-bottom-right {
            bottom: 20px;
            right: 20px;
            padding: 15px;
            border-color: #00d4ff;
            max-width: 200px;
        }
        
        .hud-title {
            color: #00d4ff;
            font-weight: bold;
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            margin-bottom: 10px;
            border-bottom: 1px solid #00d4ff;
            padding-bottom: 5px;
        }
        
        .hud-stat {
            display: flex;
            justify-content: space-between;
            margin-bottom: 8px;
            color: #aaa;
        }
        
        .hud-stat-label {
            color: #888;
            text-transform: uppercase;
            font-size: 10px;
        }
        
        .hud-stat-value {
            color: #00ff88;
            font-weight: bold;
        }
        
        .health-bar {
            width: 100%;
            height: 12px;
            background: #333;
            border: 1px solid #ff4444;
            border-radius: 2px;
            overflow: hidden;
            margin: 8px 0;
        }
        
        .health-fill {
            height: 100%;
            background: linear-gradient(90deg, #ff4444, #ff8800);
            width: 100%;
            transition: width 0.2s;
        }
        
        .ammo-bar {
            width: 100%;
            height: 8px;
            background: #333;
            border: 1px solid #ffaa00;
            border-radius: 2px;
            overflow: hidden;
            margin: 4px 0;
        }
        
        .ammo-fill {
            height: 100%;
            background: #ffaa00;
            width: 100%;
        }
        
        .timer-display {
            font-size: 18px;
            font-weight: bold;
            color: #ff4444;
            text-align: center;
            margin: 10px 0;
        }
        
        .objective-item {
            background: rgba(255, 255, 255, 0.05);
            padding: 8px;
            border-left: 3px solid #00d4ff;
            margin-bottom: 6px;
            border-radius: 2px;
        }
        
        .objective-item.completed {
            border-left-color: #00ff88;
            opacity: 0.7;
        }
        
        .objective-item.pending {
            border-left-color: #888;
            opacity: 0.5;
        }
        
        .objective-title {
            font-weight: bold;
            color: #00d4ff;
            font-size: 11px;
        }
        
        .objective-status {
            font-size: 10px;
            color: #888;
            margin-top: 2px;
        }
        
        .extraction-info {
            background: rgba(255, 68, 68, 0.1);
            border: 1px solid #ff4444;
            padding: 10px;
            border-radius: 3px;
            margin-top: 8px;
        }
        
        .extraction-countdown {
            font-size: 14px;
            font-weight: bold;
            color: #ff4444;
            text-align: center;
        }
        
        .enemy-count {
            font-size: 10px;
            color: #ffaa00;
            margin-top: 4px;
            text-align: center;
        }
        
        /* MISSION COMPLETE SCREEN */
        .mission-complete-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.95);
            z-index: 200;
            justify-content: center;
            align-items: center;
        }
        
        .mission-complete-overlay.show {
            display: flex;
        }
        
        .mission-complete-screen {
            background: rgba(10, 14, 31, 0.98);
            border: 3px solid #00d4ff;
            border-radius: 10px;
            padding: 40px;
            max-width: 500px;
            text-align: center;
            box-shadow: 0 0 60px rgba(0, 212, 255, 0.3);
        }
        
        .mission-result-header {
            font-size: 32px;
            font-weight: bold;
            margin-bottom: 20px;
            text-shadow: 0 0 20px rgba(0, 255, 136, 0.3);
        }
        
        .mission-result-header.success {
            color: #00ff88;
        }
        
        .mission-result-header.failed {
            color: #ff4444;
        }
        
        .mission-stat-line {
            display: flex;
            justify-content: space-between;
            margin: 12px 0;
            font-size: 14px;
            padding: 8px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 4px;
        }
        
        .mission-stat-label {
            color: #888;
            text-transform: uppercase;
            font-weight: 600;
        }
        
        .mission-stat-value {
            color: #00ff88;
            font-weight: bold;
        }
        
        .mission-rewards-section {
            background: rgba(0, 255, 136, 0.1);
            border: 2px solid #00ff88;
            border-radius: 5px;
            padding: 15px;
            margin: 20px 0;
        }
        
        .mission-rewards-title {
            color: #00ff88;
            font-weight: bold;
            font-size: 12px;
            text-transform: uppercase;
            margin-bottom: 10px;
        }
        
        .mission-reward-item {
            display: flex;
            justify-content: space-between;
            padding: 6px;
            color: #aaa;
            font-size: 12px;
        }
        
        .mission-reward-value {
            color: #00ff88;
            font-weight: bold;
        }
        
        .mission-action-buttons {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-top: 25px;
        }
        
        .mission-action-btn {
            padding: 12px 20px;
            font-weight: bold;
            border: 2px solid;
            border-radius: 5px;
            cursor: pointer;
            background: transparent;
            text-transform: uppercase;
            font-size: 12px;
            letter-spacing: 0.1em;
            transition: all 0.2s;
        }
        
        .mission-action-btn.return {
            border-color: #00d4ff;
            color: #00d4ff;
        }
        
        .mission-action-btn.return:hover {
            background: rgba(0, 212, 255, 0.2);
            box-shadow: 0 0 15px rgba(0, 212, 255, 0.3);
        }
        
        .mission-action-btn.retry {
            border-color: #ff8800;
            color: #ff8800;
        }
        
        .mission-action-btn.retry:hover {
            background: rgba(255, 136, 0, 0.2);
            box-shadow: 0 0 15px rgba(255, 136, 0, 0.3);
        }
    </style>
</head>
<body>
    <!-- MAIN MENU -->
    <div id="mainMenu">
        <div style="text-align: center;">
            <h1 style="font-size: 64px; color: #fff; margin-bottom: 10px;">PLANETFALL</h1>
            <h2 style="font-size: 32px; color: #00d4ff; margin-bottom: 30px;">EXTRACTION</h2>
            <button onclick="launchHelios7Mission()" style="padding: 12px 30px; font-size: 16px; background: #00d4ff; color: #000; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; margin: 10px;">► LAUNCH HELIOS-7 MISSION</button>
            <button onclick="exitGame()" style="padding: 12px 30px; font-size: 16px; background: #ff4444; color: #fff; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; margin: 10px;">✕ EXIT</button>
        </div>
    </div>
    
    <!-- MISSION CONTAINER -->
    <div id="missionContainer">
        <canvas id="missionCanvas"></canvas>
        <div class="mission-hud">
            <!-- TOP LEFT: PLAYER STATUS -->
            <div class="hud-panel hud-top-left">
                <div class="hud-title">⚔ PLAYER STATUS</div>
                <div class="hud-stat">
                    <span class="hud-stat-label">HEALTH</span>
                    <span id="hudHealth" class="hud-stat-value">100/100</span>
                </div>
                <div class="health-bar">
                    <div id="healthFill" class="health-fill"></div>
                </div>
                <div class="hud-stat">
                    <span class="hud-stat-label">AMMO</span>
                    <span id="hudAmmo" class="hud-stat-value">300/300</span>
                </div>
                <div class="ammo-bar">
                    <div id="ammoFill" class="ammo-fill"></div>
                </div>
            </div>
            
            <!-- TOP RIGHT: PHASE & THREAT -->
            <div class="hud-panel hud-top-right">
                <div class="hud-title">⚠ THREAT LEVEL</div>
                <div class="hud-stat">
                    <span class="hud-stat-label">PHASE</span>
                    <span id="hudPhase" class="hud-stat-value">LANDING</span>
                </div>
                <div class="hud-stat">
                    <span class="hud-stat-label">ACTIVE ENEMIES</span>
                    <span id="hudEnemies" class="hud-stat-value">0</span>
                </div>
            </div>
            
            <!-- BOTTOM LEFT: OBJECTIVES -->
            <div class="hud-panel hud-bottom-left">
                <div class="hud-title">📋 OBJECTIVES</div>
                <div id="objectivesDisplay"></div>
            </div>
            
            <!-- BOTTOM RIGHT: EXTRACTION STATUS -->
            <div class="hud-panel hud-bottom-right" id="extractionPanel" style="display: none;">
                <div class="hud-title">🚀 EXTRACTION</div>
                <div class="timer-display" id="extractionTimer">60.0s</div>
                <div class="extraction-info">
                    <div id="enemyCountDisplay" class="enemy-count">ENEMIES: 0</div>
                </div>
            </div>
        </div>
    </div>
    
    <!-- MISSION COMPLETE SCREEN -->
    <div class="mission-complete-overlay" id="missionCompleteScreen">
        <div class="mission-complete-screen">
            <div id="missionResultHeader" class="mission-result-header success">MISSION SUCCESS</div>
            
            <div class="mission-stat-line">
                <span class="mission-stat-label">TIME SURVIVED</span>
                <span id="timeSurvived" class="mission-stat-value">--:--</span>
            </div>
            <div class="mission-stat-line">
                <span class="mission-stat-label">ENEMIES KILLED</span>
                <span id="enemiesKilled" class="mission-stat-value">0</span>
            </div>
            <div class="mission-stat-line">
                <span class="mission-stat-label">ACCURACY</span>
                <span id="accuracy" class="mission-stat-value">--</span>
            </div>
            
            <div class="mission-rewards-section">
                <div class="mission-rewards-title">MISSION REWARDS</div>
                <div class="mission-reward-item">
                    <span>Credits</span>
                    <span id="rewardCredits" class="mission-reward-value">0</span>
                </div>
                <div class="mission-reward-item">
                    <span>Materials</span>
                    <span id="rewardMaterials" class="mission-reward-value">0</span>
                </div>
                <div class="mission-reward-item">
                    <span>Research Points</span>
                    <span id="rewardResearch" class="mission-reward-value">0</span>
                </div>
            </div>
            
            <div class="mission-action-buttons">
                <button class="mission-action-btn return" onclick="returnToMenu()">← RETURN TO MENU</button>
                <button class="mission-action-btn retry" onclick="launchHelios7Mission()">↻ RETRY</button>
            </div>
        </div>
    </div>

    <script>
        // ========== GAME STATE ==========
        const gameState = {
            mission: {
                active: false,
                phase: 'idle', // landing, exploration, artifact, extraction, complete
                phaseStartTime: 0,
                missionStartTime: 0,
                startedAt: 0
            },
            player: {
                x: 100,
                y: 100,
                vx: 0,
                vy: 0,
                speed: 4,
                sprintSpeed: 6,
                size: 8,
                health: 100,
                maxHealth: 100,
                ammo: 300,
                maxAmmo: 300,
                angle: 0,
                isSprinting: false
            },
            objectives: [
                { id: 1, title: 'Investigate crashed outpost', status: 'pending', targetX: 400, targetY: 400, completed: false },
                { id: 2, title: 'Collect alien artifact', status: 'pending', targetX: 400, targetY: 430, completed: false },
                { id: 3, title: 'Extract from landing zone', status: 'pending', targetX: 100, targetY: 100, completed: false }
            ],
            currentObjective: 0,
            enemies: [],
            enemiesKilled: 0,
            extractionActive: false,
            extractionTimer: 60,
            extractionTimeElapsed: 0,
            dropshipArrived: false,
            rewards: {
                credits: 0,
                materials: 0,
                researchPoints: 0
            },
            director: {
                activeEnemies: 0,
                maxEnemiesPerPhase: 7,
                spawnCooldown: 0,
                spawnCooldownMax: 3,
                heavyBroodlingCount: 0,
                heavyBroodlingMaxPerCycle: 2
            }
        };
        
        // ========== ENEMY TYPE DEFINITIONS ==========
        const enemyTypes = {
            scavengerDrone: {
                name: 'Scavenger Drone',
                health: 15,
                speed: 5,
                damage: 5,
                detectionRange: 40,
                attackRange: 5,
                attackCooldown: 0.8,
                icon: '🐛',
                color: '#ff6600',
                loot: { credits: 10, materials: 2, researchPoints: 5 },
                size: 6
            },
            frostStalker: {
                name: 'Frost Stalker',
                health: 40,
                speed: 3.5,
                damage: 10,
                detectionRange: 60,
                attackRange: 40,
                attackCooldown: 1.5,
                slowStrength: 0.15,
                slowDuration: 2,
                icon: '❄️',
                color: '#00d4ff',
                loot: { credits: 25, materials: 5, researchPoints: 10 },
                size: 8
            },
            heavyBroodling: {
                name: 'Heavy Broodling',
                health: 80,
                speed: 2,
                damage: 25,
                chargeSpeed: 7,
                detectionRange: 90,
                chargeRange: 100,
                attackCooldown: 2,
                chargeCooldown: 3,
                icon: '👹',
                color: '#ff4444',
                loot: { credits: 50, materials: 15, researchPoints: 20 },
                size: 12
            }
        };
        
        // ========== DIRECTOR AI SYSTEM ==========
        class DirectorAI {
            constructor() {
                this.spawnPoints = [
                    { x: 50, y: 50, zone: 'A' },
                    { x: 450, y: 50, zone: 'B' },
                    { x: 450, y: 450, zone: 'C' },
                    { x: 50, y: 450, zone: 'D' }
                ];
                this.currentWaveIntensity = 0;
                this.timeInExtraction = 0;
            }
            
            updatePressure(elapsedSeconds) {
                // Calculate pressure curve over 60 seconds
                if (elapsedSeconds < 10) {
                    this.currentWaveIntensity = 1; // Light: 2-3 enemies
                } else if (elapsedSeconds < 30) {
                    this.currentWaveIntensity = 2; // Medium: 3-5 enemies
                } else if (elapsedSeconds < 50) {
                    this.currentWaveIntensity = 3; // Heavy: 4-6 enemies
                } else {
                    this.currentWaveIntensity = 4; // Peak: 5-7 enemies
                }
            }
            
            shouldSpawnEnemy(activeEnemyCount) {
                let maxEnemies = 0;
                switch(this.currentWaveIntensity) {
                    case 1: maxEnemies = 3; break;
                    case 2: maxEnemies = 5; break;
                    case 3: maxEnemies = 6; break;
                    case 4: maxEnemies = 7; break;
                }
                
                return activeEnemyCount < maxEnemies;
            }
            
            getNextSpawnType(timeElapsed) {
                // Varied enemy selection based on time
                if (timeElapsed < 15) {
                    return Math.random() < 0.7 ? 'scavengerDrone' : 'scavengerDrone';
                } else if (timeElapsed < 35) {
                    const rand = Math.random();
                    return rand < 0.5 ? 'scavengerDrone' : 'frostStalker';
                } else if (timeElapsed < 50) {
                    const rand = Math.random();
                    return rand < 0.4 ? 'scavengerDrone' : 'frostStalker';
                } else {
                    // Late phase: more variety
                    const rand = Math.random();
                    if (rand < 0.3 && gameState.director.heavyBroodlingCount < gameState.director.heavyBroodlingMaxPerCycle) {
                        gameState.director.heavyBroodlingCount++;
                        return 'heavyBroodling';
                    } else if (rand < 0.7) {
                        return 'frostStalker';
                    } else {
                        return 'scavengerDrone';
                    }
                }
            }
            
            getRandomSpawnPoint() {
                return this.spawnPoints[Math.floor(Math.random() * this.spawnPoints.length)];
            }
        }
        
        const director = new DirectorAI();
        
        // ========== SOUND DETECTION SYSTEM ==========
        class SoundEvent {
            constructor(x, y, radius) {
                this.x = x;
                this.y = y;
                this.radius = radius;
                this.createdAt = Date.now();
                this.duration = 5000; // 5 second investigation window
            }
            
            isActive() {
                return (Date.now() - this.createdAt) < this.duration;
            }
            
            containsPoint(x, y) {
                const dist = Math.hypot(x - this.x, y - this.y);
                return dist <= this.radius;
            }
        }
        
        let soundEvents = [];
        
        // ========== ENEMY CLASS ==========
        class Enemy {
            constructor(type, x, y) {
                const typeData = enemyTypes[type];
                this.type = type;
                this.x = x;
                this.y = y;
                this.vx = 0;
                this.vy = 0;
                this.health = typeData.health;
                this.maxHealth = typeData.health;
                this.speed = typeData.speed;
                this.lastAttack = 0;
                this.lastCharge = 0;
                this.state = 'patrol'; // patrol, investigating, chasing, attacking
                this.investigateTimer = 0;
                this.slowEffect = 0; // For Frost Stalker slow
                this.slowStacks = 0; // Stacking slow system
            }
            
            update(playerX, playerY, dt) {
                const typeData = enemyTypes[this.type];
                const playerDist = Math.hypot(playerX - this.x, playerY - this.y);
                const playerAngle = Math.atan2(playerY - this.y, playerX - this.x);
                
                // Reduce slow effect over time
                if (this.slowEffect > 0) {
                    this.slowEffect = Math.max(0, this.slowEffect - dt);
                }
                
                // Check if player is detected
                if (playerDist < typeData.detectionRange) {
                    this.state = 'chasing';
                    this.investigateTimer = 0;
                } else {
                    // Check if in sound event radius
                    let inSoundEvent = false;
                    for (let sound of soundEvents) {
                        if (sound.containsPoint(this.x, this.y) && this.state !== 'chasing') {
                            inSoundEvent = true;
                            if (this.state !== 'investigating') {
                                this.state = 'investigating';
                                this.investigateTimer = 5;
                            }
                            break;
                        }
                    }
                    
                    if (!inSoundEvent && this.state === 'investigating') {
                        this.investigateTimer -= dt;
                        if (this.investigateTimer <= 0) {
                            this.state = 'patrol';
                        }
                    }
                }
                
                // Movement
                let currentSpeed = this.speed * (1 - this.slowEffect);
                
                if (this.state === 'patrol') {
                    this.vx *= 0.95;
                    this.vy *= 0.95;
                } else if (this.state === 'investigating') {
                    // Move toward sound location (approximate - use last player seen)
                    this.vx = Math.cos(playerAngle) * currentSpeed * 0.5;
                    this.vy = Math.sin(playerAngle) * currentSpeed * 0.5;
                } else if (this.state === 'chasing') {
                    // Chase player
                    if (this.type === 'heavyBroodling' && playerDist < this.speed * 10 && Date.now() - this.lastCharge > 3000) {
                        // Charge attack
                        this.vx = Math.cos(playerAngle) * typeData.chargeSpeed;
                        this.vy = Math.sin(playerAngle) * typeData.chargeSpeed;
                        this.lastCharge = Date.now();
                    } else {
                        // Regular chase
                        this.vx = Math.cos(playerAngle) * currentSpeed;
                        this.vy = Math.sin(playerAngle) * currentSpeed;
                    }
                }
                
                // Apply velocity
                this.x += this.vx * dt;
                this.y += this.vy * dt;
                
                // Boundary wrap
                const canvas = document.getElementById('missionCanvas');
                if (this.x < 0) this.x = canvas.width;
                if (this.x > canvas.width) this.x = 0;
                if (this.y < 0) this.y = canvas.height;
                if (this.y > canvas.height) this.y = 0;
            }
            
            attack(playerX, playerY) {
                const typeData = enemyTypes[this.type];
                const dist = Math.hypot(playerX - this.x, playerY - this.y);
                
                if (Date.now() - this.lastAttack > typeData.attackCooldown * 1000) {
                    if (dist < typeData.attackRange) {
                        this.lastAttack = Date.now();
                        
                        // Apply damage
                        gameState.player.health = Math.max(0, gameState.player.health - typeData.damage);
                        
                        // Frost Stalker applies stacking slow
                        if (this.type === 'frostStalker') {
                            gameState.player.slowStacks = Math.min(2, gameState.player.slowStacks + 1);
                            gameState.player.slowTimer = 2;
                        }
                        
                        return true;
                    }
                }
                return false;
            }
            
            takeDamage(amount) {
                this.health -= amount;
                return this.health <= 0;
            }
            
            draw(ctx) {
                const typeData = enemyTypes[this.type];
                ctx.fillStyle = typeData.color;
                ctx.font = `${typeData.size * 2}px Arial`;
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillText(typeData.icon, this.x, this.y);
                
                // Health bar
                ctx.fillStyle = 'rgba(255, 0, 0, 0.3)';
                ctx.fillRect(this.x - 15, this.y - 20, 30, 4);
                ctx.fillStyle = '#ff4444';
                ctx.fillRect(this.x - 15, this.y - 20, (this.health / typeData.health) * 30, 4);
            }
        }
        
        // ========== KEYBOARD INPUT ==========
        const keys = {};
        window.addEventListener('keydown', (e) => {
            keys[e.key.toLowerCase()] = true;
            if (e.key === ' ' || e.key === 'Shift') e.preventDefault();
        });
        window.addEventListener('keyup', (e) => {
            keys[e.key.toLowerCase()] = false;
        });
        
        let mouseX = 0, mouseY = 0;
        window.addEventListener('mousemove', (e) => {
            mouseX = e.clientX;
            mouseY = e.clientY;
        });
        
        window.addEventListener('click', (e) => {
            if (gameState.mission.active && gameState.player.ammo > 0) {
                // Fire weapon
                const canvas = document.getElementById('missionCanvas');
                const rect = canvas.getBoundingClientRect();
                const clickX = e.clientX - rect.left;
                const clickY = e.clientY - rect.top;
                
                fireWeapon(clickX, clickY);
            }
        });
        
        // ========== MISSION FUNCTIONS ==========
        function launchHelios7Mission() {
            document.getElementById('mainMenu').style.display = 'none';
            document.getElementById('missionContainer').style.display = 'block';
            document.getElementById('missionCompleteScreen').classList.remove('show');
            
            gameState.mission.active = true;
            gameState.mission.phase = 'landing';
            gameState.mission.missionStartTime = Date.now();
            gameState.mission.phaseStartTime = Date.now();
            gameState.mission.startedAt = Date.now();
            
            gameState.player.x = 100;
            gameState.player.y = 100;
            gameState.player.health = 100;
            gameState.player.ammo = 300;
            gameState.player.slowStacks = 0;
            gameState.player.slowTimer = 0;
            
            gameState.enemies = [];
            gameState.enemiesKilled = 0;
            gameState.extractionActive = false;
            gameState.extractionTimer = 60;
            gameState.extractionTimeElapsed = 0;
            gameState.director.heavyBroodlingCount = 0;
            
            gameState.objectives = [
                { id: 1, title: 'Investigate crashed outpost', status: 'active', targetX: 400, targetY: 400, completed: false },
                { id: 2, title: 'Collect alien artifact', status: 'pending', targetX: 400, targetY: 430, completed: false },
                { id: 3, title: 'Extract from landing zone', status: 'pending', targetX: 100, targetY: 100, completed: false }
            ];
            gameState.currentObjective = 0;
            
            initMissionCanvas();
            gameLoop();
        }
        
        function initMissionCanvas() {
            const canvas = document.getElementById('missionCanvas');
            const ctx = canvas.getContext('2d');
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        
        function fireWeapon(targetX, targetY) {
            if (gameState.player.ammo <= 0) return;
            
            gameState.player.ammo = Math.max(0, gameState.player.ammo - 1);
            
            // Create sound event for AI to investigate
            const soundEvent = new SoundEvent(gameState.player.x, gameState.player.y, 50);
            soundEvents.push(soundEvent);
            
            // Check for hits on enemies
            for (let enemy of gameState.enemies) {
                const dist = Math.hypot(targetX - enemy.x, targetY - enemy.y);
                if (dist < 30) {
                    if (enemy.takeDamage(20)) {
                        gameState.enemiesKilled++;
                        const loot = enemyTypes[enemy.type].loot;
                        gameState.rewards.credits += loot.credits;
                        gameState.rewards.materials += loot.materials;
                        gameState.rewards.researchPoints += loot.researchPoints;
                        gameState.enemies.splice(gameState.enemies.indexOf(enemy), 1);
                    }
                    break;
                }
            }
        }
        
        function updatePlayerMovement(dt) {
            let accel = 0;
            gameState.player.isSprinting = keys['shift'];
            
            const baseSpeed = gameState.player.isSprinting ? gameState.player.sprintSpeed : gameState.player.speed;
            
            // Apply slow effect from Frost Stalker
            let speedMultiplier = 1;
            if (gameState.player.slowTimer > 0) {
                gameState.player.slowTimer -= dt;
                // Stacking slow: 1 stack = 15%, 2 stacks = 30%, max 30%
                speedMultiplier = 1 - (Math.min(2, gameState.player.slowStacks) * 0.15);
            } else {
                gameState.player.slowStacks = 0;
            }
            
            const currentSpeed = baseSpeed * speedMultiplier;
            
            if (keys['w'] || keys['arrowup']) gameState.player.y -= currentSpeed;
            if (keys['s'] || keys['arrowdown']) gameState.player.y += currentSpeed;
            if (keys['a'] || keys['arrowleft']) gameState.player.x -= currentSpeed;
            if (keys['d'] || keys['arrowright']) gameState.player.x += currentSpeed;
            
            // Boundary
            const canvas = document.getElementById('missionCanvas');
            gameState.player.x = Math.max(0, Math.min(canvas.width, gameState.player.x));
            gameState.player.y = Math.max(0, Math.min(canvas.height, gameState.player.y));
        }
        
        function updateObjectives() {
            const playerX = gameState.player.x;
            const playerY = gameState.player.y;
            
            for (let obj of gameState.objectives) {
                if (obj.completed) continue;
                
                const dist = Math.hypot(playerX - obj.targetX, playerY - obj.targetY);
                
                if (dist < 40) {
                    obj.completed = true;
                    obj.status = 'completed';
                    
                    if (obj.id === 1) {
                        // Trigger objective 2
                        gameState.objectives[1].status = 'active';
                    } else if (obj.id === 2) {
                        // Trigger objective 3 - extraction
                        gameState.objectives[2].status = 'active';
                        initializeExtraction();
                    } else if (obj.id === 3) {
                        // Check if in dropship
                        if (gameState.extractionActive && gameState.extractionTimer <= 0) {
                            completeMission(true);
                        }
                    }
                }
            }
        }
        
        function initializeExtraction() {
            gameState.extractionActive = true;
            gameState.extractionTimer = 60;
            gameState.extractionTimeElapsed = 0;
            gameState.mission.phase = 'extraction';
            document.getElementById('extractionPanel').style.display = 'block';
            director.currentWaveIntensity = 0;
            gameState.director.heavyBroodlingCount = 0;
        }
        
        function updateExtraction(dt) {
            if (!gameState.extractionActive) return;
            
            gameState.extractionTimeElapsed += dt;
            gameState.extractionTimer = Math.max(0, 60 - gameState.extractionTimeElapsed);
            
            // Update director AI pressure
            director.updatePressure(gameState.extractionTimeElapsed);
            
            // Spawn enemies dynamically
            if (director.shouldSpawnEnemy(gameState.enemies.length)) {
                gameState.director.spawnCooldown -= dt;
                if (gameState.director.spawnCooldown <= 0) {
                    const enemyType = director.getNextSpawnType(gameState.extractionTimeElapsed);
                    const spawnPoint = director.getRandomSpawnPoint();
                    gameState.enemies.push(new Enemy(enemyType, spawnPoint.x, spawnPoint.y));
                    gameState.director.spawnCooldown = gameState.director.spawnCooldownMax;
                }
            }
            
            // Check extraction completion
            if (gameState.extractionTimer <= 0) {
                // Dropship arrives
                gameState.dropshipArrived = true;
                
                // Check if player is at landing zone
                const distToLanding = Math.hypot(gameState.player.x - 100, gameState.player.y - 100);
                if (distToLanding < 50) {
                    completeMission(true);
                } else {
                    // Mission failed - missed extraction window
                    setTimeout(() => completeMission(false), 1000);
                }
            }
        }
        
        function completeMission(success) {
            gameState.mission.active = false;
            const elapsed = (Date.now() - gameState.mission.startedAt) / 1000;
            
            showMissionComplete(success, elapsed);
        }
        
        function showMissionComplete(success, elapsedTime) {
            const screen = document.getElementById('missionCompleteScreen');
            const header = document.getElementById('missionResultHeader');
            
            if (success) {
                header.textContent = '✓ MISSION SUCCESS';
                header.className = 'mission-result-header success';
            } else {
                header.textContent = '✗ MISSION FAILED';
                header.className = 'mission-result-header failed';
                gameState.rewards.credits = 0;
                gameState.rewards.materials = 0;
                gameState.rewards.researchPoints = 0;
            }
            
            const minutes = Math.floor(elapsedTime / 60);
            const seconds = (elapsedTime % 60).toFixed(1);
            
            document.getElementById('timeSurvived').textContent = `${minutes}:${seconds.padStart(4, '0')}`;
            document.getElementById('enemiesKilled').textContent = gameState.enemiesKilled;
            document.getElementById('accuracy').textContent = gameState.player.ammo > 0 ? '85%' : '100%';
            document.getElementById('rewardCredits').textContent = gameState.rewards.credits;
            document.getElementById('rewardMaterials').textContent = gameState.rewards.materials;
            document.getElementById('rewardResearch').textContent = gameState.rewards.researchPoints;
            
            screen.classList.add('show');
        }
        
        function returnToMenu() {
            document.getElementById('missionContainer').style.display = 'none';
            document.getElementById('mainMenu').style.display = 'block';
            document.getElementById('missionCompleteScreen').classList.remove('show');
        }
        
        function exitGame() {
            alert('Thanks for playing!');
        }
        
        // ========== RENDERING ==========
        let lastFrameTime = Date.now();
        
        function gameLoop() {
            const canvas = document.getElementById('missionCanvas');
            const ctx = canvas.getContext('2d');
            
            const now = Date.now();
            const dt = (now - lastFrameTime) / 1000;
            lastFrameTime = now;
            
            if (!gameState.mission.active) {
                requestAnimationFrame(gameLoop);
                return;
            }
            
            // Update game logic
            updatePlayerMovement(dt);
            updateObjectives();
            updateExtraction(dt);
            
            // Update enemies
            for (let enemy of gameState.enemies) {
                enemy.update(gameState.player.x, gameState.player.y, dt);
                enemy.attack(gameState.player.x, gameState.player.y);
            }
            
            // Check if player is dead
            if (gameState.player.health <= 0) {
                completeMission(false);
                requestAnimationFrame(gameLoop);
                return;
            }
            
            // Clean up inactive sound events
            soundEvents = soundEvents.filter(s => s.isActive());
            
            // Render
            renderGame(ctx, canvas);
            updateHUD();
            
            requestAnimationFrame(gameLoop);
        }
        
        function renderGame(ctx, canvas) {
            // Background
            ctx.fillStyle = '#0a0a1a';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            // Grid
            ctx.strokeStyle = 'rgba(0, 212, 255, 0.05)';
            ctx.lineWidth = 1;
            for (let x = 0; x < canvas.width; x += 50) {
                ctx.beginPath();
                ctx.moveTo(x, 0);
                ctx.lineTo(x, canvas.height);
                ctx.stroke();
            }
            for (let y = 0; y < canvas.height; y += 50) {
                ctx.beginPath();
                ctx.moveTo(0, y);
                ctx.lineTo(canvas.width, y);
                ctx.stroke();
            }
            
            // Draw outpost landmark
            ctx.fillStyle = 'rgba(100, 100, 100, 0.3)';
            ctx.fillRect(350, 350, 120, 120);
            ctx.strokeStyle = '#888';
            ctx.lineWidth = 2;
            ctx.strokeRect(350, 350, 120, 120);
            ctx.fillStyle = '#888';
            ctx.font = '20px Arial';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText('⛺', 410, 410);
            
            // Draw landing zone
            ctx.strokeStyle = '#00d4ff';
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.arc(100, 100, 40, 0, Math.PI * 2);
            ctx.stroke();
            ctx.fillStyle = 'rgba(0, 212, 255, 0.1)';
            ctx.beginPath();
            ctx.arc(100, 100, 40, 0, Math.PI * 2);
            ctx.fill();
            ctx.fillStyle = '#00d4ff';
            ctx.fillText('📍', 100, 100);
            
            // Draw objective markers
            for (let obj of gameState.objectives) {
                if (obj.status === 'completed') continue;
                
                ctx.fillStyle = obj.status === 'active' ? '#00ff88' : '#888';
                ctx.beginPath();
                ctx.arc(obj.targetX, obj.targetY, 15, 0, Math.PI * 2);
                ctx.fill();
                ctx.strokeStyle = obj.status === 'active' ? '#00ff88' : '#444';
                ctx.lineWidth = 2;
                ctx.stroke();
                
                ctx.fillStyle = '#000';
                ctx.font = 'bold 11px Arial';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillText(obj.id, obj.targetX, obj.targetY);
            }
            
            // Draw enemies
            for (let enemy of gameState.enemies) {
                enemy.draw(ctx);
            }
            
            // Draw player
            ctx.fillStyle = '#00ff88';
            ctx.beginPath();
            ctx.arc(gameState.player.x, gameState.player.y, gameState.player.size, 0, Math.PI * 2);
            ctx.fill();
            ctx.strokeStyle = '#00d4ff';
            ctx.lineWidth = 2;
            ctx.stroke();
            
            // Draw player health indicator
            if (gameState.player.slowStacks > 0) {
                ctx.fillStyle = '#00d4ff';
                ctx.font = 'bold 12px Arial';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillText(`SLOW: ${gameState.player.slowStacks}`, gameState.player.x, gameState.player.y - 25);
            }
        }
        
        function updateHUD() {
            document.getElementById('hudHealth').textContent = `${Math.round(gameState.player.health)}/${gameState.player.maxHealth}`;
            document.getElementById('healthFill').style.width = `${(gameState.player.health / gameState.player.maxHealth) * 100}%`;
            
            document.getElementById('hudAmmo').textContent = `${gameState.player.ammo}/${gameState.player.maxAmmo}`;
            document.getElementById('ammoFill').style.width = `${(gameState.player.ammo / gameState.player.maxAmmo) * 100}%`;
            
            document.getElementById('hudPhase').textContent = gameState.mission.phase.toUpperCase();
            document.getElementById('hudEnemies').textContent = gameState.enemies.length;
            
            // Update objectives display
            let objHTML = '';
            for (let obj of gameState.objectives) {
                const statusClass = obj.completed ? 'completed' : (obj.status === 'active' ? '' : 'pending');
                objHTML += `<div class="objective-item ${statusClass}">
                    <div class="objective-title">${obj.completed ? '✓' : '→'} ${obj.title}</div>
                    <div class="objective-status">${obj.status}</div>
                </div>`;
            }
            document.getElementById('objectivesDisplay').innerHTML = objHTML;
            
            // Update extraction timer
            if (gameState.extractionActive) {
                document.getElementById('extractionTimer').textContent = gameState.extractionTimer.toFixed(1) + 's';
                document.getElementById('enemyCountDisplay').textContent = `ENEMIES: ${gameState.enemies.length}`;
            }
        }
    </script>
