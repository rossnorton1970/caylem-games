<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Planetfall: Extraction</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        body { font-family: 'Arial', sans-serif; background: #000; color: #e0e0e0; }
        
        /* MAIN MENU */
        #mainMenu {
            position: relative;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background: #000;
            overflow: hidden;
        }

        .menu-bg-glow {
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, rgba(0,0,0,1) 0%, rgba(10,10,20,0.8) 50%, rgba(0,0,0,1) 100%);
            z-index: 1;
        }

        .menu-content {
            position: relative;
            z-index: 10;
            text-align: center;
            animation: fadeInDown 0.8s ease-out;
        }

        @keyframes fadeInDown {
            from {
                opacity: 0;
                transform: translateY(-30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .menu-logo {
            margin-bottom: 12px;
        }

        .menu-title {
            font-size: clamp(48px, 10vw, 96px);
            font-weight: 900;
            letter-spacing: 0.25em;
            color: #fff;
            margin: 0;
            text-shadow: 0 0 30px rgba(59, 130, 246, 0.3), 0 0 60px rgba(59, 130, 246, 0.1);
        }

        .menu-subtitle {
            font-size: clamp(18px, 3vw, 32px);
            letter-spacing: 0.5em;
            color: #3b82f6;
            font-weight: 300;
            margin: 8px 0 0 0;
            text-shadow: 0 0 20px rgba(59, 130, 246, 0.2);
        }

        .menu-tagline {
            font-size: clamp(12px, 1.5vw, 16px);
            letter-spacing: 0.4em;
            color: #888;
            font-weight: 400;
            margin-top: 16px;
            text-transform: uppercase;
        }

        .menu-buttons {
            display: flex;
            flex-direction: column;
            gap: 12px;
            width: 100%;
            max-width: 420px;
            margin-top: 48px;
        }

        .menu-btn {
            position: relative;
            overflow: hidden;
            padding: 14px 24px;
            font-size: 16px;
            font-weight: 600;
            letter-spacing: 0.15em;
            text-align: left;
            border: 2px solid;
            border-radius: 16px;
            cursor: pointer;
            transition: all 0.3s ease;
            background: transparent;
            text-transform: uppercase;
        }

        .menu-btn.primary {
            border-color: #f97316;
            color: #fff;
            background: rgba(249, 115, 22, 0.15);
        }

        .menu-btn.primary:hover {
            border-color: #fb923c;
            background: rgba(249, 115, 22, 0.25);
            box-shadow: 0 0 20px rgba(249, 115, 22, 0.3);
            transform: translateX(4px);
        }

        .menu-btn.secondary {
            border-color: #52525b;
            color: #e4e4e7;
            background: rgba(82, 82, 89, 0.1);
        }

        .menu-btn.secondary:hover {
            border-color: #3b82f6;
            color: #fff;
            background: rgba(59, 130, 246, 0.1);
            box-shadow: 0 0 15px rgba(59, 130, 246, 0.2);
            transform: translateX(4px);
        }

        .menu-footer {
            position: absolute;
            bottom: 20px;
            left: 0;
            right: 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 30px;
            font-size: 11px;
            letter-spacing: 0.2em;
            color: #666;
            z-index: 10;
        }

        /* SHIP HUB */
        #shipHubContainer {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #0a0e1f;
            z-index: 100;
        }

        #shipHubCanvas {
            display: block;
            width: 100%;
            height: 100%;
            cursor: crosshair;
        }

        /* SHIP HUB UI */
        .ship-ui-layer {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 101;
        }

        .ship-header {
            position: fixed;
            top: 20px;
            left: 20px;
            color: #00d4ff;
            font-size: 18px;
            font-weight: bold;
            pointer-events: auto;
            z-index: 102;
            text-shadow: 0 0 10px rgba(0, 212, 255, 0.3);
        }

        .ship-hint {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            color: #888;
            font-size: 13px;
            text-align: center;
            pointer-events: auto;
            z-index: 102;
        }

        .ship-hint-highlight {
            color: #00d4ff;
            font-weight: bold;
        }

        .ship-exit-btn {
            position: fixed;
            top: 20px;
            right: 20px;
            background: #f97316;
            color: white;
            padding: 10px 20px;
            border: none;
            cursor: pointer;
            border-radius: 5px;
            font-weight: bold;
            pointer-events: auto;
            z-index: 103;
            transition: all 0.2s;
        }

        .ship-exit-btn:hover {
            background: #fb923c;
            box-shadow: 0 0 15px rgba(249, 115, 22, 0.4);
        }

        /* INTERACTION MODAL */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            z-index: 104;
            pointer-events: auto;
        }

        .modal-overlay.show {
            display: block;
        }

        .interaction-modal {
            display: none;
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(10, 14, 39, 0.98);
            border: 2px solid #00d4ff;
            border-radius: 10px;
            padding: 0;
            min-width: 500px;
            max-height: 80vh;
            z-index: 105;
            box-shadow: 0 0 40px rgba(0, 212, 255, 0.2);
            pointer-events: auto;
            flex-direction: column;
            overflow: hidden;
        }

        .interaction-modal.show {
            display: flex;
        }

        .interaction-modal-header {
            color: #00d4ff;
            font-size: 28px;
            font-weight: bold;
            border-bottom: 2px solid #00d4ff;
            padding: 20px 40px 15px 40px;
            text-shadow: 0 0 10px rgba(0, 212, 255, 0.3);
            flex-shrink: 0;
            background: rgba(10, 14, 39, 0.98);
        }

        .interaction-modal-content {
            color: #aaa;
            font-size: 14px;
            line-height: 1.6;
            padding: 20px 40px 40px 40px;
            flex: 1;
            overflow-y: auto;
            overflow-x: hidden;
            min-height: 0;
        }
        
        #modalContent {
            position: relative;
            flex: 1;
            overflow-y: auto;
            overflow-x: hidden;
            display: flex;
            flex-direction: column;
        }

        .close-modal-btn {
            position: absolute;
            top: 8px;
            right: 8px;
            background: #ff4444;
            color: white;
            border: none;
            width: 32px;
            height: 32px;
            cursor: pointer;
            border-radius: 3px;
            font-size: 20px;
            pointer-events: auto;
            z-index: 110;
        }

        .close-modal-btn:hover {
            background: #ff6666;
        }

        /* PLANET SELECTION */
        .planet-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-top: 20px;
        }

        .planet-card {
            background: #1a1f3a;
            border: 2px solid #444;
            padding: 20px;
            border-radius: 5px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .planet-card:hover {
            border-color: #00d4ff;
            background: #2a2f4a;
            box-shadow: 0 0 15px rgba(0, 212, 255, 0.2);
        }

        .planet-name {
            color: #00d4ff;
            font-weight: bold;
            font-size: 18px;
            margin-bottom: 10px;
        }

        .planet-info {
            font-size: 12px;
            color: #aaa;
            margin: 5px 0;
        }

        .difficulty {
            font-weight: bold;
            margin: 10px 0;
        }

        .difficulty.easy { color: #00ff88; }
        .difficulty.medium { color: #ffaa00; }
        .difficulty.hard { color: #ff4444; }

        .planet-btn {
            background: #f97316;
            color: #0a0e27;
            padding: 10px 16px;
            margin-top: 12px;
            border: none;
            cursor: pointer;
            font-weight: bold;
            border-radius: 5px;
            width: 100%;
            transition: all 0.2s ease;
            font-size: 14px;
            letter-spacing: 0.1em;
        }

        .planet-btn:hover {
            background: #fb923c;
            box-shadow: 0 0 15px rgba(249, 115, 22, 0.4);
            transform: translateY(-2px);
        }

        /* ARTIFACT PREVIEW CARD */
        .artifact-preview-card {
            background: rgba(20, 20, 50, 0.95);
            border: 2px solid #bb00ff;
            border-radius: 10px;
            padding: 25px;
            margin-bottom: 20px;
            box-shadow: 0 0 30px rgba(187, 0, 255, 0.2);
        }

        .artifact-preview-header {
            font-size: 24px;
            color: #bb00ff;
            font-weight: bold;
            margin-bottom: 15px;
            border-bottom: 2px solid #bb00ff;
            padding-bottom: 10px;
        }

        .artifact-rarity-badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 12px;
            font-size: 11px;
            font-weight: bold;
            letter-spacing: 0.1em;
            margin-bottom: 12px;
        }

        .artifact-type-badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 12px;
            font-size: 11px;
            font-weight: bold;
            margin-left: 8px;
        }

        .artifact-benefit {
            background: rgba(0, 255, 136, 0.1);
            border-left: 4px solid #00ff88;
            padding: 12px;
            border-radius: 5px;
            margin-bottom: 12px;
        }

        .artifact-benefit-label {
            color: #00ff88;
            font-weight: bold;
            font-size: 12px;
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 0.1em;
        }

        .artifact-benefit-text {
            color: #00ff88;
            font-size: 14px;
            font-weight: bold;
        }

        .artifact-penalty {
            background: rgba(255, 68, 68, 0.1);
            border-left: 4px solid #ff4444;
            padding: 12px;
            border-radius: 5px;
            margin-bottom: 12px;
        }

        .artifact-penalty-label {
            color: #ff4444;
            font-weight: bold;
            font-size: 12px;
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 0.1em;
        }

        .artifact-penalty-text {
            color: #ff4444;
            font-size: 14px;
            font-weight: bold;
        }

        .artifact-lore {
            background: rgba(100, 100, 100, 0.15);
            padding: 12px;
            border-radius: 5px;
            color: #aaa;
            font-size: 12px;
            font-style: italic;
            margin-bottom: 15px;
        }

        .artifact-action-buttons {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }

        .artifact-accept-btn {
            background: #00ff88;
            color: #000;
            padding: 10px;
            border: none;
            border-radius: 5px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s;
        }

        .artifact-accept-btn:hover {
            background: #00dd77;
            box-shadow: 0 0 15px rgba(0, 255, 136, 0.4);
        }

        .artifact-reject-btn {
            background: #444;
            color: #aaa;
            padding: 10px;
            border: 1px solid #666;
            border-radius: 5px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s;
        }

        .artifact-reject-btn:hover {
            background: #555;
            color: #fff;
            border-color: #888;
        }

        /* MISSION SELECTION STYLES */
        .mission-option-container {
            background: rgba(30, 30, 60, 0.8);
            border: 2px solid #00d4ff;
            border-radius: 8px;
            padding: 15px;
            margin-bottom: 15px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .mission-option-container:hover {
            background: rgba(40, 40, 80, 0.8);
            border-color: #00ff88;
            box-shadow: 0 0 20px rgba(0, 255, 136, 0.2);
        }

        .mission-option-container.artifact-hunt {
            border-color: #ff8800;
        }

        .mission-option-container.artifact-hunt:hover {
            border-color: #ffaa00;
            box-shadow: 0 0 20px rgba(255, 170, 0, 0.2);
        }

        .mission-option-title {
            font-size: 16px;
            font-weight: bold;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .mission-option-desc {
            font-size: 12px;
            color: #aaa;
            margin-bottom: 10px;
            line-height: 1.4;
        }

        .mission-option-details {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            font-size: 12px;
            margin-bottom: 12px;
        }

        .mission-detail-item {
            background: rgba(255, 255, 255, 0.05);
            padding: 8px;
            border-radius: 4px;
        }

        .mission-detail-label {
            color: #888;
            font-size: 10px;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            margin-bottom: 4px;
        }

        .mission-detail-value {
            color: #fff;
            font-weight: bold;
        }

        /* ARMORY TABBED INTERFACE */
        .armory-full-screen {
            display: none; /* Fullscreen mode disabled */
        }

        .armory-main-layout {
            display: grid;
            grid-template-columns: 140px 1fr 200px;
            gap: 0;
            width: 100%;
            height: auto;
            max-height: 60vh;
            border-bottom: 2px solid #00d4ff;
        }

        /* LEFT PANEL: TAB NAVIGATION */
        .armory-nav-panel {
            background: rgba(26, 31, 58, 0.85);
            border-right: 1px solid rgba(0, 212, 255, 0.2);
            padding: 12px 0;
            display: flex;
            flex-direction: column;
            gap: 4px;
            overflow-y: auto;
            max-height: 60vh;
        }

        .armory-nav-btn {
            background: transparent;
            border: none;
            color: #888;
            padding: 10px 12px;
            cursor: pointer;
            text-align: left;
            font-size: 10px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            transition: all 0.2s;
            border-left: 3px solid transparent;
            margin: 0 4px;
            border-radius: 0 3px 3px 0;
        }

        .armory-nav-btn:hover {
            background: rgba(0, 212, 255, 0.1);
            color: #00d4ff;
        }

        .armory-nav-btn.active {
            background: rgba(0, 212, 255, 0.15);
            color: #00d4ff;
            border-left-color: #00d4ff;
            box-shadow: inset 0 0 20px rgba(0, 212, 255, 0.1);
        }

        /* CENTER PANEL: CONTENT */
        .armory-content-panel {
            background: #0a0e1f;
            overflow-y: auto;
            padding: 12px;
            display: flex;
            flex-direction: column;
            max-height: 60vh;
        }

        .armory-tab-content {
            display: none;
        }

        .armory-tab-content.active {
            display: flex;
            flex-direction: column;
        }

        /* GRID LAYOUTS FOR ITEMS */
        .armory-item-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(100px, 1fr));
            gap: 8px;
            width: 100%;
        }

        .armory-item-card {
            background: rgba(30, 35, 70, 0.8);
            border: 2px solid #333;
            border-radius: 6px;
            padding: 12px;
            text-align: center;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 140px;
        }

        .armory-item-card:hover {
            border-color: #00d4ff;
            background: rgba(30, 35, 70, 1);
            box-shadow: 0 0 15px rgba(0, 212, 255, 0.2);
            transform: translateY(-2px);
        }

        .armory-item-card.selected {
            border-color: #00d4ff;
            background: rgba(0, 212, 255, 0.15);
            box-shadow: 0 0 20px rgba(0, 212, 255, 0.4);
        }

        .armory-item-icon {
            font-size: 48px;
            margin-bottom: 8px;
        }

        .armory-item-name {
            font-size: 12px;
            font-weight: 600;
            color: #e0e0e0;
            margin-bottom: 4px;
        }

        .armory-item-subtext {
            font-size: 10px;
            color: #888;
        }

        .armory-rarity-badge {
            display: inline-block;
            padding: 3px 8px;
            border-radius: 3px;
            font-size: 9px;
            font-weight: bold;
            text-transform: uppercase;
            margin-top: 6px;
            letter-spacing: 0.05em;
        }

        .rarity-common { background: rgba(200, 200, 200, 0.2); color: #ccc; border: 1px solid #888; }
        .rarity-rare { background: rgba(0, 212, 255, 0.2); color: #00d4ff; border: 1px solid #00d4ff; }
        .rarity-exotic { background: rgba(187, 0, 255, 0.2); color: #bb00ff; border: 1px solid #bb00ff; }

        /* ARMOR CARDS (LARGER) */
        .armory-armor-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
            gap: 10px;
            width: 100%;
        }

        .armory-armor-card {
            background: rgba(30, 35, 70, 0.8);
            border: 2px solid #333;
            border-radius: 8px;
            padding: 16px;
            cursor: pointer;
            transition: all 0.2s;
            text-align: center;
        }

        .armory-armor-card:hover {
            border-color: #ffaa00;
            background: rgba(30, 35, 70, 1);
            box-shadow: 0 0 15px rgba(255, 170, 0, 0.2);
            transform: translateY(-2px);
        }

        .armory-armor-card.selected {
            border-color: #ffaa00;
            background: rgba(255, 170, 0, 0.15);
            box-shadow: 0 0 20px rgba(255, 170, 0, 0.4);
        }

        .armory-armor-icon {
            font-size: 56px;
            margin-bottom: 12px;
        }

        .armory-armor-name {
            font-size: 14px;
            font-weight: 700;
            color: #e0e0e0;
            margin-bottom: 8px;
        }

        .armory-armor-stat {
            font-size: 11px;
            color: #aaa;
            margin: 4px 0;
        }

        /* RIGHT PANEL: DETAILS & STATS */
        .armory-details-panel {
            background: rgba(26, 31, 58, 0.85);
            border-left: 1px solid rgba(0, 212, 255, 0.2);
            padding: 12px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            max-height: 60vh;
            font-size: 11px;
        }

        .armory-detail-section {
            margin-bottom: 20px;
        }

        .armory-detail-title {
            color: #00d4ff;
            font-size: 11px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            margin-bottom: 10px;
            border-bottom: 1px solid rgba(0, 212, 255, 0.2);
            padding-bottom: 8px;
        }

        .armory-detail-name {
            color: #fff;
            font-size: 14px;
            font-weight: 700;
            margin-bottom: 8px;
        }

        .armory-detail-desc {
            font-size: 11px;
            color: #aaa;
            line-height: 1.4;
            margin-bottom: 12px;
        }

        .armory-stat-display {
            background: rgba(0, 0, 0, 0.3);
            padding: 10px;
            border-radius: 4px;
            margin-bottom: 8px;
        }

        .armory-stat-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
        }

        .armory-stat-label {
            color: #888;
            font-size: 10px;
            text-transform: uppercase;
            font-weight: 600;
            letter-spacing: 0.05em;
        }

        .armory-stat-bar {
            flex: 1;
            background: #333;
            height: 6px;
            border-radius: 2px;
            overflow: hidden;
            margin: 0 8px;
        }

        .armory-stat-fill {
            height: 100%;
            background: linear-gradient(90deg, #00d4ff, #00ff88);
            transition: width 0.3s;
        }

        .armory-stat-value {
            color: #00d4ff;
            font-size: 10px;
            font-weight: 600;
            min-width: 35px;
            text-align: right;
        }

        .armory-perk-box {
            background: rgba(187, 0, 255, 0.1);
            border-left: 3px solid #bb00ff;
            padding: 10px;
            border-radius: 4px;
            margin-bottom: 8px;
        }

        .armory-perk-icon {
            font-size: 18px;
            margin-bottom: 4px;
        }

        .armory-perk-name {
            color: #bb00ff;
            font-size: 11px;
            font-weight: 700;
            margin-bottom: 4px;
        }

        .armory-perk-desc {
            color: #aaa;
            font-size: 10px;
            line-height: 1.3;
        }

        /* ACTION BUTTONS IN DETAILS */
        .armory-action-buttons {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
            margin-top: 12px;
        }

        .armory-action-btn {
            background: rgba(0, 212, 255, 0.2);
            border: 1px solid #00d4ff;
            color: #00d4ff;
            padding: 8px 12px;
            border-radius: 4px;
            font-size: 10px;
            font-weight: 600;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            transition: all 0.2s;
        }

        .armory-action-btn:hover {
            background: rgba(0, 212, 255, 0.4);
            box-shadow: 0 0 10px rgba(0, 212, 255, 0.3);
        }

        /* BOTTOM BAR */
        .armory-bottom-bar {
            background: transparent;
            border-top: 2px solid #00d4ff;
            padding: 16px 0;
            display: grid;
            grid-template-columns: auto 1fr auto;
            gap: 20px;
            align-items: center;
            margin-top: 16px;
        }

        .armory-bottom-actions {
            display: flex;
            gap: 8px;
        }

        .armory-bottom-btn {
            background: rgba(0, 212, 255, 0.15);
            border: 1px solid #00d4ff;
            color: #00d4ff;
            padding: 8px 16px;
            border-radius: 4px;
            font-size: 11px;

        function addWeaponUpgrade(weaponKey, upgradeKey, weaponCategory) {
            if (!gameState.weaponUpgrades[weaponKey]) {
                gameState.weaponUpgrades[weaponKey] = [];
            }
            
            const upgrades = gameState.weaponUpgrades[weaponKey];
            if (upgrades.length >= 3) {
                alert('Maximum 3 upgrades per weapon!');
                return;
            }
            
            if (upgrades.includes(upgradeKey)) {
                alert('This upgrade is already installed!');
                return;
            }
            
            const upgrade = weaponUpgrades[upgradeKey];
            if (gameState.credits >= upgrade.cost) {
                gameState.credits -= upgrade.cost;
                upgrades.push(upgradeKey);
                showArmoryLoadoutUI();
                showNotification(`✓ ${upgrade.name} installed! (-${upgrade.cost} credits)`);
            } else {
                alert(`Insufficient credits! Need ${upgrade.cost}, have ${gameState.credits}`);
            }
        }
        
        function removeWeaponUpgrade(weaponKey, upgradeKey, weaponCategory) {
            if (!gameState.weaponUpgrades[weaponKey]) return;
            
            const upgrades = gameState.weaponUpgrades[weaponKey];
            const idx = upgrades.indexOf(upgradeKey);
            if (idx > -1) {
                upgrades.splice(idx, 1);
                showArmoryLoadoutUI();
                const upgrade = weaponUpgrades[upgradeKey];
                showNotification(`✓ ${upgrade.name} removed!`);

        function startGame() {
            document.getElementById('mainMenu').style.display = 'none';

        // Initialize ship hub
        let shipCanvas, shipCtx;
        function initShipHub() {
            shipCanvas = document.getElementById('shipHubCanvas');
            shipCtx = shipCanvas.getContext('2d');
            shipCanvas.width = window.innerWidth;
            shipCanvas.height = window.innerHeight;
            
            // Set up canvas coordinate system for isometric-like view
            shipCtx.imageSmoothingEnabled = true;
            
            renderShipHub();
        }

        // Render ship hub
        function renderShipHub() {
            // Clear canvas with dark background
            shipCtx.fillStyle = '#0a0e1f';
            shipCtx.fillRect(0, 0, shipCanvas.width, shipCanvas.height);

            // Draw subtle grid
            shipCtx.strokeStyle = 'rgba(0, 212, 255, 0.05)';
            shipCtx.lineWidth = 1;
            for (let x = 0; x < shipCanvas.width; x += 50) {
                shipCtx.beginPath();
                shipCtx.moveTo(x, 0);
                shipCtx.lineTo(x, shipCanvas.height);
                shipCtx.stroke();
            }
            for (let y = 0; y < shipCanvas.height; y += 50) {
                shipCtx.beginPath();
                shipCtx.moveTo(0, y);
                shipCtx.lineTo(shipCanvas.width, y);
                shipCtx.stroke();
            }

            // Draw all rooms
            Object.values(rooms).forEach(room => {
                drawRoom(room);
            });

            // Update player movement
            updatePlayerMovement();

            // Draw player
            drawPlayer();

            // Continue animation
            requestAnimationFrame(renderShipHub);
        }

        // Draw a room
        function drawRoom(room) {
            // Room background
            shipCtx.fillStyle = room.color;
            shipCtx.fillRect(room.x, room.y, room.width, room.height);

            // Room border
            shipCtx.strokeStyle = room.borderColor;
            shipCtx.lineWidth = 2;
            shipCtx.strokeRect(room.x, room.y, room.width, room.height);

            // Room glow effect
            shipCtx.shadowColor = room.borderColor;
            shipCtx.shadowBlur = 15;
            shipCtx.shadowOffsetX = 0;
            shipCtx.shadowOffsetY = 0;
            shipCtx.strokeStyle = room.borderColor;
            shipCtx.lineWidth = 1;
            shipCtx.globalAlpha = 0.3;
            shipCtx.strokeRect(room.x - 5, room.y - 5, room.width + 10, room.height + 10);
            shipCtx.globalAlpha = 1.0;
            shipCtx.shadowColor = 'transparent';

            // Room label
            shipCtx.fillStyle = room.borderColor;
            shipCtx.font = 'bold 14px Arial';
            shipCtx.textAlign = 'center';
            shipCtx.textBaseline = 'middle';
            shipCtx.fillText(room.name, room.x + room.width / 2, room.y + room.height / 2 - 15);
            
            shipCtx.font = '20px Arial';
            shipCtx.fillText(room.icon, room.x + room.width / 2, room.y + room.height / 2 + 15);
        }

        // Update player movement
        function updatePlayerMovement() {
            let newX = gameState.playerX;
            let newY = gameState.playerY;

            if (keys['w'] || keys['arrowup']) newY -= gameState.playerSpeed;
            if (keys['s'] || keys['arrowdown']) newY += gameState.playerSpeed;
            if (keys['a'] || keys['arrowleft']) newX -= gameState.playerSpeed;
            if (keys['d'] || keys['arrowright']) newX += gameState.playerSpeed;

            // Simple collision detection
            if (!checkCollision(newX, newY)) {
                gameState.playerX = newX;
                gameState.playerY = newY;
            }

            // Boundary check
            gameState.playerX = Math.max(gameState.playerSize, Math.min(shipCanvas.width - gameState.playerSize, gameState.playerX));
            gameState.playerY = Math.max(gameState.playerSize, Math.min(shipCanvas.height - gameState.playerSize, gameState.playerY));
        }

        // Check collision with rooms
        function checkCollision(x, y) {
            for (const room of Object.values(rooms)) {
                if (x > room.x && x < room.x + room.width &&
                    y > room.y && y < room.y + room.height) {
                    return false; // Can move into rooms
                }
            }
            return false; // Can move anywhere for now
        }

        // Draw player
        function drawPlayer() {
            // Player body
            shipCtx.fillStyle = '#ff6b00';
            shipCtx.beginPath();
            shipCtx.arc(gameState.playerX, gameState.playerY, gameState.playerSize, 0, Math.PI * 2);
            shipCtx.fill();

            // Player glow
            shipCtx.strokeStyle = '#ffaa00';
            shipCtx.lineWidth = 2;
            shipCtx.beginPath();
            shipCtx.arc(gameState.playerX, gameState.playerY, gameState.playerSize, 0, Math.PI * 2);
            shipCtx.stroke();

            // Player direction indicator
            shipCtx.fillStyle = '#ffaa00';
            shipCtx.fillRect(gameState.playerX - 2, gameState.playerY - gameState.playerSize - 5, 4, 5);
        }

        // Handle interaction
        function handleInteraction() {
            // Check which room player is in
            for (const [key, room] of Object.entries(rooms)) {
                if (isPlayerInRoom(room)) {
                    showRoomUI(key, room);
                    return;
                }
            }
        }

        // Check if player is in room
        function isPlayerInRoom(room) {
            return gameState.playerX > room.x &&
                   gameState.playerX < room.x + room.width &&
                   gameState.playerY > room.y &&
                   gameState.playerY < room.y + room.height;
        }

        // Get mission type color

        function getThreatColor(level) {
            if (level < 40) return '#44ff44';
            if (level < 60) return '#ffaa00';
            return '#ff4444';
        }

        // Generate random artifact with risk/reward
        function generateArtifact(isPositive = null) {
            // If not specified, randomly choose beneficial or dangerous
            if (isPositive === null) {
                isPositive = Math.random() > 0.4; // 60% beneficial, 40% dangerous
            }

            let spec, rarity;
            if (isPositive) {
                spec = beneficialArtifactSpecs[Math.floor(Math.random() * beneficialArtifactSpecs.length)];
                rarity = ['common', 'rare', 'exotic'][Math.floor(Math.random() * 3)];
            } else {
                spec = dangerousArtifactSpecs[Math.floor(Math.random() * dangerousArtifactSpecs.length)];
                rarity = ['rare', 'exotic'][Math.floor(Math.random() * 2)]; // Dangerous artifacts are rarer
            }
            
            const researchValue = rarity === 'exotic' ? 30 : rarity === 'rare' ? 15 : 5;
            const loreSnippets = {
                WeaponCore: ['Radiates harmonic energy patterns.', 'Faintly glows with unknown power.', 'Ancient alien weapon technology.'],
                ShieldMatrix: ['Shimmers with defensive potential.', 'Adapts to environmental forces.', 'Engineered by an advanced civilization.'],
                EnergyCell: ['Pulses with boundless energy.', 'Propels faster than physics allows.', 'Source of immense kinetic potential.'],
                DataCore: ['Contains vast computational archives.', 'Holds strategic enemy intelligence.', 'Biological patterns encoded within.']
            };
            const lore = loreSnippets[spec.type][Math.floor(Math.random() * loreSnippets[spec.type].length)];
            
            return {
                id: Date.now() + Math.random(),
                name: spec.name,
                type: spec.type,
                rarity: rarity,
                researchValue: researchValue,
                lore: lore,
                unlocksRarity: rarity === 'exotic' ? 'legendary' : rarity,
                isPositive: isPositive,
                benefit: spec.benefit,
                penalty: spec.penalty
            };
        }

        // Analyze artifact
        function analyzeArtifact(artifactId) {
            const artifact = gameState.artifacts.find(a => a.id === artifactId);
            if (!artifact) return;
            
            gameState.activeAnalysis = {
                artifact: artifact,
                startTime: Date.now(),
                duration: artifact.rarity === 'exotic' ? 10000 : artifact.rarity === 'rare' ? 6000 : 3000,
                progress: 0
            };
            
            showRoomUI('researchLab', rooms.researchLab);
        }

        // Complete artifact analysis
        function completeAnalysis() {
            if (!gameState.activeAnalysis) return;
            
            const artifact = gameState.activeAnalysis.artifact;
            const techId = artifactTypes[artifact.type].techUnlock;
            
            gameState.completedResearch.push(techId);
            gameState.organizationTrust += 10;
            gameState.activeAnalysis = null;
            
            // UNLOCK ALIEN GEAR BASED ON RESEARCH
            unlockAlienGearFromResearch(techId);
            
            showRoomUI('researchLab', rooms.researchLab);
            showNotification(`${artifact.name} analyzed! Tech unlocked: ${techSystem[techId].name}`);
        }
        
        // Unlock alien gear when research is completed
        function unlockAlienGearFromResearch(researchId) {
            // Map research IDs to alien gear
            const researchToGearMap = {
                'plasmaResearch': 'plasmaRifle',
                'energyCoreResearch': 'energyPistol',
                'shieldDisruptionResearch': 'disruptor',
                'adaptiveShieldResearch': 'adaptiveShield',
                'thermalTechResearch': 'thermalReg',
                'neuralInterfaceResearch': 'neuralSync',
                'energyBarrierResearch': 'shieldOverload',
                'plasmaControlResearch': 'plasmaBurst',
                'temporalTechResearch': 'temporalDistortion'
            };
            
            const gearKey = researchToGearMap[researchId];
            if (gearKey && !gameState.unlockedAlienGear.includes(gearKey)) {
                gameState.unlockedAlienGear.push(gearKey);
                
                // Find the gear name
                let gearName = '';
                if (alienGearDatabase.weapons[gearKey]) {
                    gearName = alienGearDatabase.weapons[gearKey].name;
                } else if (alienGearDatabase.armorUpgrades[gearKey]) {
                    gearName = alienGearDatabase.armorUpgrades[gearKey].name;
                } else if (alienGearDatabase.gadgets[gearKey]) {
                    gearName = alienGearDatabase.gadgets[gearKey].name;
                }
                
                showNotification(`🛰 ALIEN GEAR UNLOCKED: ${gearName}!`);
            }
        }

        // Apply tech to ship
        function applyTech(techId, target) {
            const tech = techSystem[techId];
            if (!gameState.completedResearch.includes(techId)) return;
            if (gameState.ship.appliedTechs.includes(techId)) {
                alert('This tech is already applied!');
                return;
            }
            
            gameState.ship.appliedTechs.push(techId);
            
            // Apply bonuses
            if (tech.bonus.weaponDamage) {
                gameState.ship.weaponLevel += Math.round(tech.bonus.weaponDamage / 10);
            }
            if (tech.bonus.shieldAbsorption) {
                gameState.ship.maxShield += tech.bonus.shieldAbsorption;
                gameState.ship.shield = gameState.ship.maxShield;
            }
            if (tech.bonus.engineSpeed) {
                gameState.ship.engineLevel += 1;
                gameState.playerSpeed += 0.5;
            }
            
            showRoomUI('engineering', rooms.engineering);
            showNotification(`Applied: ${tech.name} - bonuses active!`);
        }

        // Deploy to mission
        function deployToMission(idx, missionType = 'main') {
            const planet = planets[idx];
            const missionData = missionType === 'main' ? planet.mainMission : planet.artifactHunt;
            const enemySpecies = missionData.enemyType;
            const enemyCount = missionData.enemyCount;
            
            // TRACK ENEMY ENCOUNTERS
            if (gameState.encounterData[enemySpecies]) {
                gameState.encounterData[enemySpecies].encounters += enemyCount;
                
                // UPDATE TIER BASED ON ENCOUNTERS
                if (gameState.encounterData[enemySpecies].encounters >= 30) {
                    gameState.encounterData[enemySpecies].tier = 3;
                    gameState.encounterData[enemySpecies].studied = true;
                } else if (gameState.encounterData[enemySpecies].encounters >= 15) {
                    gameState.encounterData[enemySpecies].tier = 2;
                    gameState.encounterData[enemySpecies].studied = true;
                } else if (gameState.encounterData[enemySpecies].encounters >= 5) {
                    gameState.encounterData[enemySpecies].tier = 1;
                    gameState.encounterData[enemySpecies].studied = true;
                }
            }
            
            if (missionType === 'main') {
                // MAIN MISSION: Credits + occasional artifacts
                let baseCredits = Math.floor(Math.random() * (missionData.rewardMax - missionData.rewardMin + 1)) + missionData.rewardMin;
                let baseMaterials = Math.floor(Math.random() * 4) + 1;
                
                // Apply Advanced Analytics bonus if researched
                if (gameState.completedResearch.includes('advAnalytics')) {
                    baseCredits = Math.floor(baseCredits * 1.25);
                }
                
                const reward = {
                    credits: baseCredits,
                    materials: baseMaterials,
                    artifacts: []
                };
                
                // Generate 1-3 random artifacts
                const artifactCount = Math.floor(Math.random() * 3) + 1;
                for (let i = 0; i < artifactCount; i++) {
                    reward.artifacts.push(generateArtifact());
                }
                
                // Update game state
                gameState.lastMissionReward = reward;
                gameState.credits += reward.credits;
                gameState.materials += baseMaterials;
                gameState.artifacts.push(...reward.artifacts);
                gameState.organizationTrust = Math.min(100, gameState.organizationTrust + 5);
                
                closeInteractionModal();
                
                // Show mission complete screen with encounter data
                let artifactList = reward.artifacts.map(a => `• ${a.name} (${a.rarity})`).join('\n');
                let encounterMsg = `${enemyCount}x ${enemySpecies} defeated!\nTotal encounters: ${gameState.encounterData[enemySpecies].encounters}`;
                alert(`MISSION COMPLETE: ${planet.name}\n\nCOMBAT DATA:\n${encounterMsg}\n\nREWARDS EARNED:\n+${reward.credits} Credits\n+${reward.materials} Materials\n\nARTIFACTS RECOVERED:\n${artifactList}\n\nVisit Research Lab to analyze!`);
            } else {
                // ARTIFACT HUNT: No credits, 2-4 artifacts (mixed good/dangerous)
                const artifactCount = missionData.artifactRewards;
                const reward = {
                    credits: 0,
                    materials: 0,
                    artifacts: []
                };
                
                // Generate mix of beneficial and dangerous artifacts
                for (let i = 0; i < artifactCount; i++) {
                    // Higher chance of dangerous in artifact hunts
                    const isPositive = Math.random() > 0.6; // 40% beneficial, 60% dangerous
                    reward.artifacts.push(generateArtifact(isPositive));
                }
                
                // Update game state
                gameState.lastMissionReward = reward;
                gameState.artifacts.push(...reward.artifacts);
                gameState.organizationTrust = Math.min(100, gameState.organizationTrust + 3); // Less trust for risky hunts
                
                closeInteractionModal();
                
                // Show mission complete screen with artifact recovery details
                let artifactList = reward.artifacts.map(a => `• ${a.name} (${a.rarity}) ${a.isPositive ? '✓' : '⚠'}`).join('\n');
                let encounterMsg = `${enemyCount}x ${enemySpecies} encountered!\nTotal encounters: ${gameState.encounterData[enemySpecies].encounters}`;
                alert(`ARTIFACT HUNT COMPLETE: ${planet.name}\n\nCOMBAT DATA:\n${encounterMsg}\n\nARTIFACTS RECOVERED:\n${artifactList}\n\n⚠️ Some artifacts may have side effects!\nAnalyze in Research Lab to learn more.`);
            }
        }
