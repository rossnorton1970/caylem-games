<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Planetfall: Extraction</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        body { font-family: 'Arial', sans-serif; background: #000; color: #e0e0e0; }
        
        /* MAIN MENU */
        #mainMenu {
            position: relative;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background: #000;
            overflow: hidden;
        }

        .menu-bg-glow {
            position: absolute;
            inset: 0;
            background: radial-gradient(circle at top, rgba(59, 130, 246, 0.1), transparent 45%),
                        radial-gradient(circle at bottom, rgba(249, 115, 22, 0.1), transparent 45%);
            z-index: 1;
        }

        .menu-bg-planet {
            position: absolute;
            bottom: -200px;
            left: 50%;
            transform: translateX(-50%);
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, rgba(249, 115, 22, 0.15) 0%, transparent 70%);
            border-radius: 50%;
            filter: blur(80px);
            z-index: 1;
        }

        .menu-stars {
            position: absolute;
            inset: 0;
            z-index: 2;
        }

        .menu-star {
            position: absolute;
            background: white;
            border-radius: 50%;
            animation: twinkle 3s infinite;
        }

        .menu-star.near { opacity: 0.8; }
        .menu-star.mid { opacity: 0.5; }
        .menu-star.far { opacity: 0.2; }
        
        .menu-star.blue { background: rgba(59, 130, 246, 0.8); }
        .menu-star.yellow { background: rgba(234, 179, 8, 0.7); }

        @keyframes twinkle {
            0%, 100% { opacity: 0.3; }
            50% { opacity: 1; }
        }

        /* PLANETS */
        .menu-planets-container {
            position: absolute;
            inset: 0;
            z-index: 3;
            overflow: hidden;
        }

        .menu-planet-item {
            position: absolute;
            border-radius: 50%;
            filter: drop-shadow(0 0 40px rgba(255, 255, 255, 0.15));
        }

        .menu-planet-item canvas {
            display: block;
            width: 100%;
            height: 100%;
            border-radius: 50%;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0px) rotate(0deg); }
            50% { transform: translateY(-20px) rotate(10deg); }
        }

        .menu-planet-item {
            animation: float 8s ease-in-out infinite;
        }

        .menu-content {
            position: relative;
            z-index: 10;
            text-align: center;
            animation: fadeInDown 0.8s ease-out;
        }

        @keyframes fadeInDown {
            from {
                opacity: 0;
                transform: translateY(-30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .menu-logo {
            margin-bottom: 12px;
        }

        .menu-title {
            font-size: clamp(48px, 10vw, 96px);
            font-weight: 900;
            letter-spacing: 0.25em;
            color: #fff;
            margin: 0;
            text-shadow: 0 0 30px rgba(59, 130, 246, 0.3), 0 0 60px rgba(59, 130, 246, 0.1);
        }

        .menu-subtitle {
            font-size: clamp(18px, 3vw, 32px);
            letter-spacing: 0.5em;
            color: #3b82f6;
            font-weight: 300;
            margin: 8px 0 0 0;
            text-shadow: 0 0 20px rgba(59, 130, 246, 0.2);
        }

        .menu-tagline {
            font-size: clamp(12px, 1.5vw, 16px);
            letter-spacing: 0.4em;
            color: #888;
            font-weight: 400;
            margin-top: 16px;
            text-transform: uppercase;
        }

        .menu-buttons {
            display: flex;
            flex-direction: column;
            gap: 12px;
            width: 100%;
            max-width: 420px;
            margin-top: 48px;
        }

        .menu-btn {
            position: relative;
            overflow: hidden;
            padding: 14px 24px;
            font-size: 16px;
            font-weight: 600;
            letter-spacing: 0.15em;
            text-align: left;
            border: 2px solid;
            border-radius: 16px;
            cursor: pointer;
            transition: all 0.3s ease;
            background: transparent;
            text-transform: uppercase;
        }

        .menu-btn.primary {
            border-color: #f97316;
            color: #fff;
            background: rgba(249, 115, 22, 0.15);
        }

        .menu-btn.primary:hover {
            border-color: #fb923c;
            background: rgba(249, 115, 22, 0.25);
            box-shadow: 0 0 20px rgba(249, 115, 22, 0.3);
            transform: translateX(4px);
        }

        .menu-btn.secondary {
            border-color: #52525b;
            color: #e4e4e7;
            background: rgba(82, 82, 89, 0.1);
        }

        .menu-btn.secondary:hover {
            border-color: #3b82f6;
            color: #fff;
            background: rgba(59, 130, 246, 0.1);
            box-shadow: 0 0 15px rgba(59, 130, 246, 0.2);
            transform: translateX(4px);

        .menu-footer {
            position: absolute;
            bottom: 20px;
            left: 0;
            right: 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 30px;
            font-size: 11px;
            letter-spacing: 0.2em;
            color: #666;
            z-index: 10;
        }

        /* SHIP HUB */
        #shipHubContainer {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #0a0e1f;
            z-index: 100;
        }

        #shipHubCanvas {
            display: block;
            width: 100%;
            height: 100%;

        /* SHIP HUB UI */

        /* INTERACTION MODAL */

            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            z-index: 104;
            pointer-events: auto;
        }

        .modal-overlay.show {
            display: block;
        }

        .interaction-modal {
            display: none;
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(10, 14, 39, 0.98);
            border: 2px solid #00d4ff;
            border-radius: 10px;
            padding: 40px;
            min-width: 500px;
            max-height: 80vh;
            overflow-y: auto;
            z-index: 105;
            box-shadow: 0 0 40px rgba(0, 212, 255, 0.2);
            pointer-events: auto;
        }

        .interaction-modal.show {
            display: block;
        }

        .interaction-modal-header {
            color: #00d4ff;
            font-size: 28px;
            font-weight: bold;
            margin-bottom: 20px;
            border-bottom: 2px solid #00d4ff;
            padding-bottom: 15px;
            text-shadow: 0 0 10px rgba(0, 212, 255, 0.3);
        }

        .interaction-modal-content {
            color: #aaa;
            font-size: 14px;

        }

        .close-modal-btn {
            position: absolute;
            top: 15px;
            right: 15px;
            background: #ff4444;
            color: white;
            border: none;
            width: 40px;

            cursor: pointer;
            border-radius: 5px;
            font-size: 24px;

        /* PLANET SELECTION */
        .planet-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-top: 20px;
        }

        .planet-card {
            background: #1a1f3a;
            border: 2px solid #444;
            padding: 20px;
            border-radius: 5px;
            cursor: pointer;
            transition: all 0.3s;

        .planet-card:hover {
            border-color: #00d4ff;
            background: #2a2f4a;
            box-shadow: 0 0 15px rgba(0, 212, 255, 0.2);
        }

        .planet-name {
            color: #00d4ff;
            font-weight: bold;
            font-size: 18px;
            margin-bottom: 10px;
        }

        .planet-info {
            font-size: 12px;
            color: #aaa;
            margin: 5px 0;
        }

        .difficulty {
            font-weight: bold;
            margin: 10px 0;
        }

        .difficulty.easy { color: #00ff88; }
        .difficulty.medium { color: #ffaa00; }
        .difficulty.hard { color: #ff4444; }

        .planet-btn {
            background: #f97316;
            color: #0a0e27;
            padding: 10px 16px;
            margin-top: 12px;
            border: none;
            cursor: pointer;
            font-weight: bold;
            border-radius: 5px;
            width: 100%;
            transition: all 0.2s ease;
            font-size: 14px;
            letter-spacing: 0.1em;
        }

        .planet-btn:hover {
            background: #fb923c;
            box-shadow: 0 0 15px rgba(249, 115, 22, 0.4);
            transform: translateY(-2px);
        }
    </style>
</head>

        // Key tracking
        const keys = {};
        let lastInteractionTime = 0;

        window.addEventListener('keydown', (e) => {
            keys[e.key.toLowerCase()] = true;
            if (e.key.toLowerCase() === 'e') {
                if (Date.now() - lastInteractionTime > 200) {

                }

        // Initialize starfield with depth layers
        function initStarfield() {
            const starsContainer = document.getElementById('starsContainer');
            
            // Create 250+ stars with depth variation
            for (let i = 0; i < 250; i++) {
                const star = document.createElement('div');
                star.className = 'menu-star';
                
                // Depth layers
                const depth = Math.random();
                if (depth < 0.4) {
                    star.classList.add('far');
                } else if (depth < 0.7) {
                    star.classList.add('mid');
                } else {
                    star.classList.add('near');
                }
                
                // Color variation
                const color = Math.random();
                if (color < 0.3) {
                    star.classList.add('blue');
                } else if (color < 0.5) {
                    star.classList.add('yellow');
                }
                
                // Size varies with depth
                const sizeMultiplier = 0.5 + depth;
                const size = Math.random() * 2.5 * sizeMultiplier;
                star.style.width = size + 'px';
                star.style.height = size + 'px';
                
                star.style.left = Math.random() * 100 + '%';
                star.style.top = Math.random() * 100 + '%';
                star.style.animationDelay = Math.random() * 3 + 's';
                starsContainer.appendChild(star);
            }
            
            // Initialize planets
            initPlanets();
        }
        
        // Simple Perlin-like noise function for realistic surfaces
        function noise(x, y, seed = 0) {
            const n = Math.sin(x * 12.9898 + y * 78.233 + seed) * 43758.5453;
            return n - Math.floor(n);
        }
        
        function perlinNoise(x, y, scale = 10, seed = 0) {
            const xi = Math.floor(x / scale);
            const yi = Math.floor(y / scale);
            const xf = (x / scale) - xi;
            const yf = (y / scale) - yi;
            
            // Smoothstep interpolation
            const u = xf * xf * (3.0 - 2.0 * xf);
            const v = yf * yf * (3.0 - 2.0 * yf);
            
            const n00 = noise(xi, yi, seed);
            const n10 = noise(xi + 1, yi, seed);
            const n01 = noise(xi, yi + 1, seed);
            const n11 = noise(xi + 1, yi + 1, seed);
            
            const nx0 = n00 * (1.0 - u) + n10 * u;
            const nx1 = n01 * (1.0 - u) + n11 * u;
            return nx0 * (1.0 - v) + nx1 * v;
        }
        
        function fractalNoise(x, y, octaves = 4, persistence = 0.5, scale = 20, seed = 0) {
            let value = 0;
            let amplitude = 1;
            let frequency = 1;
            let maxValue = 0;
            
            for (let i = 0; i < octaves; i++) {
                value += perlinNoise(x * frequency, y * frequency, scale, seed + i) * amplitude;
                maxValue += amplitude;
                amplitude *= persistence;
                frequency *= 2;
            }
            
            return value / maxValue;
        }
        
        // Draw realistic planets with Canvas
        function drawPlanet(canvas, type) {
            const ctx = canvas.getContext('2d');
            const size = canvas.width;
            const radius = size / 2;
            
            ctx.clearRect(0, 0, size, size);
            
            if (type === 1) {
                // Lava planet
                drawLavaPlanet(ctx, radius, size);
            } else if (type === 2) {
                // Ice planet
                drawIcePlanet(ctx, radius, size);
            } else if (type === 3) {
                // Forest planet (Earth-like)
                drawForestPlanet(ctx, radius, size);
            } else if (type === 4) {
                // Gas giant (Jupiter)
                drawGasGiant(ctx, radius, size);
            } else if (type === 5) {
                // Ringed planet (Saturn)
                drawRingedPlanet(ctx, radius, size);
            }
        }
        
        function drawLavaPlanet(ctx, radius, size) {
            const x = size / 2, y = size / 2;
            const imageData = ctx.createImageData(size, size);
            const data = imageData.data;
            
            // Create detailed lava surface with noise
            for (let py = 0; py < size; py++) {
                for (let px = 0; px < size; px++) {
                    const dx = px - x;
                    const dy = py - y;
                    const dist = Math.sqrt(dx * dx + dy * dy);
                    
                    if (dist <= radius) {
                        // 3D sphere effect
                        const z = Math.sqrt(radius * radius - dist * dist);
                        const normal = z / radius;
                        const angle = Math.atan2(dy, dx);
                        
                        // Multi-octave noise for lava surface
                        const n1 = fractalNoise(px / 5, py / 5, 4, 0.6, 20, 0);
                        const n2 = fractalNoise(px / 10, py / 10, 3, 0.5, 15, 100);
                        const heat = n1 * 0.7 + n2 * 0.3;
                        
                        // Lava color based on height/temperature
                        let r, g, b;
                        if (heat > 0.7) {
                            // Bright lava
                            r = Math.floor(255);
                            g = Math.floor(200 + heat * 55);
                            b = Math.floor(50);
                        } else if (heat > 0.4) {
                            // Medium lava
                            r = Math.floor(255 - (0.7 - heat) * 100);
                            g = Math.floor(100);
                            b = Math.floor(30);
                        } else {
                            // Cooled lava
                            r = Math.floor(150 - heat * 50);
                            g = Math.floor(50);
                            b = Math.floor(20);
                        }
                        
                        // Lighting from top-left
                        const light = Math.max(0.4, (normal * 0.7 + 0.3) * (0.6 + Math.sin(angle) * 0.2));
                        r = Math.floor(r * light);
                        g = Math.floor(g * light);
                        b = Math.floor(b * light);
                        
                        const idx = (py * size + px) * 4;
                        data[idx] = r;
                        data[idx + 1] = g;
                        data[idx + 2] = b;
                        data[idx + 3] = 255;
                    }
                }
            }
            
            ctx.putImageData(imageData, 0, 0);
            
            // Atmospheric glow
            const atmo = ctx.createRadialGradient(x, y, radius * 0.95, x, y, radius * 1.25);
            atmo.addColorStop(0, 'rgba(255, 120, 0, 0.3)');
            atmo.addColorStop(1, 'rgba(255, 60, 0, 0)');
            ctx.fillStyle = atmo;
            ctx.fillRect(0, 0, size, size);
        }
        
        function drawIcePlanet(ctx, radius, size) {
            const x = size / 2, y = size / 2;
            const imageData = ctx.createImageData(size, size);
            const data = imageData.data;
            
            for (let py = 0; py < size; py++) {
                for (let px = 0; px < size; px++) {
                    const dx = px - x;
                    const dy = py - y;
                    const dist = Math.sqrt(dx * dx + dy * dy);
                    
                    if (dist <= radius) {
                        const z = Math.sqrt(radius * radius - dist * dist);
                        const normal = z / radius;
                        const angle = Math.atan2(dy, dx);
                        const latitude = Math.acos(Math.sqrt(1 - (dist / radius) ** 2));
                        
                        // Multi-octave noise for ice/water
                        const n1 = fractalNoise(px / 8, py / 8, 4, 0.65, 25, 200);
                        const n2 = fractalNoise(px / 20, py / 20, 3, 0.5, 40, 300);
                        const detail = n1 * 0.6 + n2 * 0.4;
                        
                        // Ice caps and water
                        let r, g, b;
                        if (Math.abs(latitude - Math.PI / 2) < 0.4) {
                            // Ice caps
                            const ice = 0.8 + detail * 0.2;
                            r = Math.floor(240 * ice);
                            g = Math.floor(248 * ice);
                            b = Math.floor(255 * ice);
                        } else if (detail > 0.6) {
                            // Water
                            r = Math.floor(20 + detail * 40);
                            g = Math.floor(120 + detail * 60);
                            b = Math.floor(200 + detail * 40);
                        } else {
                            // Ice patches on ocean
                            r = Math.floor(180 + detail * 40);
                            g = Math.floor(220 + detail * 30);
                            b = Math.floor(240);
                        }
                        
                        // Realistic lighting
                        const light = Math.max(0.3, normal * 0.8 + 0.2) * (0.7 + Math.cos(angle) * 0.2);
                        r = Math.floor(r * light);
                        g = Math.floor(g * light);
                        b = Math.floor(b * light);
                        
                        const idx = (py * size + px) * 4;
                        data[idx] = r;
                        data[idx + 1] = g;
                        data[idx + 2] = b;
                        data[idx + 3] = 255;
                    }
                }
            }
            
            ctx.putImageData(imageData, 0, 0);
            
            // Atmospheric haze
            const atmo = ctx.createRadialGradient(x, y, radius * 0.9, x, y, radius * 1.3);
            atmo.addColorStop(0, 'rgba(200, 230, 255, 0.2)');
            atmo.addColorStop(1, 'rgba(100, 180, 255, 0)');
            ctx.fillStyle = atmo;
            ctx.fillRect(0, 0, size, size);
        }
        
        function drawForestPlanet(ctx, radius, size) {
            const x = size / 2, y = size / 2;
            const imageData = ctx.createImageData(size, size);
            const data = imageData.data;
            
            // Create Earth-like planet
            for (let py = 0; py < size; py++) {
                for (let px = 0; px < size; px++) {
                    const dx = px - x;
                    const dy = py - y;
                    const dist = Math.sqrt(dx * dx + dy * dy);
                    
                    if (dist <= radius) {
                        const z = Math.sqrt(radius * radius - dist * dist);
                        const normal = z / radius;
                        const angle = Math.atan2(dy, dx);
                        const latRatio = dist / radius;
                        
                        // Complex terrain generation
                        const terrain = fractalNoise(px / 10, py / 10, 5, 0.7, 30, 400);
                        const clouds = fractalNoise(px / 15, py / 15, 4, 0.6, 25, 500);
                        
                        let r, g, b;
                        
                        if (terrain < 0.35) {
                            // Deep ocean
                            r = 10; g = 40; b = 80;
                        } else if (terrain < 0.45) {
                            // Shallow ocean
                            r = 20; g = 80; b = 120;
                        } else if (terrain < 0.50) {
                            // Beach/sand
                            r = 200; g = 180; b = 80;
                        } else if (terrain < 0.70) {
                            // Forest
                            r = 20 + terrain * 60; g = 100 + terrain * 80; b = 20;
                        } else {
                            // Mountains
                            r = 120 + terrain * 80; g = 100 + terrain * 60; b = 80 + terrain * 40;
                        }
                        
                        // Cloud coverage
                        if (clouds > 0.7) {
                            const cloudBlend = (clouds - 0.7) * 3.33;
                            r = Math.floor(r * (1 - cloudBlend * 0.4) + 240 * cloudBlend * 0.5);
                            g = Math.floor(g * (1 - cloudBlend * 0.4) + 245 * cloudBlend * 0.5);
                            b = Math.floor(b * (1 - cloudBlend * 0.4) + 250 * cloudBlend * 0.5);
                        }
                        
                        // Realistic lighting - sun from top-left
                        const light = Math.max(0.35, normal * 0.65 + 0.35) * (0.8 + Math.cos(angle) * 0.15);
                        r = Math.floor(r * light);
                        g = Math.floor(g * light);
                        b = Math.floor(b * light);
                        
                        const idx = (py * size + px) * 4;
                        data[idx] = r;
                        data[idx + 1] = g;
                        data[idx + 2] = b;
                        data[idx + 3] = 255;
                    }
                }
            }
            
            ctx.putImageData(imageData, 0, 0);
            
            // Atmospheric scattering
            const atmo = ctx.createRadialGradient(x, y, radius * 0.85, x, y, radius * 1.35);
            atmo.addColorStop(0, 'rgba(135, 206, 235, 0.25)');
            atmo.addColorStop(0.5, 'rgba(100, 150, 200, 0.1)');
            atmo.addColorStop(1, 'rgba(50, 100, 150, 0)');
            ctx.fillStyle = atmo;
            ctx.fillRect(0, 0, size, size);
        }
        
        function drawGasGiant(ctx, radius, size) {
            const x = size / 2, y = size / 2;
            const imageData = ctx.createImageData(size, size);
            const data = imageData.data;
            
            for (let py = 0; py < size; py++) {
                for (let px = 0; px < size; px++) {
                    const dx = px - x;
                    const dy = py - y;
                    const dist = Math.sqrt(dx * dx + dy * dy);
                    
                    if (dist <= radius) {
                        const z = Math.sqrt(radius * radius - dist * dist);
                        const normal = z / radius;
                        const yRatio = (py - y) / radius;
                        
                        // Atmospheric bands
                        const bandPattern = Math.sin(yRatio * Math.PI * 4) * 0.5 + 0.5;
                        const cloudNoise = fractalNoise(px / 12, py / 6, 4, 0.65, 20, 600);
                        const stormNoise = fractalNoise(px / 20, py / 25, 3, 0.55, 30, 700);
                        
                        let r, g, b;
                        
                        // Base color with band variation
                        if (bandPattern > 0.7) {
                            // Light bands
                            r = Math.floor(200 + cloudNoise * 30);
                            g = Math.floor(180 + cloudNoise * 30);
                            b = Math.floor(220 + cloudNoise * 20);
                        } else if (bandPattern > 0.4) {
                            // Medium bands
                            r = Math.floor(140 + cloudNoise * 40);
                            g = Math.floor(100 + cloudNoise * 50);
                            b = Math.floor(180 + cloudNoise * 30);
                        } else {
                            // Dark bands
                            r = Math.floor(80 + cloudNoise * 50);
                            g = Math.floor(50 + cloudNoise * 40);
                            b = Math.floor(140 + cloudNoise * 40);
                        }
                        
                        // Great Red Spot
                        const spotDist = Math.sqrt((px - (x + 150)) ** 2 + (py - (y + 100)) ** 2);
                        if (spotDist < 80) {
                            const spotIntensity = Math.max(0, 1 - spotDist / 80);
                            r = Math.floor(r * 0.6 + 200 * spotIntensity);
                            g = Math.floor(g * 0.6 + 80 * spotIntensity);
                            b = Math.floor(b * 0.6 + 50 * spotIntensity);
                        }
                        
                        // Lighting
                        const light = Math.max(0.3, normal * 0.7 + 0.3);
                        r = Math.floor(r * light);
                        g = Math.floor(g * light);
                        b = Math.floor(b * light);
                        
                        const idx = (py * size + px) * 4;
                        data[idx] = r;
                        data[idx + 1] = g;
                        data[idx + 2] = b;
                        data[idx + 3] = 255;
                    }
                }
            }
            
            ctx.putImageData(imageData, 0, 0);
            
            // Atmospheric glow
            const atmo = ctx.createRadialGradient(x, y, radius, x, y, radius * 1.3);
            atmo.addColorStop(0, 'rgba(200, 180, 230, 0.2)');
            atmo.addColorStop(1, 'rgba(100, 80, 180, 0)');
            ctx.fillStyle = atmo;
            ctx.fillRect(0, 0, size, size);
        }
        
        function drawRingedPlanet(ctx, radius, size) {
            const x = size / 2, y = size / 2;
            const imageData = ctx.createImageData(size, size);
            const data = imageData.data;
            
            // Draw planet surface with clouds
            for (let py = 0; py < size; py++) {
                for (let px = 0; px < size; px++) {
                    const dx = px - x;
                    const dy = py - y;
                    const dist = Math.sqrt(dx * dx + dy * dy);
                    
                    if (dist <= radius) {
                        const z = Math.sqrt(radius * radius - dist * dist);
                        const normal = z / radius;
                        
                        // Layered clouds
                        const cloudBase = fractalNoise(px / 10, py / 12, 4, 0.65, 25, 800);
                        const cloudDetail = fractalNoise(px / 5, py / 5, 3, 0.5, 15, 850);
                        const cloudCoverage = cloudBase * 0.7 + cloudDetail * 0.3;
                        
                        let r, g, b;
                        
                        if (cloudCoverage > 0.7) {
                            // Bright clouds
                            r = Math.floor(240 - cloudCoverage * 40);
                            g = Math.floor(200 - cloudCoverage * 30);
                            b = Math.floor(220 - cloudCoverage * 20);
                        } else if (cloudCoverage > 0.4) {
                            // Medium clouds
                            r = Math.floor(220 + cloudCoverage * 15);
                            g = Math.floor(160 + cloudCoverage * 20);
                            b = Math.floor(200);
                        } else {
                            // Clear atmosphere
                            r = Math.floor(180 + (1 - cloudCoverage) * 40);
                            g = Math.floor(120 + (1 - cloudCoverage) * 50);
                            b = Math.floor(200);
                        }
                        
                        // Realistic lighting - sun from upper left
                        const light = Math.max(0.35, normal * 0.65 + 0.35);
                        r = Math.floor(r * light);
                        g = Math.floor(g * light);
                        b = Math.floor(b * light);
                        
                        const idx = (py * size + px) * 4;
                        data[idx] = r;
                        data[idx + 1] = g;
                        data[idx + 2] = b;
                        data[idx + 3] = 255;
                    }
                }
            }
            
            ctx.putImageData(imageData, 0, 0);
            
            // Draw detailed rings (behind planet)
            ctx.save();
            ctx.translate(x, y);
            ctx.rotate(Math.PI / 5);
            
            // Ring bands with shadows
            for (let ringSize = radius * 1.6; ringSize > radius * 0.9; ringSize -= 15) {
                const opacity = Math.max(0.1, (ringSize - radius * 0.9) / (radius * 0.7)) * 0.5;
                ctx.strokeStyle = `rgba(220, 150, 200, ${opacity})`;
                ctx.lineWidth = 8;
                ctx.beginPath();
                ctx.ellipse(0, 0, ringSize, ringSize * 0.3, 0, 0, Math.PI);
                ctx.stroke();
            }
            
            ctx.restore();
            
            // Atmospheric glow
            const atmo = ctx.createRadialGradient(x, y, radius * 0.9, x, y, radius * 1.25);
            atmo.addColorStop(0, 'rgba(220, 150, 180, 0.2)');
            atmo.addColorStop(1, 'rgba(150, 100, 150, 0)');
            ctx.fillStyle = atmo;
            ctx.fillRect(0, 0, size, size);
        }

        function initPlanets() {

            planetData.forEach((data, idx) => {

                planetDiv.className = 'menu-planet-item';
                planetDiv.style.width = data.size + 'px';

            });
            
            // Add parallax effect on mouse move
            document.addEventListener('mousemove', (e) => {
                const planets = document.querySelectorAll('.menu-planet-item');
                const x = (e.clientX / window.innerWidth) - 0.5;
                const y = (e.clientY / window.innerHeight) - 0.5;
                
                planets.forEach((planet, index) => {
                    const depth = (index + 1) * 5;
                    const offsetX = x * depth;
                    const offsetY = y * depth;
                    planet.style.transform = `translate(${offsetX}px, ${offsetY}px) rotate(${(index + 1) * 5}deg)`;
                });
            });
        }

        function startGame() {

        // Initialize ship hub
        let shipCanvas, shipCtx;
        function initShipHub() {
            shipCanvas = document.getElementById('shipHubCanvas');
            shipCtx = shipCanvas.getContext('2d');
            shipCanvas.width = window.innerWidth;
            shipCanvas.height = window.innerHeight;
            
            // Set up canvas coordinate system for isometric-like view
            shipCtx.imageSmoothingEnabled = true;
            
            renderShipHub();
        }

        // Render ship hub
        function renderShipHub() {
            // Clear canvas with dark background
            shipCtx.fillStyle = '#0a0e1f';
            shipCtx.fillRect(0, 0, shipCanvas.width, shipCanvas.height);

            // Draw subtle grid
            shipCtx.strokeStyle = 'rgba(0, 212, 255, 0.05)';
            shipCtx.lineWidth = 1;
            for (let x = 0; x < shipCanvas.width; x += 50) {
                shipCtx.beginPath();
                shipCtx.moveTo(x, 0);
                shipCtx.lineTo(x, shipCanvas.height);
                shipCtx.stroke();
            }
            for (let y = 0; y < shipCanvas.height; y += 50) {
                shipCtx.beginPath();
                shipCtx.moveTo(0, y);
                shipCtx.lineTo(shipCanvas.width, y);
                shipCtx.stroke();
            }

            // Draw all rooms
            Object.values(rooms).forEach(room => {
                drawRoom(room);
            });

            // Update player movement
            updatePlayerMovement();

            // Draw player
            drawPlayer();

            // Continue animation
            requestAnimationFrame(renderShipHub);
        }

        // Draw a room
        function drawRoom(room) {
            // Room background
            shipCtx.fillStyle = room.color;
            shipCtx.fillRect(room.x, room.y, room.width, room.height);

            // Room border
            shipCtx.strokeStyle = room.borderColor;
            shipCtx.lineWidth = 2;
            shipCtx.strokeRect(room.x, room.y, room.width, room.height);

            // Room glow effect
            shipCtx.shadowColor = room.borderColor;
            shipCtx.shadowBlur = 15;
            shipCtx.shadowOffsetX = 0;
            shipCtx.shadowOffsetY = 0;
            shipCtx.strokeStyle = room.borderColor;
            shipCtx.lineWidth = 1;
            shipCtx.globalAlpha = 0.3;
            shipCtx.strokeRect(room.x - 5, room.y - 5, room.width + 10, room.height + 10);
            shipCtx.globalAlpha = 1.0;
            shipCtx.shadowColor = 'transparent';

            // Room label
            shipCtx.fillStyle = room.borderColor;
            shipCtx.font = 'bold 14px Arial';
            shipCtx.textAlign = 'center';
            shipCtx.textBaseline = 'middle';
            shipCtx.fillText(room.name, room.x + room.width / 2, room.y + room.height / 2 - 15);
            
            shipCtx.font = '20px Arial';
            shipCtx.fillText(room.icon, room.x + room.width / 2, room.y + room.height / 2 + 15);
        }

        // Update player movement
        function updatePlayerMovement() {
            let newX = gameState.playerX;
            let newY = gameState.playerY;

            if (keys['w'] || keys['arrowup']) newY -= gameState.playerSpeed;
            if (keys['s'] || keys['arrowdown']) newY += gameState.playerSpeed;
            if (keys['a'] || keys['arrowleft']) newX -= gameState.playerSpeed;
            if (keys['d'] || keys['arrowright']) newX += gameState.playerSpeed;

            // Simple collision detection
            if (!checkCollision(newX, newY)) {
                gameState.playerX = newX;
                gameState.playerY = newY;
            }

            // Boundary check
            gameState.playerX = Math.max(gameState.playerSize, Math.min(shipCanvas.width - gameState.playerSize, gameState.playerX));
            gameState.playerY = Math.max(gameState.playerSize, Math.min(shipCanvas.height - gameState.playerSize, gameState.playerY));
        }

        // Check collision with rooms
        function checkCollision(x, y) {
            for (const room of Object.values(rooms)) {
                if (x > room.x && x < room.x + room.width &&
                    y > room.y && y < room.y + room.height) {
                    return false; // Can move into rooms
                }
            }
            return false; // Can move anywhere for now
        }

        // Draw player
        function drawPlayer() {
            // Player body
            shipCtx.fillStyle = '#ff6b00';
            shipCtx.beginPath();
            shipCtx.arc(gameState.playerX, gameState.playerY, gameState.playerSize, 0, Math.PI * 2);
            shipCtx.fill();

            // Player glow
            shipCtx.strokeStyle = '#ffaa00';
            shipCtx.lineWidth = 2;
            shipCtx.beginPath();
            shipCtx.arc(gameState.playerX, gameState.playerY, gameState.playerSize, 0, Math.PI * 2);
            shipCtx.stroke();

            // Player direction indicator
            shipCtx.fillStyle = '#ffaa00';
            shipCtx.fillRect(gameState.playerX - 2, gameState.playerY - gameState.playerSize - 5, 4, 5);
        }

        // Handle interaction
        function handleInteraction() {
            // Check which room player is in
            for (const [key, room] of Object.entries(rooms)) {
                if (isPlayerInRoom(room)) {
                    showRoomUI(key, room);
                    return;
                }
            }
        }

        // Check if player is in room
        function isPlayerInRoom(room) {
            return gameState.playerX > room.x &&
                   gameState.playerX < room.x + room.width &&
                   gameState.playerY > room.y &&
                   gameState.playerY < room.y + room.height;
        }

        }

        // Get threat level color
        function getThreatColor(level) {
            if (level < 40) return '#44ff44';
            if (level < 60) return '#ffaa00';
            return '#ff4444';
        }

        // Show pre-mission screen
        function showPreMissionScreen(idx) {
            const planet = planets[idx];
            const modalContent = document.getElementById('modalContent');
            
            const missionObjective = getMissionObjective(planet.missionType);
            
            modalContent.innerHTML = `
                <div class="interaction-modal-header">⚠ OPERATION BRIEFING</div>
                <div class="interaction-modal-content">
                    <div style="background: rgba(0, 212, 255, 0.1); border-left: 4px solid ${getMissionTypeColor(planet.missionType)}; padding: 15px; border-radius: 5px; margin-bottom: 20px;">
                        <div style="color: #00d4ff; font-weight: bold; margin-bottom: 10px;">📍 ${planet.name}</div>
                        <div style="color: #aaa; font-size: 13px; line-height: 1.5;">
                            <div><strong style="color: #fff;">MISSION TYPE:</strong> ${planet.missionType}</div>
                            <div><strong style="color: #fff;">OBJECTIVE:</strong> ${missionObjective}</div>
                            <div style="margin-top: 10px;"><strong style="color: ${getThreatColor(planet.threatLevel)};">THREAT LEVEL: ${planet.threatLevel}%</strong></div>
                            <div><strong style="color: #fff;">TERRAIN:</strong> ${planet.terrainType}</div>
                            <div><strong style="color: #fff;">HOSTILES:</strong> ${planet.enemyType} (${planet.enemyCount})</div>
                            <div style="margin-top: 10px;"><strong style="color: #ffcc00;">ESTIMATED REWARD: ${planet.rewardMin}–${planet.rewardMax} Credits</strong></div>
                        </div>
                    </div>
                    <button class="planet-btn" style="background: #f97316; margin-top: 10px;" onclick="deployToMission(${idx})">DESCEND TO OPERATION</button>
                    <button class="planet-btn" style="background: #444; color: #aaa; margin-top: 10px;" onclick="closePreMissionScreen()">CANCEL</button>
                </div>
            `;
        }

        // Get mission objective description
        function getMissionObjective(missionType) {
            switch(missionType) {
                case 'ELIMINATION':
                    return 'Clear all hostile lifeforms in the AO.';
                case 'SURVIVAL':
                    return 'Survive until extraction arrives. Defend your position.';
                case 'DEFENSE':
                    return 'Protect critical equipment until secure pickup.';
                default:
                    return 'Unknown mission type.';
            }
        }

        // Close pre-mission screen
        function closePreMissionScreen() {
            showRoomUI('controlRoom', rooms.controlRoom);
        }

        // Deploy to mission
        function deployToMission(idx) {
            const planet = planets[idx];
            
            // Simulate mission completion with random reward
            const reward = {
                credits: Math.floor(Math.random() * (planet.rewardMax - planet.rewardMin + 1)) + planet.rewardMin,
                materials: Math.floor(Math.random() * 4) + 1
            };
            
            // Update game state
            gameState.lastMissionReward = reward;
            gameState.credits += reward.credits;
            gameState.materials += reward.materials;
            
            closeInteractionModal();
            
            // Show mission complete screen briefly
            alert(`MISSION COMPLETE: ${planet.name}\n\nREWARDS EARNED:\n+${reward.credits} Credits\n+${reward.materials} Materials\n\nReturning to ship...`);
        }

        function exitToMenu() {
            document.getElementById('shipHubContainer').style.display = 'none';
            document.getElementById('mainMenu').style.display = 'flex';
            closeInteractionModal();
        }

        function exitGame() {
            alert('Thanks for playing Planetfall!');
        }

        // Initialize on load
        window.addEventListener('load', () => {
            initStarfield();
        });

        // Handle window resize
        window.addEventListener('resize', () => {
            if (gameState.currentLocation === 'ship' && shipCanvas) {
                shipCanvas.width = window.innerWidth;
                shipCanvas.height = window.innerHeight;
            }
        });
    </script>
</body>
</html>
