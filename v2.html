<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Planetfall: Extraction</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        body { font-family: 'Arial', sans-serif; background: #000; color: #e0e0e0; }
        
        /* MAIN MENU */
        #mainMenu {
            position: relative;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background: #000;
            overflow: hidden;
        }

        .menu-bg-glow {
            position: absolute;
            inset: 0;
            background: radial-gradient(circle at top, rgba(59, 130, 246, 0.1), transparent 45%),
                        radial-gradient(circle at bottom, rgba(249, 115, 22, 0.1), transparent 45%);
            z-index: 1;
        }

        .menu-bg-planet {
            position: absolute;
            bottom: -200px;
            left: 50%;
            transform: translateX(-50%);
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, rgba(249, 115, 22, 0.15) 0%, transparent 70%);
            border-radius: 50%;
            filter: blur(80px);
            z-index: 1;
        }

        .menu-stars {
            position: absolute;
            inset: 0;
            opacity: 0.3;
            z-index: 2;
        }

        .menu-star {
            position: absolute;
            background: white;
            border-radius: 50%;
            animation: twinkle 3s infinite;
        }

        @keyframes twinkle {
            0%, 100% { opacity: 0.3; }
            50% { opacity: 1; }
        }

        .menu-content {
            position: relative;
            z-index: 10;
            text-align: center;
            animation: fadeInDown 0.8s ease-out;
        }

        @keyframes fadeInDown {
            from {
                opacity: 0;
                transform: translateY(-30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .menu-logo {
            margin-bottom: 12px;
        }

        .menu-title {
            font-size: clamp(48px, 10vw, 96px);
            font-weight: 900;
            letter-spacing: 0.25em;
            color: #fff;
            margin: 0;
            text-shadow: 0 0 30px rgba(59, 130, 246, 0.3), 0 0 60px rgba(59, 130, 246, 0.1);
        }

        .menu-subtitle {
            font-size: clamp(18px, 3vw, 32px);
            letter-spacing: 0.5em;
            color: #3b82f6;
            font-weight: 300;
            margin: 8px 0 0 0;
            text-shadow: 0 0 20px rgba(59, 130, 246, 0.2);
        }

        .menu-tagline {
            font-size: clamp(12px, 1.5vw, 16px);
            letter-spacing: 0.4em;
            color: #888;
            font-weight: 400;
            margin-top: 16px;
            text-transform: uppercase;
        }

        .menu-buttons {
            display: flex;
            flex-direction: column;
            gap: 12px;
            width: 100%;
            max-width: 420px;
            margin-top: 48px;
        }

        .menu-btn {
            position: relative;
            overflow: hidden;
            padding: 14px 24px;
            font-size: 16px;
            font-weight: 600;
            letter-spacing: 0.15em;
            text-align: left;
            border: 2px solid;
            border-radius: 16px;
            cursor: pointer;
            transition: all 0.3s ease;
            background: transparent;
            text-transform: uppercase;
        }

        .menu-btn.primary {
            border-color: #f97316;
            color: #fff;
            background: rgba(249, 115, 22, 0.15);
        }

        .menu-btn.primary:hover {
            border-color: #fb923c;
            background: rgba(249, 115, 22, 0.25);
            box-shadow: 0 0 20px rgba(249, 115, 22, 0.3);
            transform: translateX(4px);
        }

        .menu-btn.secondary {
            border-color: #52525b;
            color: #e4e4e7;
            background: rgba(82, 82, 89, 0.1);
        }

        .menu-btn.secondary:hover {
            border-color: #3b82f6;
            color: #fff;
            background: rgba(59, 130, 246, 0.1);
            box-shadow: 0 0 15px rgba(59, 130, 246, 0.2);
            transform: translateX(4px);
        }

        .menu-footer {
            position: absolute;
            bottom: 20px;
            left: 0;
            right: 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 30px;
            font-size: 11px;
            letter-spacing: 0.2em;
            color: #666;
            z-index: 10;
        }

        /* SHIP HUB */
        #shipHubContainer {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #0a0e27 0%, #1a1f3a 100%);
            z-index: 100;
        }

        #shipHubCanvas {
            display: block;
            width: 100%;
            height: 100%;
            cursor: crosshair;
        }

        /* SHIP HUB UI */
        .ship-ui-layer {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 101;
        }

        .ship-header {
            position: fixed;
            top: 20px;
            left: 20px;
            color: #00ff88;
            font-size: 18px;
            font-weight: bold;
            pointer-events: auto;
            z-index: 102;
        }

        .ship-hint {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            color: #aaa;
            font-size: 14px;
            text-align: center;
            pointer-events: auto;
            z-index: 102;
        }

        .ship-hint-highlight {
            color: #00ff88;
            font-weight: bold;
        }

        .ship-exit-btn {
            position: fixed;
            top: 20px;
            right: 20px;
            background: #f97316;
            color: white;
            padding: 10px 20px;
            border: none;
            cursor: pointer;
            border-radius: 5px;
            font-weight: bold;
            pointer-events: auto;
            z-index: 103;
            transition: all 0.2s;
        }

        .ship-exit-btn:hover {
            background: #fb923c;
            box-shadow: 0 0 15px rgba(249, 115, 22, 0.4);
        }

        /* INTERACTION MODAL */
        .interaction-modal {
            display: none;
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(10, 14, 39, 0.98);
            border: 2px solid #00ff88;
            border-radius: 10px;
            padding: 40px;
            min-width: 500px;
            max-height: 80vh;
            overflow-y: auto;
            z-index: 105;
            box-shadow: 0 0 40px rgba(0, 255, 136, 0.2);
            pointer-events: auto;
        }

        .interaction-modal.show {
            display: block;
        }

        .interaction-modal-header {
            color: #00ff88;
            font-size: 28px;
            font-weight: bold;
            margin-bottom: 20px;
            border-bottom: 2px solid #00ff88;
            padding-bottom: 15px;
        }

        .interaction-modal-content {
            color: #aaa;
            font-size: 14px;
            line-height: 1.6;
        }

        .close-modal-btn {
            position: absolute;
            top: 15px;
            right: 15px;
            background: #ff4444;
            color: white;
            border: none;
            width: 40px;
            height: 40px;
            cursor: pointer;
            border-radius: 5px;
            font-size: 24px;
            pointer-events: auto;
        }

        .close-modal-btn:hover {
            background: #ff6666;
        }

        .modal-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);
            z-index: 104;
            pointer-events: auto;
        }

        .modal-overlay.show {
            display: block;
        }

        /* PLANET SELECTION */
        .planet-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-top: 20px;
        }

        .planet-card {
            background: #1a1f3a;
            border: 2px solid #444;
            padding: 20px;
            border-radius: 5px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .planet-card:hover {
            border-color: #00ff88;
            background: #2a2f4a;
        }

        .planet-name {
            color: #00ff88;
            font-weight: bold;
            font-size: 18px;
            margin-bottom: 10px;
        }

        .planet-info {
            font-size: 12px;
            color: #aaa;
            margin: 5px 0;
        }

        .difficulty {
            font-weight: bold;
            margin: 10px 0;
        }

        .difficulty.easy { color: #00ff88; }
        .difficulty.medium { color: #ffaa00; }
        .difficulty.hard { color: #ff4444; }

        .planet-btn {
            background: #f97316;
            color: #0a0e27;
            padding: 10px 16px;
            margin-top: 12px;
            border: none;
            cursor: pointer;
            font-weight: bold;
            border-radius: 5px;
            width: 100%;
            transition: all 0.2s ease;
            font-size: 14px;
            letter-spacing: 0.1em;
        }

        .planet-btn:hover {
            background: #fb923c;
            box-shadow: 0 0 15px rgba(249, 115, 22, 0.4);
            transform: translateY(-2px);
        }
    </style>
</head>
<body>
    <!-- MAIN MENU -->
    <div id="mainMenu">
        <div class="menu-bg-glow"></div>
        <div class="menu-bg-planet"></div>
        <div class="menu-stars" id="starsContainer"></div>

        <div class="menu-content">
            <div class="menu-logo">
                <h1 class="menu-title">PLANETFALL</h1>
                <h2 class="menu-subtitle">EXTRACTION</h2>
                <p class="menu-tagline">Land. Fight. Extract.</p>
            </div>

            <div class="menu-buttons">
                <button class="menu-btn primary" onclick="startGame()">▶ PLAY</button>
                <button class="menu-btn secondary" onclick="alert('Settings coming soon!')">⚙ SETTINGS</button>
                <button class="menu-btn secondary" onclick="exitGame()">❌ EXIT</button>
            </div>
        </div>

        <div class="menu-footer">
            <span>Version 0.2 Alpha</span>
            <span>Helios Directive Network</span>
        </div>
    </div>

    <!-- SHIP HUB -->
    <div id="shipHubContainer">
        <canvas id="shipHubCanvas"></canvas>
        <div class="ship-ui-layer">
            <div class="ship-header">🚀 MOTHERSHIP HUB</div>
            <div class="ship-hint">Move with <span class="ship-hint-highlight">WASD</span> | Interact with <span class="ship-hint-highlight">E</span></div>
            <button class="ship-exit-btn" onclick="exitToMenu()">← MENU</button>
        </div>
    </div>

    <!-- INTERACTION MODAL -->
    <div class="modal-overlay" id="modalOverlay"></div>
    <div class="interaction-modal" id="interactionModal">
        <button class="close-modal-btn" onclick="closeInteractionModal()">✕</button>
        <div id="modalContent"></div>
    </div>

    <script>
        // Game state
        const gameState = {
            currentLocation: 'menu',
            credits: 500,
            playerX: 0,
            playerY: 0,
            playerSpeed: 5
        };

        // Rooms definition
        const rooms = {
            centralHub: {
                name: 'Central Hub',
                x: 400,
                y: 300,
                width: 200,
                height: 200,
                color: '#1a4d6d',
                icon: '●'
            },
            armory: {
                name: 'Armory',
                x: 100,
                y: 150,
                width: 150,
                height: 150,
                color: '#4d1a1a',
                icon: '⚔'
            },
            engineering: {
                name: 'Engineering',
                x: 700,
                y: 150,
                width: 150,
                height: 150,
                color: '#4d4d1a',
                icon: '⚙'
            },
            controlRoom: {
                name: 'Control Room',
                x: 400,
                y: 550,
                width: 150,
                height: 150,
                color: '#1a4d1a',
                icon: '📡'
            }
        };

        // Planets
        const planets = [
            { name: 'Kepler-442b', difficulty: 'easy', type: 'Desert', enemies: 8 },
            { name: 'TRAPPIST-1d', difficulty: 'medium', type: 'Ice World', enemies: 12 },
            { name: 'Proxima-b', difficulty: 'hard', type: 'Volcanic', enemies: 20 }
        ];

        // Key tracking
        const keys = {};
        window.addEventListener('keydown', (e) => {
            keys[e.key.toLowerCase()] = true;
            if (e.key.toLowerCase() === 'e') handleInteraction();
        });
        window.addEventListener('keyup', (e) => {
            keys[e.key.toLowerCase()] = false;
        });

        // Initialize starfield
        function initStarfield() {
            const container = document.getElementById('starsContainer');
            for (let i = 0; i < 100; i++) {
                const star = document.createElement('div');
                star.className = 'menu-star';
                star.style.width = Math.random() * 2 + 'px';
                star.style.height = star.style.width;
                star.style.left = Math.random() * 100 + '%';
                star.style.top = Math.random() * 100 + '%';
                star.style.animationDelay = Math.random() * 3 + 's';
                container.appendChild(star);
            }
        }

        // Start game - load ship hub
        function startGame() {
            document.getElementById('mainMenu').style.display = 'none';
            document.getElementById('shipHubContainer').style.display = 'block';
            gameState.currentLocation = 'ship';
            gameState.playerX = 475;
            gameState.playerY = 400;
            initShipHub();
        }

        // Initialize ship hub
        let shipCanvas, shipCtx;
        function initShipHub() {
            shipCanvas = document.getElementById('shipHubCanvas');
            shipCtx = shipCanvas.getContext('2d');
            shipCanvas.width = window.innerWidth;
            shipCanvas.height = window.innerHeight;
            renderShipHub();
        }

        // Render ship hub
        function renderShipHub() {
            // Clear canvas
            shipCtx.fillStyle = 'rgba(10, 14, 39, 0.9)';
            shipCtx.fillRect(0, 0, shipCanvas.width, shipCanvas.height);

            // Draw grid background
            shipCtx.strokeStyle = 'rgba(0, 255, 136, 0.1)';
            shipCtx.lineWidth = 1;
            for (let x = 0; x < shipCanvas.width; x += 50) {
                shipCtx.beginPath();
                shipCtx.moveTo(x, 0);
                shipCtx.lineTo(x, shipCanvas.height);
                shipCtx.stroke();
            }
            for (let y = 0; y < shipCanvas.height; y += 50) {
                shipCtx.beginPath();
                shipCtx.moveTo(0, y);
                shipCtx.lineTo(shipCanvas.width, y);
                shipCtx.stroke();
            }

            // Draw rooms
            Object.values(rooms).forEach(room => {
                // Room background
                shipCtx.fillStyle = room.color;
                shipCtx.fillRect(room.x, room.y, room.width, room.height);

                // Room border
                shipCtx.strokeStyle = '#00ff88';
                shipCtx.lineWidth = 2;
                shipCtx.strokeRect(room.x, room.y, room.width, room.height);

                // Room label
                shipCtx.fillStyle = '#00ff88';
                shipCtx.font = 'bold 16px Arial';
                shipCtx.textAlign = 'center';
                shipCtx.textBaseline = 'middle';
                shipCtx.fillText(room.icon + ' ' + room.name, room.x + room.width / 2, room.y + room.height / 2);
            });

            // Draw player
            shipCtx.fillStyle = '#ff6b00';
            shipCtx.beginPath();
            shipCtx.arc(gameState.playerX, gameState.playerY, 15, 0, Math.PI * 2);
            shipCtx.fill();

            // Player outline
            shipCtx.strokeStyle = '#ffaa00';
            shipCtx.lineWidth = 2;
            shipCtx.beginPath();
            shipCtx.arc(gameState.playerX, gameState.playerY, 15, 0, Math.PI * 2);
            shipCtx.stroke();

            // Update player position from input
            if (keys['w'] || keys['arrowup']) gameState.playerY -= gameState.playerSpeed;
            if (keys['s'] || keys['arrowdown']) gameState.playerY += gameState.playerSpeed;
            if (keys['a'] || keys['arrowleft']) gameState.playerX -= gameState.playerSpeed;
            if (keys['d'] || keys['arrowright']) gameState.playerX += gameState.playerSpeed;

            // Boundary check
            gameState.playerX = Math.max(0, Math.min(shipCanvas.width, gameState.playerX));
            gameState.playerY = Math.max(0, Math.min(shipCanvas.height, gameState.playerY));

            // Continue animation
            requestAnimationFrame(renderShipHub);
        }

        // Handle interaction
        function handleInteraction() {
            // Check if player is in any room
            for (const [key, room] of Object.entries(rooms)) {
                if (isPlayerInRoom(room)) {
                    showRoomUI(key);
                    return;
                }
            }
        }

        // Check if player is in room
        function isPlayerInRoom(room) {
            return gameState.playerX > room.x &&
                   gameState.playerX < room.x + room.width &&
                   gameState.playerY > room.y &&
                   gameState.playerY < room.y + room.height;
        }

        // Show room UI based on room type
        function showRoomUI(roomKey) {
            const modalContent = document.getElementById('modalContent');
            
            switch(roomKey) {
                case 'armory':
                    modalContent.innerHTML = `
                        <div class="interaction-modal-header">⚔ ARMORY</div>
                        <div class="interaction-modal-content">
                            <p>Weapon upgrades coming soon!</p>
                        </div>
                    `;
                    break;
                case 'engineering':
                    modalContent.innerHTML = `
                        <div class="interaction-modal-header">⚙ ENGINEERING</div>
                        <div class="interaction-modal-content">
                            <p>Ship upgrades coming soon!</p>
                        </div>
                    `;
                    break;
                case 'controlRoom':
                    modalContent.innerHTML = `
                        <div class="interaction-modal-header">📡 CONTROL ROOM</div>
                        <div class="interaction-modal-content">
                            <p>Select your mission:</p>
                            <div class="planet-grid">
                                ${planets.map((planet, idx) => `
                                    <div class="planet-card">
                                        <div class="planet-name">${planet.name}</div>
                                        <div class="planet-info">Type: ${planet.type}</div>
                                        <div class="planet-info">Enemies: ${planet.enemies}</div>
                                        <div class="difficulty ${planet.difficulty.toLowerCase()}">${planet.difficulty}</div>
                                        <button class="planet-btn" onclick="selectPlanet(${idx})">SELECT MISSION</button>
                                    </div>
                                `).join('')}
                            </div>
                        </div>
                    `;
                    break;
                case 'centralHub':
                    modalContent.innerHTML = `
                        <div class="interaction-modal-header">● CENTRAL HUB</div>
                        <div class="interaction-modal-content">
                            <p>Welcome to the Mothership! Move around to explore:</p>
                            <ul style="margin-top: 15px; margin-left: 20px;">
                                <li>⚔ <strong>Armory</strong> - Weapon upgrades</li>
                                <li>⚙ <strong>Engineering</strong> - Ship upgrades</li>
                                <li>📡 <strong>Control Room</strong> - Mission selection</li>
                            </ul>
                        </div>
                    `;
                    break;
            }

            document.getElementById('modalOverlay').classList.add('show');
            document.getElementById('interactionModal').classList.add('show');
        }

        function closeInteractionModal() {
            document.getElementById('modalOverlay').classList.remove('show');
            document.getElementById('interactionModal').classList.remove('show');
        }

        function selectPlanet(idx) {
            const planet = planets[idx];
            alert(`Loading mission: ${planet.name}`);
            // TODO: Load actual mission
        }

        function exitToMenu() {
            document.getElementById('shipHubContainer').style.display = 'none';
            document.getElementById('mainMenu').style.display = 'flex';
            closeInteractionModal();
        }

        function exitGame() {
            alert('Thanks for playing Planetfall!');
        }

        // Initialize on load
        window.addEventListener('load', () => {
            initStarfield();
        });

        // Handle window resize
        window.addEventListener('resize', () => {
            if (gameState.currentLocation === 'ship' && shipCanvas) {
                shipCanvas.width = window.innerWidth;
                shipCanvas.height = window.innerHeight;
            }
        });
    </script>
</body>
</html>
